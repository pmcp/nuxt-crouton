# Standalone Worker that hosts the CollabRoom Durable Object
# Pages projects can't define DO classes directly — they reference this worker via script_name
name = "thinkgraph-collab"
main = "src/index.ts"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]

# D1 binding — same database as ThinkGraph Pages app
[[d1_databases]]
binding = "DB"
database_name = "thinkgraph-db"
database_id = "a370a513-908a-4402-a559-609a79401475"

# Durable Object binding (self-referencing — the class lives in this worker)
[durable_objects]
bindings = [
  { name = "COLLAB_ROOMS", class_name = "CollabRoom" }
]

# DO migration
[[migrations]]
tag = "collab-v1"
new_classes = ["CollabRoom"]
