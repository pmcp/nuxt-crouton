<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Builder POC — A1 reconcile</title>
<style>
 :root{--bg:#0d1117;--card:#161b22;--bd:#30363d;--tx:#e6edf3;--mut:#8b949e;--ac:#388bfd;--ok:#3fb950;--bad:#d29922;--add:#a371f7}
 *{box-sizing:border-box}html,body{margin:0;height:100%}body{background:var(--bg);color:var(--tx);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
 .wrap{max-width:760px;margin:0 auto;padding:22px 18px 40px;min-height:100%;display:flex;flex-direction:column}
 h1{font-size:19px;margin:0 0 2px}.sub{color:var(--mut);font-size:13px;margin:0 0 14px}
 .bar{height:8px;background:var(--card);border:1px solid var(--bd);border-radius:20px;overflow:hidden;margin-bottom:6px}
 .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--ac),var(--add));width:0;transition:width .25s}
 .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:16px}
 .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px 18px 16px;flex:1}
 .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
 .num{background:var(--ac);color:#fff;font-weight:700;font-size:13px;min-width:24px;height:24px;border-radius:50%;display:grid;place-items:center;padding:0 6px}
 code.id{color:var(--ac);font-size:13px}.hook{margin-left:auto;font-size:12px;color:var(--add);background:#1c1530;padding:2px 9px;border-radius:20px}
 .behaviour{font-size:16px;margin:0 0 12px}
 .we{background:#0d1117;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:14px}
 .we .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em}.we .arrow{color:var(--ac);margin:0 7px}
 ol{margin:0 0 14px;padding-left:22px}ol li{margin:4px 0;color:#c9d1d9}
 .cr{font-size:12px;color:var(--mut);margin:0 0 14px;display:flex;flex-direction:column;gap:2px}
 .verdict{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
 .verdict button{flex:1;min-width:150px;padding:9px;border-radius:8px;border:1px solid var(--bd);background:#0d1117;color:var(--tx);cursor:pointer;font-size:14px;transition:.12s}
 .verdict button:hover{border-color:var(--mut)}
 .verdict button.sel[data-v="confirmed"]{background:rgba(63,185,80,.18);border-color:var(--ok);color:var(--ok)}
 .verdict button.sel[data-v="contradicted"]{background:rgba(210,153,34,.18);border-color:var(--bad);color:var(--bad)}
 .verdict button.sel[data-v="undocumented"]{background:rgba(163,113,247,.18);border-color:var(--add);color:var(--add)}
 textarea.note{width:100%;background:#0d1117;border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:8px 10px;font:13px/1.4 inherit;resize:vertical;min-height:52px}
 .nav{display:flex;gap:10px;align-items:center;margin-top:16px}
 .nav button{padding:10px 18px;border-radius:8px;border:1px solid var(--bd);background:var(--card);color:var(--tx);cursor:pointer;font-size:14px}
 .nav button:disabled{opacity:.4;cursor:not-allowed}.nav .grow{flex:1}
 .nav .primary{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}
 .kbd{font-size:11px;color:var(--mut);text-align:center;margin-top:10px}
 .kbd b{background:var(--card);border:1px solid var(--bd);border-radius:4px;padding:1px 5px;color:var(--tx)}
 /* summary */
 #summary{display:none}.done .card,.done .nav,.done .kbd{display:none}.done #summary{display:block}
 table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin:10px 0}
 td{padding:7px 11px;border-top:1px solid var(--bd);font-size:13px;vertical-align:top}td:first-child{white-space:nowrap}td code{color:var(--ac)}tr:first-child td{border-top:none}
 .pill{font-size:11px;padding:1px 8px;border-radius:20px}.pill.confirmed{background:rgba(63,185,80,.18);color:var(--ok)}.pill.contradicted{background:rgba(210,153,34,.18);color:var(--bad)}.pill.undocumented{background:rgba(163,113,247,.18);color:var(--add)}.pill.skipped{background:#21262d;color:var(--mut)}
 .exp{width:100%;min-height:180px;background:#0d1117;border:1px solid var(--bd);border-radius:8px;color:var(--tx);font:12px/1.45 ui-monospace,monospace;padding:10px;margin-top:8px}
 .row{display:flex;gap:10px;margin:12px 0}.row button{padding:9px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--ac);border-color:var(--ac);color:#fff;cursor:pointer}
 .row button.ghost{background:var(--card);border-color:var(--bd);color:var(--tx)}
 h2{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:22px 0 8px}
</style></head><body><div class="wrap" id="app">
 <h1>Builder POC — A1 reconcile</h1>
 <p class="sub">Guided walk — one entry at a time, against the running POC. Progress saves in this browser.</p>
 <div class="bar"><i id="prog"></i></div>
 <div class="meta"><span id="counter"></span><span id="tally"></span></div>
 <div class="card" id="card"></div>
 <div class="nav">
  <button id="prev">← Prev</button><span class="grow"></span>
  <button id="next" class="primary">Next →</button>
 </div>
 <p class="kbd"><b>←</b>/<b>→</b> move · <b>1</b> confirm · <b>2</b> contradict · <b>3</b> undocumented</p>
 <div id="summary"></div>
</div>
<script>
const {title, walk, ref} = {"title":"Builder POC — A1 reconcile","walk":[{"id":"site-page-two-level","behaviour":"Two levels on one screen: a Site flow (pages as a wireable sitemap) and a Page board (compose blocks). You land on the Site.","when":"open the builder","expect":"a CroutonFlow canvas of page cards (lines = parentId); tapping a card (or ⤢ / double-click) opens that page's board; 'Pages ←' returns to the flow","hook":"","howToTest":"1. open /spike-app → see the Site flow of page cards  2. tap a card → its LayoutTree loads onto the board  3. tap 'Pages ←' → back to the flow","status":"proposed","supersedes":"","consideredRejected":["port the board into the old zoom shell → ❌ added Site as a level on top of the polished board instead (Decision B)"]},{"id":"page-model-one-node","behaviour":"The board holds many layout candidates + loose drafts, but exactly one node is 'the page' (★-badged) — the live layout a user would see.","when":"on a page board with several nodes","expect":"one node carries the ★ page badge; 'Set as page' promotes another; 'Duplicate' clones one as a free draft; a merge involving the page always consumes (the badge survives)","hook":"page-badge","howToTest":"1. open a board with 2+ nodes → exactly one shows the ★ badge  2. Set as page on another → badge moves  3. merge the page into another node → the result keeps the ★ badge","status":"proposed","supersedes":"","consideredRejected":[]},{"id":"focus-edit-view","behaviour":"Editing a layout opens a dedicated full-screen edit VIEW, not a Vue Flow camera zoom (the camera zoom raced VF's re-measure and framed off-screen).","when":"double-click a layout node","expect":"a full-screen overlay hosting the breakpoint author (min-width ruler, device buttons, width slider, per-block variants, splitter drags); 'Done' returns; the node's layout persists via the page's zoomTree","hook":"","howToTest":"1. double-click a composed node → full-screen edit view opens (no camera wobble)  2. drag a splitter → keypoint sizes change  3. Done → returns, changes persisted","status":"proposed","supersedes":"","consideredRejected":["camera zoom onto the node → ❌ VF re-measure race framed the 2nd node off-screen at mobile width"]},{"id":"per-element-resize","behaviour":"Responsiveness is per-element, not global — each card has a corner resize handle and renders responsively at the set width (the old board-wide responsive slider is gone).","when":"a node is selected","expect":"a corner handle sets the node width/height; once a width is set the card switches to a read-only responsive preview (splitter drags then resize the card, not its panes); opening edit lands at that width","hook":"","howToTest":"1. select a card → corner handle appears  2. drag it narrower → the card's content reflows responsively  3. open edit → lands at the resized width","status":"proposed","supersedes":"","consideredRejected":["global board-wide responsive slider → ❌ replaced by per-element width"]},{"id":"intrinsic-block-sizing","behaviour":"A component decides its own size as declared data: each block carries sizing {width,height: fill|hug}. hug = size to content. A Top bar / Bottom nav declare height:hug, so a pinned bar comes out as a short pill — no per-instance size UI.","when":"place a hug-height block (e.g. Top bar) vs a fill block (List/Form/Chart)","expect":"the hug block renders short (content height); the fill block stretches; a card can't be resized below its hard floor","hook":"floor-readout","howToTest":"1. add a Top bar block → it renders as a short pill (declares height:hug)  2. add a List → it fills  3. try to resize a card below its floor → it won't go (floor readout shows 'stacks <Npx · floor Mpx')","status":"proposed","supersedes":"","consideredRejected":["per-instance align/size panel → ❌ the component decides, not the instance"]},{"id":"composite-derive-sizing","behaviour":"Composites DERIVE their rules from children, component-driven all the way up: a split/nested layout publishes the same contract its leaves do, folded bottom-up by deriveSizing (hard floor = widest leaf; soft floor = sum across a row / max across a column).","when":"select a composed (multi-pane) card","expect":"the card shows a derived floor readout; the per-element resize can't drag it below its hard floor (a layout can't violate its components' rules)","hook":"floor-readout","howToTest":"1. compose a 2-pane row → select it  2. read the derived floor (hard = widest leaf, soft = sum)  3. resize down → stops at the hard floor","status":"proposed","supersedes":"","consideredRejected":["manual min/max override on a composite → ❌ deferred; risks reintroducing per-instance flex — revisit after graduation if derived floors prove insufficient"]},{"id":"page-regions-pin","behaviour":"A node can be pinned to the page's top/bottom edge (a sticky pill/bar) from its toolbar — the first bounded-vocabulary expressiveness feature. Region is a bounded enum (top|bottom|main), agent-pickable, serialisable. No free-floating positioning.","when":"pin a node top/bottom, then Preview","expect":"the badge shows 'Pinned top/bottom'; ▶ Preview assembles the running page — pinned-top in a sticky top bar, pinned-bottom in a sticky bottom bar, the ★ page in a scrolling main between","hook":"region-pill","howToTest":"1. pin a node to top → region pill shows 'Pinned top'  2. pin another to bottom  3. ▶ Preview → sticky top bar + sticky bottom bar + scrolling main","status":"proposed","supersedes":"","consideredRejected":["per-pane pin (pin one pane inside a composed layout) → ❌ deferred; pinning is card-level","per-pane size lock → ❌ dropped; intrinsic hug sizing makes a pinned bar short automatically"]},{"id":"display-variants","behaviour":"A block can expose bounded display variants — enumerated layouts of the same data (e.g. Artists list: rows / cards / table). A variant is an enum an agent could equally pick, declared on the registry, serialised on the leaf, so it persists and round-trips.","when":"select a pane in the edit view","expect":"an options panel shows a Display chip row; a tap re-renders the block in that variant; the choice serialises onto leaf.config.variant","hook":"","howToTest":"1. edit a List block → select its pane  2. Display row offers rows/cards/table  3. pick 'table' → re-renders; reopen → still table (persisted on the leaf)","status":"proposed","supersedes":"","consideredRejected":["free display config → ❌ bounded enum only, inside the expressiveness boundary"]},{"id":"snap-dwell-arm","behaviour":"Snapping is a two-stage dwell-to-arm gesture: near a snap point → soft (blue, wide, pulsing); hold ~0.6s → armed (green, release-to-snap). The arm timer is keyed on the target only, so finger jitter that flips the nearest seam doesn't reset it.","when":"drag a card near a snap point and hold","expect":"a soft blue guide first, then a green armed ring/guide after the dwell; releasing while armed snaps","hook":"snap-guide","howToTest":"1. drag a card toward another's edge → soft blue guide (data-armed=false)  2. hold ~0.6s → turns green (data-armed=true)  3. release → snaps into place","status":"proposed","supersedes":"","consideredRejected":[]},{"id":"pane-drop-beside","behaviour":"Drop a card OVER a composed layout (≥35% overlap) → add it beside the targeted pane on the nearest side (L/R/T/B by quadrant). Flattens into the parent row/column when the side runs along it, else wraps the pane in a new perpendicular split — so you can add 'right of a pane in a vertical stack', which seam-only insert couldn't reach.","when":"drag a card over a multi-pane layout near one pane's edge","expect":"the pane under the cursor is targeted; the card joins as a sibling on the nearest side; flatten vs wrap as above; the drop commits by tracking the dragged node's id","hook":"ghost-pane","howToTest":"1. drag a card over a 2-pane row, near the right pane's right edge → it joins the row (flatten)  2. drag over a vertical stack, to the right of a pane → wraps in a new horizontal split","status":"proposed","supersedes":"","consideredRejected":["seam-only insert → ❌ couldn't add beside a pane in a stack with no matching seam"]},{"id":"ghost-ease-apart","behaviour":"On an armed pane-drop the target renders a ghost skeleton matching the dragged node's footprint (every leaf → a dashed placeholder, splits/nested preserved) and the real panes ease apart via FLIP to make room — a 2-row stack opens a 2-row slot, not a flat sliver. Reverts on un-arm.","when":"hold a card armed over a layout","expect":"a dashed ghost matching the dragged footprint appears; panes slide apart and the card grows to fit; un-arming reverts it","hook":"ghost-pane","howToTest":"1. drag a 2-row card over a layout and arm it → a 2-row dashed ghost opens  2. real panes ease apart (FLIP)  3. move away to un-arm → reverts","status":"proposed","supersedes":"","consideredRejected":[]},{"id":"detach-reorder","behaviour":"Long-press a merged node → its panes wiggle (grabbable). Reorder is the default: slide a pane to another slot ('Move here') and release. Detach needs a clear pull OUT past a ~64px margin beyond the card edge, so a small overshoot while reordering doesn't tip into a detach.","when":"long-press a composed node, then pull a pane","expect":"panes wiggle; sliding within the card reorders (green 'Move here'); pulling past the detach margin detaches; under the threshold it springs back; tap-outside/Esc/Done cancels","hook":"","howToTest":"1. long-press a merged node → panes wiggle  2. slide a pane to another slot → 'Move here', release → reordered  3. pull a pane far out (>~64px) → detaches as its own node","status":"proposed","supersedes":"","consideredRejected":[]},{"id":"enter-page-fit","behaviour":"Entering a page snaps to a fitted frame instantly, framed by the node's known geometry (position + footprint), not Vue Flow's measured size (stale on fresh mount), with duration 0 (no zoom-out wobble).","when":"open a page from the Site flow","expect":"the page node is framed cleanly and immediately, no zoom-out wobble or off-screen framing","hook":"","howToTest":"1. from the Site flow, open a page → the board frames the page node instantly and centred (no wobble)","status":"proposed","supersedes":"","consideredRejected":["Vue Flow fitView → ❌ measures the small wrapper, zooms into the oversized card"]},{"id":"add-block-land","behaviour":"Adding a block lands it in a clear spot right of every existing node (from real footprints), the camera centres on it at a moderate zoom, and a green 'just added' glow fades after ~2.5s.","when":"add a block from the palette","expect":"the new block appears in a clear area (never under a wide/moved layout), camera centres on it, green glow fades","hook":"","howToTest":"1. add a block from the palette → it lands clear to the right, camera centres, green glow fades ~2.5s later","status":"proposed","supersedes":"","consideredRejected":["fixed count×300 stride → ❌ dropped new blocks under wide/moved layouts"]},{"id":"pinch-zoom","behaviour":"A 2-finger pinch starting on a node zooms the board (the node's drag would otherwise swallow it); SpikeBlockNode catches the gesture in the capture phase and the page drives zoom via setCenter, keeping the pinched point under the fingers. One finger still drags/long-presses.","when":"pinch with two fingers starting over a node","expect":"the board zooms around the pinched point; single-finger still drags/long-presses","hook":"","howToTest":"1. (touch) start a 2-finger pinch on a card → board zooms, pinched point stays under the fingers  2. one finger → still drags","status":"proposed","supersedes":"","consideredRejected":[]},{"id":"drag-glow","behaviour":"A dragged card carries a light-green halo (Vue Flow dragging, forwarded by CroutonFlow), fading on drop. Snap rings (emerald armed / sky soft) outrank the glow.","when":"drag a card","expect":"a light-green halo while dragging, fading on drop; snap rings take visual priority when present","hook":"","howToTest":"1. drag a card → light-green halo  2. bring it near a snap → the snap ring outranks the glow  3. drop → halo fades","status":"proposed","supersedes":"","consideredRejected":[]},{"id":"spacer-block","behaviour":"The Spacer is a real, snappable layout primitive that holds empty space (faint dashed hint in the builder); it snaps/reorders/resizes like any block to push neighbours around or hold a gap, with a small minWidth (40) so it can be a thin gutter.","when":"add a Spacer from the palette","expect":"an empty space block with a faint dashed hint; behaves like any block (snap/reorder/resize); can be a thin gutter","hook":"","howToTest":"1. add a Spacer → dashed empty block  2. snap it between two blocks → pushes them apart  3. resize narrow → thin gutter","status":"proposed","supersedes":"","consideredRejected":[]}],"ref":[{"id":"page-site-routing","behaviour":"Page ⇄ Site is REAL routing, not one view. The POC fakes it: /spike-app is one route and selectedPageId v-if/v-else-swaps with a cross-fade (a visual transition pretending to be navigation).","when":"navigate between the Site flow and a page board","expect":"POC: one URL, no history. GRADUATED: /builder = Site flow, /builder/[pageId] = that page's board (deep-linkable), browser back/forward works, page-to-page is a plain route link","hook":"","howToTest":"POC: 1. open a page → URL stays /spike-app  2. browser back → doesn't return to the flow. GRADUATED target: URL is /builder/[pageId]; back returns to /builder","status":"stopgap","supersedes":"","consideredRejected":[]},{"id":"page-site-transition","behaviour":"The Page⇄Site transition is a simultaneous cross-fade + subtle directional scale (a gentle zoom). Explicitly a stopgap.","when":"move between Site and Page","expect":"POC: cross-fade (both views stacked, one in as the other out). GRADUATED: View Transitions API shared-element morph — matching view-transition-name on the flow card and the page board so the card grows into the board and shrinks back","hook":"","howToTest":"POC: 1. open/close a page → cross-fade. GRADUATED target: the page card morphs into the board (shared-element)","status":"stopgap","supersedes":"","consideredRejected":["mode=out-in → ❌ flashed the dark bg and delayed board mount so fitPage missed"]},{"id":"board-persistence","behaviour":"Board state is ephemeral (in-memory only): each page's board is cached in a pageBoards Map and restored on re-entry, but nothing persists — a reload starts from composeDefault. By design for the POC.","when":"edit a board, then reload","expect":"POC: re-entering the page restores the in-memory board, but a full reload resets to composeDefault. GRADUATED: durable persistence — the LayoutTree round-trips to a store / the ticket (#974)","hook":"","howToTest":"POC: 1. compose a board  2. leave and re-enter → restored  3. reload the page → back to default (not saved). GRADUATED target: survives reload","status":"stopgap","supersedes":"","consideredRejected":[]},{"id":"layouttree-serialise","behaviour":"The board serialises to a clean, diffable LayoutTree (layouts → blocks → splits/sizes/breakpoints) — the canonical interchange format an agent and the builder both read/write. In the POC the model exists but lives in POC utils + inferred app.config.","when":"graduate the serialisation","expect":"a stable, human-readable LayoutTree serialiser on a typed package surface (the editable renderer + serialisation already landed in @fyit/crouton-layout via #987/#990 — re-validate it satisfies this, don't rebuild)","hook":"","howToTest":"GRADUATED: serialise a composed board → a stable diffable tree; reload it → identical layout (round-trips)","status":"stopgap","supersedes":"","consideredRejected":[]},{"id":"round-trip-ticket","behaviour":"Persist a version back to the GitHub ticket: a human's edited layout saves onto the tracking issue as the command/spec for the agent to (re)build from. Agent writes the tree → human edits visually → edit posts back → agent reads it. The North Star — the builder is the human's seat in an agent pipeline.","when":"save a builder version","expect":"the serialised LayoutTree is posted to the issue as a diffable spec; the round-trip works both ways (mirrors the schema-review / ui-proposal sign-off loops, but the artifact is the layout tree)","hook":"","howToTest":"GRADUATED: edit a layout → 'save version' → the tree appears on the issue → an agent reads it back and rebuilds the same layout","status":"new","supersedes":"","consideredRejected":[]},{"id":"magic-ai-arrange","behaviour":"Two-tier magic arrange: ✨ Magic arrange (deterministic compose of placed blocks) and ✨ Magic (AI) — a free-text 'Describe the app' intent → an LLM arranges the placed blocks — shown only when the crouton-ai add-on is installed (hasApp('ai')). Both write the same LayoutTree (the agent→human arrow, in-app).","when":"use magic arrange on placed blocks","expect":"Magic arrange deterministically composes a first-cut layout; with crouton-ai installed, an AI tier takes a free-text intent and arranges; both produce a LayoutTree","hook":"","howToTest":"GRADUATED: 1. place blocks → Magic arrange → a composed layout  2. with crouton-ai → type an intent → AI arranges the same blocks","status":"new","supersedes":"","consideredRejected":[]},{"id":"multiplayer-collab","behaviour":"Build together: sync the board through crouton-collab (a CollabRoom over Yjs — flowId + synced data mode + presence). The POC runs Vue Flow ephemeral/non-synced. When synced, undo must switch to Y.UndoManager (per-user transaction undo) — the POC's whole-board snapshot stack is a single-user placeholder that would clobber others' edits.","when":"two people edit the same board","expect":"edits and presence sync via a CollabRoom; undo is per-user (Y.UndoManager), not a whole-board snapshot","hook":"","howToTest":"GRADUATED: 1. two clients join the same board → edits sync + presence shows  2. user A undo → only A's last edit reverts, not B's","status":"new","supersedes":"","consideredRejected":[]},{"id":"real-collections","behaviour":"The graduated builder app is a real crouton app whose data model is real collections (crouton CLI/config → generated CRUD/API/migrations), not the POC's backend-free demo blocks. The builder composes those collections' blocks.","when":"scaffold the graduated app","expect":"CLI-scaffolded app + real collections (server/db/schema.ts present, generated layers, a migration); demo blocks are replaced by blocks over real collections","hook":"","howToTest":"GRADUATED (conformance C2): the app boots, server/db/schema.ts exists, collections are generated (not stubs), CRUD works","status":"new","supersedes":"","consideredRejected":[]}]};
const KEY = 'specwalk:' + title;
let state = JSON.parse(localStorage.getItem(KEY) || '{}'); // { [id]: {verdict, note} }
let i = 0;
const $ = s => document.querySelector(s);
const save = () => localStorage.setItem(KEY, JSON.stringify(state));
function stepsOf(e){ return (e.howToTest||'').split(/\s(?=\d\.\s)/).map(s => s.replace(/^\d\.\s*/,'')); }
function render(){
  const e = walk[i]; const st = state[e.id] || {};
  $('#prog').style.width = ((i)/walk.length*100)+'%';
  $('#counter').textContent = 'Entry '+(i+1)+' of '+walk.length;
  const done = walk.filter(w=>state[w.id]&&state[w.id].verdict).length;
  $('#tally').textContent = done+' / '+walk.length+' marked';
  $('#card').innerHTML =
    '<div class="top"><span class="num">'+(i+1)+'</span><code class="id">'+e.id+'</code>'+
      (e.hook?'<span class="hook">🔖 '+e.hook+'</span>':'')+'</div>'+
    '<p class="behaviour">'+e.behaviour+'</p>'+
    '<div class="we"><span class="lbl">When</span> '+e.when+' <span class="arrow">→</span> <span class="lbl">Expect</span> '+e.expect+'</div>'+
    '<ol>'+stepsOf(e).map(s=>'<li>'+s+'</li>').join('')+'</ol>'+
    (e.consideredRejected&&e.consideredRejected.length?'<div class="cr">'+e.consideredRejected.map(c=>'<span>❌ '+c+'</span>').join('')+'</div>':'')+
    '<div class="verdict">'+
      ['confirmed:✅ Confirmed','contradicted:⚠️ Contradicted','undocumented:➕ Undocumented'].map(o=>{
        const [v,l]=o.split(':'); return '<button data-v="'+v+'" class="'+(st.verdict===v?'sel':'')+'">'+l+'</button>';}).join('')+
    '</div>'+
    '<textarea class="note" placeholder="note / delta — what the POC actually does…">'+(st.note||'')+'</textarea>';
  $('#card').querySelectorAll('.verdict button').forEach(b=>b.onclick=()=>{ mark(b.dataset.v); });
  $('#card').querySelector('.note').oninput = ev => { state[e.id]=state[e.id]||{}; state[e.id].note=ev.target.value; save(); };
  $('#prev').disabled = i===0;
  $('#next').textContent = i===walk.length-1 ? 'Finish →' : 'Next →';
}
function mark(v){ const e=walk[i]; state[e.id]=state[e.id]||{}; state[e.id].verdict=v; save(); render();
  setTimeout(()=>{ if(i<walk.length-1){i++;render();} else finish(); }, 180); }
function finish(){
  const rows = walk.map((e,n)=>{ const st=state[e.id]||{}; const v=st.verdict||'skipped';
    return '<tr><td>'+(n+1)+' <code>'+e.id+'</code></td><td><span class="pill '+v+'">'+v+'</span>'+
      (st.note?' <span style="color:var(--mut)">— '+st.note.replace(/</g,'&lt;')+'</span>':'')+'</td></tr>'; }).join('');
  const exportObj = {
    spec: title, walkedAt: new Date().toISOString(),
    verdicts: walk.map(e=>({ id:e.id, status:e.status, verdict:(state[e.id]||{}).verdict||'skipped', note:(state[e.id]||{}).note||'' })),
    readonly: ref.map(e=>({ id:e.id, status:e.status }))
  };
  const done = walk.filter(w=>state[w.id]&&state[w.id].verdict).length;
  $('#summary').innerHTML =
    '<h1>Walk summary</h1><p class="sub">'+done+' of '+walk.length+' marked · '+
      ['confirmed','contradicted','undocumented','skipped'].map(v=>walk.filter(w=>((state[w.id]||{}).verdict||'skipped')===v).length+' '+v).join(' · ')+'</p>'+
    '<table>'+rows+'</table>'+
    '<h2>Export — paste this back to the agent</h2>'+
    '<textarea class="exp" readonly>'+JSON.stringify(exportObj,null,2)+'</textarea>'+
    '<div class="row"><button id="copy">Copy JSON</button><button id="dl" class="ghost">Download .json</button><button id="back" class="ghost">← Back to walk</button></div>';
  document.body.querySelector('#app').classList.add('done');
  $('#copy').onclick=()=>{ navigator.clipboard.writeText(JSON.stringify(exportObj,null,2)); $('#copy').textContent='Copied ✓'; };
  $('#dl').onclick=()=>{ const b=new Blob([JSON.stringify(exportObj,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=title.replace(/\W+/g,'-').toLowerCase()+'-verdicts.json'; a.click(); };
  $('#back').onclick=()=>{ document.body.querySelector('#app').classList.remove('done'); i=walk.length-1; render(); };
}
$('#prev').onclick=()=>{ if(i>0){i--;render();} };
$('#next').onclick=()=>{ if(i<walk.length-1){i++;render();} else finish(); };
document.addEventListener('keydown',ev=>{
  if(document.body.querySelector('#app').classList.contains('done')) return;
  if(ev.key==='ArrowRight'){ $('#next').click(); } else if(ev.key==='ArrowLeft'){ $('#prev').click(); }
  else if(ev.key==='1'){ mark('confirmed'); } else if(ev.key==='2'){ mark('contradicted'); } else if(ev.key==='3'){ mark('undocumented'); }
});
render();
</script></body></html>
