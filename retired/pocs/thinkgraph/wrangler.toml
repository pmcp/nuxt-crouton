# Cloudflare Pages configuration for thinkgraph
# Deploy with: npx wrangler pages deploy dist/

name = "thinkgraph"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "thinkgraph-db"
database_id = "a370a513-908a-4402-a559-609a79401475"
migrations_dir = "server/db/migrations/sqlite"

[[kv_namespaces]]
binding = "KV"
id = "7356f04d4f1f44208130654c4de11c44"

# Vectorize index for semantic search over thinkgraph_nodes (Phase 2B).
# Create once with:
#   npx wrangler vectorize create thinkgraph-nodes --dimensions=1536 --metric=cosine
# Vectors are 1536 dims (OpenAI text-embedding-3-small), keyed by nodeId,
# with metadata { teamId, projectId, status }.
[[vectorize]]
binding = "VECTORIZE"
index_name = "thinkgraph-nodes"

# Durable Objects — CollabRoom lives in a separate Worker (Pages can't define DO classes)
[[durable_objects.bindings]]
name = "COLLAB_ROOMS"
class_name = "CollabRoom"
script_name = "thinkgraph-collab"
