<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crouton Builder — Site flow (WS3 #872)</title>
<style>
  :root {
    --primary: #6366f1;          /* indigo-500 (stand-in for theme primary) */
    --primary-soft: rgba(99,102,241,.25);
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e5e5e5;
    --muted: #737373;
    --ink: #171717;
    --dot: #d4d4d4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .shell {
    position: relative; height: 100vh; width: 100vw; overflow: hidden;
    background-color: var(--bg);
    background-image: radial-gradient(var(--dot) 1px, transparent 1px);
    background-size: 16px 16px;
  }

  /* Breadcrumb pill (from the zoom shell) */
  .breadcrumb {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); background: rgba(255,255,255,.9); backdrop-filter: blur(6px);
    padding: 7px 14px; border-radius: 9999px; font-size: 13px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .dot { width: 7px; height: 7px; border-radius: 9999px; background: #a78bfa; display: inline-block; }
  .crumb-active { font-weight: 600; color: var(--ink); }
  .crumb-muted { color: var(--muted); }
  .sep { color: rgba(115,115,115,.5); }

  /* Wires */
  svg.wires { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  .wire { stroke: #a3a3a3; stroke-width: 2; fill: none; }

  /* Page cards */
  .card {
    position: absolute; z-index: 2; min-width: 176px; max-width: 240px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: all .15s ease;
  }
  .card.sel { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft), 0 1px 3px rgba(0,0,0,.06); }
  .card-body { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
  .card-icon { width: 18px; height: 18px; color: var(--primary); flex: none; }
  .card-text { display: flex; flex-direction: column; min-width: 0; }
  .card-label { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zoom {
    margin-left: auto; flex: none; width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; color: #a3a3a3;
    border: none; background: transparent;
  }
  .card.sel .zoom, .card:hover .zoom { color: var(--primary); background: #f5f5f5; }
  .handle { position: absolute; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; border-radius: 9999px; background: #a3a3a3; border: 1px solid #fff; }
  .handle.top { top: -4px; } .handle.bottom { bottom: -4px; }

  /* Flow controls (bottom-left) */
  .controls { position: absolute; left: 12px; bottom: 12px; z-index: 10; display: flex; flex-direction: column; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
  .controls button { width: 26px; height: 26px; border: none; border-bottom: 1px solid var(--border); background: #fff; color: #525252; cursor: pointer; }
  .controls button:last-child { border-bottom: none; }

  .hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 12px; color: var(--muted); background: rgba(255,255,255,.8); padding: 4px 10px; border-radius: 9999px; border: 1px solid var(--border); }
  .icon { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="shell">
    <!-- Breadcrumb from the zoom shell: we're at the Site level -->
    <div class="breadcrumb">
      <span class="dot"></span>
      <span class="crumb-active">Site</span>
    </div>

    <!-- Wires = parentId hierarchy. Home → Bookings, Home → Settings, Bookings → Booking detail -->
    <svg class="wires">
      <path class="wire" d="M 360,176 C 360,236 220,236 220,300" />
      <path class="wire" d="M 360,176 C 360,236 520,236 520,300" />
      <path class="wire" d="M 220,372 C 220,432 220,432 220,470" />
    </svg>

    <!-- Home (root) -->
    <div class="card sel" style="left:272px; top:96px;">
      <span class="handle top"></span>
      <div class="card-body">
        <svg class="card-icon icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
        <div class="card-text"><span class="card-label">Home</span><span class="card-sub">/</span></div>
        <button class="zoom"><svg class="icon" width="14" height="14" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
      </div>
      <span class="handle bottom"></span>
    </div>

    <!-- Bookings -->
    <div class="card" style="left:132px; top:300px;">
      <span class="handle top"></span>
      <div class="card-body">
        <svg class="card-icon icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <div class="card-text"><span class="card-label">Bookings</span><span class="card-sub">/bookings</span></div>
        <button class="zoom"><svg class="icon" width="14" height="14" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
      </div>
      <span class="handle bottom"></span>
    </div>

    <!-- Settings -->
    <div class="card" style="left:432px; top:300px;">
      <span class="handle top"></span>
      <div class="card-body">
        <svg class="card-icon icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9 1.65 1.65 0 0 0 4.27 7.18l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.66.27 1.09.92 1.09 1.51V11a2 2 0 0 1 0 4z"/></svg>
        <div class="card-text"><span class="card-label">Settings</span><span class="card-sub">/settings</span></div>
        <button class="zoom"><svg class="icon" width="14" height="14" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
      </div>
      <span class="handle bottom"></span>
    </div>

    <!-- Booking detail (child of Bookings) -->
    <div class="card" style="left:132px; top:470px;">
      <span class="handle top"></span>
      <div class="card-body">
        <svg class="card-icon icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <div class="card-text"><span class="card-label">Booking detail</span><span class="card-sub">/bookings/:id</span></div>
        <button class="zoom"><svg class="icon" width="14" height="14" viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
      </div>
      <span class="handle bottom"></span>
    </div>

    <!-- Flow zoom controls -->
    <div class="controls">
      <button>+</button><button>−</button><button>⤢</button>
    </div>

    <div class="hint">double-click a page (or its ⤢) to zoom into its layout · drag a handle to wire pages</div>
  </div>
</body>
</html>
