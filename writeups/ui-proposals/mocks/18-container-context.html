<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Container Context · every layout responds to its own size</title>
<style>
  :root{
    --bg:#070a10; --bg2:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d; --edge2:#2b3a55;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff; --blue:#7fb4ff; --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:radial-gradient(1200px 800px at 75% -10%, #15314a33, transparent),radial-gradient(1000px 700px at -10% 110%, #2a123a33, transparent),var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; height:100%; -webkit-font-smoothing:antialiased}
  .chip{position:fixed; top:18px; left:18px; z-index:60; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; backdrop-filter:blur(8px)}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);box-shadow:var(--glow) var(--violet)}
  .chip b{font-weight:700}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:60; pointer-events:none; text-align:center; max-width:92vw}
  .hint b{color:var(--ink)}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:90; opacity:.04; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  .stage{position:absolute; inset:0; display:grid; place-items:center}
  /* the layout frame (resizable from the corner) */
  #frame{position:relative; width:920px; height:560px; max-width:94vw; max-height:78vh;
    border:1.5px solid var(--edge2); border-radius:16px; background:#0b1018; padding:8px;
    box-shadow:0 28px 70px #000b, inset 0 0 0 1px #ffffff08, 0 0 50px -10px #9d7bff33; display:flex; gap:8px}
  .grab{position:absolute; right:-7px; bottom:-7px; width:22px;height:22px; z-index:10; cursor:nwse-resize;
    border-radius:0 0 10px 0; border-right:2px solid var(--violet); border-bottom:2px solid var(--violet); box-shadow:0 0 14px -2px var(--violet)}

  /* a region = a CONTAINER (carries its own size context) */
  .region{position:relative; min-width:0; min-height:0; display:flex; flex-direction:column;
    border:1px solid #223150; border-radius:12px; background:linear-gradient(180deg,#10182a,#0c1320); overflow:hidden;
    container-type:inline-size}
  #left{flex:0 0 42%}
  #right{flex:1 1 0; display:flex; flex-direction:column; gap:8px; border:none; background:transparent; container-type:normal}
  #stats{flex:0 0 42%}
  #cal{flex:1 1 0}
  .region>header{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 11px; border-bottom:1px solid #1c2740; flex:0 0 auto}
  .region>header .t{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); display:flex; gap:7px; align-items:center}
  .region>header .ic{width:18px;height:18px;border-radius:6px;display:grid;place-items:center;font-size:11px}
  .cqbadge{font-size:10px; letter-spacing:.02em; color:var(--accent); background:#0b1a16; border:1px solid #1f5247; border-radius:999px; padding:3px 8px; white-space:nowrap; font-variant-numeric:tabular-nums}
  .body{flex:1 1 0; min-height:0; overflow:auto; padding:10px}

  /* seams */
  .seam{flex:0 0 8px; align-self:stretch; border-radius:4px; background:#141d2e; position:relative; transition:background .15s}
  .seam.v{cursor:col-resize} .seam.h{cursor:row-resize; align-self:auto; height:8px; flex:0 0 8px; width:auto}
  .seam::after{content:"";position:absolute;left:50%;top:50%;background:#33415e;border-radius:3px}
  .seam.v::after{width:2px;height:16px;transform:translate(-50%,-50%)} .seam.h::after{height:2px;width:16px;transform:translate(-50%,-50%)}
  .seam:hover,.seam.active{background:var(--accent);box-shadow:0 0 12px var(--accent)}

  /* ===== mini-app content that REFLOWS to ITS container (real @container queries) ===== */
  .ic-a{background:var(--accent)22;color:var(--accent)} .ic-b{background:var(--gold)22;color:var(--gold)} .ic-c{background:var(--accent2)22;color:var(--accent2)}

  /* COLLECTION (left): list → 2-col → 3-col as ITS container widens */
  .coll{display:flex; flex-direction:column; gap:8px}
  .coll .card{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid #243348; border-radius:10px; padding:9px; display:flex; gap:9px; align-items:center}
  .coll .card .th{width:34px;height:34px;border-radius:8px;background:#22304a;flex:0 0 auto}
  .coll .card .ln{flex:1;min-width:0}.coll .card .ln i{display:block;height:7px;border-radius:4px;background:#26334a;margin-bottom:5px}
  .coll .card .ln i:nth-child(2){width:60%}
  @container leftc (min-width:340px){ .coll{display:grid; grid-template-columns:1fr 1fr} .coll .card{flex-direction:column; align-items:flex-start} .coll .card .th{width:100%;height:42px} }
  @container leftc (min-width:560px){ .coll{grid-template-columns:1fr 1fr 1fr} }

  /* STATS: stacked → 2×2 → row of 4 */
  .stats{display:grid; grid-template-columns:1fr; gap:8px}
  .stats .kpi{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid #243348; border-radius:10px; padding:10px}
  .stats .kpi b{font-size:19px;font-weight:800;letter-spacing:-.02em;display:block}
  .stats .kpi small{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .stats .kpi em{color:var(--accent);font-style:normal;font-size:11px;font-weight:600}
  @container statc (min-width:300px){ .stats{grid-template-columns:1fr 1fr} }
  @container statc (min-width:500px){ .stats{grid-template-columns:repeat(4,1fr)} }

  /* CALENDAR: agenda list → full month grid */
  .cal-month{display:none; grid-template-columns:repeat(7,1fr); gap:4px}
  .cal-month i{aspect-ratio:1;border-radius:4px;background:#22304a}.cal-month i.on{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .cal-agenda{display:flex; flex-direction:column; gap:7px}
  .cal-agenda .ev{display:flex; gap:8px; align-items:center; background:#141d2e; border:1px solid #223150; border-radius:9px; padding:8px}
  .cal-agenda .ev b{width:42px;font-size:11px;color:var(--accent2)} .cal-agenda .ev i{flex:1;height:7px;border-radius:4px;background:#26334a}
  @container calcq (min-width:360px){ .cal-month{display:grid} .cal-agenda{display:none} }
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Container Context</b> · every layout reflows to <i>its own</i> size, not the screen's</div>

  <div class="stage">
    <div id="frame">
      <!-- LEFT region: a collection that re-columns to its own width -->
      <div class="region" id="left" style="container-name:leftc">
        <header><span class="t"><span class="ic ic-a">≣</span>Bookings</span><span class="cqbadge" data-modes='[[560,"3-col grid"],[340,"2-col grid"],[0,"list"]]'>—</span></header>
        <div class="body"><div class="coll" id="coll"></div></div>
      </div>
      <div class="seam v" data-seam="v"></div>
      <!-- RIGHT: a column of two more containers (each independent) -->
      <div id="right">
        <div class="region" id="stats" style="container-name:statc">
          <header><span class="t"><span class="ic ic-b">★</span>Revenue</span><span class="cqbadge" data-modes='[[500,"4 across"],[300,"2×2"],[0,"stacked"]]'>—</span></header>
          <div class="body"><div class="stats" id="stats-grid"></div></div>
        </div>
        <div class="seam h" data-seam="h"></div>
        <div class="region" id="cal" style="container-name:calcq">
          <header><span class="t"><span class="ic ic-c">◧</span>Calendar</span><span class="cqbadge" data-modes='[[360,"month grid"],[0,"agenda"]]'>—</span></header>
          <div class="body">
            <div class="cal-month" id="calm"></div>
            <div class="cal-agenda" id="cala"></div>
          </div>
        </div>
      </div>
      <div class="grab" id="grab" title="resize the whole layout"></div>
    </div>
  </div>
  <div class="hint">drag the <b>corner</b> to resize the whole layout, or a <b>seam</b> to resize one region — each region reflows to <b>its own width</b> (watch the badges). One can be a 3-col grid while its neighbour is a list.</div>
  <div class="scanlines"></div>

<script>
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const frame=document.getElementById('frame');
// fill demo content
document.getElementById('coll').innerHTML=Array.from({length:6},()=>`<div class="card"><div class="th"></div><div class="ln"><i></i><i></i></div></div>`).join('');
document.getElementById('stats-grid').innerHTML=[['MTD','€48.2k','▲12%'],['Today','€3.1k','▲4%'],['Avg','€212','▲2%'],['Refunds','€410','▼1%']].map(k=>`<div class="kpi"><small>${k[0]}</small><b>${k[1]}</b><em>${k[2]}</em></div>`).join('');
document.getElementById('calm').innerHTML=Array.from({length:35},(_,i)=>`<i class="${[8,9,15,22,23].includes(i)?'on':''}"></i>`).join('');
document.getElementById('cala').innerHTML=['09:00','11:30','14:00','16:15'].map(t=>`<div class="ev"><b>${t}</b><i></i></div>`).join('');

// live container badges (the actual reflow is pure CSS @container; this just labels the mode)
function modeFor(el){ const modes=JSON.parse(el.dataset.modes); const w=el.closest('.region').clientWidth;
  for(const [t,label] of modes){ if(w>=t) return w+'px · '+label; } return w+'px'; }
const badges=[...document.querySelectorAll('.cqbadge')];
const ro=new ResizeObserver(()=>badges.forEach(b=>b.textContent=modeFor(b)));
document.querySelectorAll('.region[container-name], .region').forEach(r=>ro.observe(r));

// ---- seams: resize a region (sets flex-basis %) ----
let fr={v:42, h:42}; // left width %, stats height %
function applyFr(){ document.getElementById('left').style.flexBasis=fr.v+'%'; document.getElementById('stats').style.flexBasis=fr.h+'%'; badges.forEach(b=>b.textContent=modeFor(b)); }
let seam=null;
document.querySelectorAll('.seam').forEach(s=>s.addEventListener('pointerdown',e=>{
  e.preventDefault(); s.setPointerCapture(e.pointerId); s.classList.add('active');
  const isV=s.dataset.seam==='v'; const box=isV?frame.getBoundingClientRect():document.getElementById('right').getBoundingClientRect();
  seam={isV, box, key:isV?'v':'h'};
}));
addEventListener('pointermove',e=>{
  if(!seam) return;
  if(seam.isV){ fr.v=clamp((e.clientX-seam.box.left-8)/(seam.box.width-16)*100, 16, 80); }
  else { fr.h=clamp((e.clientY-seam.box.top-8)/(seam.box.height-16)*100, 16, 82); }
  applyFr();
});
addEventListener('pointerup',()=>{ if(seam){ document.querySelectorAll('.seam').forEach(s=>s.classList.remove('active')); seam=null; } });

// ---- corner grab: resize the whole frame (cascades into every container) ----
let grab=null;
document.getElementById('grab').addEventListener('pointerdown',e=>{ e.preventDefault(); e.stopPropagation();
  document.getElementById('grab').setPointerCapture(e.pointerId);
  grab={sx:e.clientX, sy:e.clientY, w:frame.offsetWidth, h:frame.offsetHeight}; });
addEventListener('pointermove',e=>{ if(!grab) return;
  frame.style.width=clamp(grab.w+(e.clientX-grab.sx),360,1180)+'px';
  frame.style.height=clamp(grab.h+(e.clientY-grab.sy),340,720)+'px'; });
addEventListener('pointerup',()=>{ grab=null; });

// screenshot helpers: ?w= & ?h= preset the frame size; ?seam=NN sets the central split
const q=new URLSearchParams(location.search);
if(q.get('w')) frame.style.width=clamp(+q.get('w'),360,1180)+'px';
if(q.get('h')) frame.style.height=clamp(+q.get('h'),340,720)+'px';
if(q.get('seam')) fr.v=clamp(+q.get('seam'),16,80);
applyFr();
requestAnimationFrame(()=>badges.forEach(b=>b.textContent=modeFor(b)));
</script>
</body>
</html>
