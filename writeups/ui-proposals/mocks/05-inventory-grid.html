<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inventory Grid</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73;
    --gold:#ffd34d; --violet:#9d7bff; --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1200px 700px at 70% -10%, #15314a55, transparent),
      radial-gradient(900px 600px at -10% 110%, #2a123a55, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%}
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:var(--glow) var(--gold)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  /* ===== INVENTORY GRID specifics ===== */
  /* Panes are workspace cards (t=0). On collapse they shrink + fly into pixel-grid
     slots on the "inventory" backpack docked at the right (t=1), snapping onto cells
     like Diablo/Tetris items. Each item has a rarity-colored border + a footprint. */
  .stage{position:absolute; inset:0}
  .pane{position:absolute; will-change:transform,width,height;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    border-radius:14px; padding:14px; overflow:hidden; box-shadow:inset 0 1px 0 #ffffff0a, 0 14px 36px #0009; z-index:20}
  .pane h4{margin:0 0 10px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center; white-space:nowrap}
  .ic{width:22px;height:22px;border-radius:7px; display:grid; place-items:center; font-size:13px; flex:none}
  .rows{display:flex; flex-direction:column; gap:8px}
  .row{height:12px; border-radius:6px; background:#26334a; opacity:.85}
  .row.s{width:55%} .row.m{width:80%} .row.l{width:100%}
  .grid3{display:grid; gap:8px; grid-template-columns:repeat(3,1fr)}
  .tile{aspect-ratio:1; border-radius:9px; background:linear-gradient(135deg,#22304a,#1a2236); border:1px solid #2b3a55; display:grid; place-items:center; color:#3f5377; font-size:18px}
  .rarity{position:absolute; inset:0; border-radius:14px; pointer-events:none; box-shadow:inset 0 0 0 1.5px var(--rc), var(--glow) color-mix(in srgb, var(--rc) 40%, transparent)}

  /* the inventory backpack panel docked right — always visible pixel grid */
  .bag{position:absolute; right:26px; top:84px; width:280px;
    background:linear-gradient(180deg,#0e1422,#0b0f1a); border:1px solid var(--edge);
    border-radius:16px; padding:14px; box-shadow:0 18px 50px #000a, inset 0 1px 0 #ffffff08; z-index:5}
  .bag h4{margin:0 0 12px; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .cells{position:relative; --cell:60px; --gap:6px; display:grid; grid-template-columns:repeat(4,var(--cell)); grid-auto-rows:var(--cell); gap:var(--gap)}
  .cell{border-radius:8px; background:repeating-linear-gradient(45deg,#10182788 0 6px,#0d141f88 6px 12px); border:1px solid #1c2740; box-shadow:inset 0 0 12px #0006}
  .weight{margin-top:12px; height:8px; border-radius:6px; background:#0008; border:1px solid #ffffff10; overflow:hidden}
  .weight > i{display:block; height:100%; width:62%; background:linear-gradient(90deg,var(--gold),var(--accent)); box-shadow:var(--glow) var(--gold)}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Inventory Grid</b> · panes shrink &amp; snap into your backpack slots like loot</div>

  <div class="stage">
    <!-- the always-visible inventory backpack (4-wide pixel grid) -->
    <div class="bag">
      <h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">▣</span>Backpack · 4×6</h4>
      <div class="cells">
        <!-- 24 grid cells -->
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <div class="weight"><i></i></div>
    </div>

    <!-- WORKSPACE panes. data-* carry the target slot footprint in grid units. -->
    <!-- 2x2 hero item (gold/legendary) -->
    <div class="pane" id="p0" data-gx="0" data-gy="0" data-gw="2" data-gh="2" style="--rc:var(--gold); left:60px; top:96px; width:430px; height:300px">
      <h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">★</span>Project Board</h4>
      <div class="grid3"><div class="tile">◆</div><div class="tile">◈</div><div class="tile">✶</div><div class="tile">❖</div><div class="tile">◢</div><div class="tile">▣</div></div>
      <div class="rarity"></div>
    </div>
    <!-- 2x1 wide item (accent) -->
    <div class="pane" id="p1" data-gx="2" data-gy="0" data-gw="2" data-gh="1" style="--rc:var(--accent); left:60px; top:420px; width:430px; height:150px">
      <h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Activity Stream</h4>
      <div class="rows"><div class="row l"></div><div class="row m"></div><div class="row s"></div></div>
      <div class="rarity"></div>
    </div>
    <!-- 1x1 item (violet) -->
    <div class="pane" id="p2" data-gx="2" data-gy="1" data-gw="1" data-gh="1" style="--rc:var(--violet); left:540px; top:96px; width:230px; height:204px">
      <h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Notes</h4>
      <div class="rows"><div class="row m"></div><div class="row"></div><div class="row s"></div></div>
      <div class="rarity"></div>
    </div>
    <!-- 1x1 item (accent2) -->
    <div class="pane" id="p3" data-gx="3" data-gy="1" data-gw="1" data-gh="1" style="--rc:var(--accent2); left:540px; top:330px; width:230px; height:204px">
      <h4><span class="ic" style="background:#4a2230;color:var(--accent2)">✶</span>Inbox</h4>
      <div class="rows"><div class="row"></div><div class="row m"></div><div class="row s"></div></div>
      <div class="rarity"></div>
    </div>
  </div>

  <div class="hint">click anywhere — panes drop into your backpack grid · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const panes=[...document.querySelectorAll('.pane')];
  const bag=document.querySelector('.bag');
  const cellsEl=document.querySelector('.cells');

  // resolve the target grid-slot rect (in viewport px) for a pane's footprint.
  function slotRect(p){
    const cs=getComputedStyle(cellsEl);
    const cell=parseFloat(cs.getPropertyValue('--cell'));
    const gap=parseFloat(cs.getPropertyValue('--gap'));
    const origin=cellsEl.getBoundingClientRect();
    const gx=+p.dataset.gx, gy=+p.dataset.gy, gw=+p.dataset.gw, gh=+p.dataset.gh;
    return {
      x: origin.left + gx*(cell+gap),
      y: origin.top  + gy*(cell+gap),
      w: gw*cell + (gw-1)*gap,
      h: gh*cell + (gh-1)*gap
    };
  }

  // t=0 → workspace cards full size at their authored left/top/width/height.
  // t=1 → each shrinks + flies into its backpack slot, snapping onto the grid.
  function render(t){
    document.documentElement.style.setProperty('--t',t);
    panes.forEach((p,i)=>{
      // home (expanded) rect from inline styles
      const hx=parseFloat(p.style.left), hy=parseFloat(p.style.top);
      const hw=parseFloat(p.style.width), hh=parseFloat(p.style.height);
      const slot=slotRect(p);
      // staggered settle: each item lands on a slightly delayed, overshooting curve
      const d=i*0.06;
      let lt=clamp((t-d)/(1-d));
      // overshoot near the end so it "settles" onto the cell with a tiny bounce
      const s = lt<1 ? lt + Math.sin(lt*Math.PI)*0.10*(1-lt) : lt;
      const x=lerp(hx, slot.x, s);
      const y=lerp(hy, slot.y, s);
      const w=lerp(hw, slot.w, s);
      const h=lerp(hh, slot.h, s);
      p.style.transform=`translate(${x-hx}px,${y-hy}px)`;
      p.style.width=w+'px';
      p.style.height=h+'px';
      // a little airborne tumble that resolves to flat as it snaps in
      const tumble = Math.sin(lt*Math.PI) * 6;
      p.style.transform += ` rotate(${tumble}deg)`;
      p.style.borderRadius=lerp(14,9,s)+'px';
      p.style.padding=lerp(14,4,clamp(s*1.4))+'px';
      // content fades as the item miniaturizes; rarity border brightens on landing
      const content=p.querySelectorAll('h4,.rows,.grid3');
      content.forEach(c=>{ c.style.opacity=lerp(1,0,clamp(s*1.6)); });
      p.style.boxShadow=`inset 0 1px 0 #ffffff0a, 0 ${lerp(14,4,s)}px ${lerp(36,12,s)}px #0009`;
      p.style.zIndex = 20 + Math.round(lt*10);
      p.querySelector('.rarity').style.opacity=lerp(.55,1,s);
    });
    // bag glows brighter & lifts subtly as items pour in
    bag.style.filter=`brightness(${lerp(1,1.16,t)}) saturate(${lerp(1,1.2,t)})`;
    bag.style.boxShadow=`0 18px 50px #000a, inset 0 1px 0 #ffffff08, ${lerp(0,0,t)}px 0 ${lerp(0,40,t)}px color-mix(in srgb,var(--gold) ${Math.round(t*30)}%,transparent)`;
  }

  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }
  addEventListener('resize', ()=>render(t));

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
