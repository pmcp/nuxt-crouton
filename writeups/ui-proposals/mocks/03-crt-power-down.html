<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CRT Power-Down</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff;
    --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 60% -10%, #15314a44, transparent),
      radial-gradient(900px 600px at -10% 110%, #2a123a44, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%;
  }
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; letter-spacing:.04em; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:var(--glow) var(--accent)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .hint code{color:var(--ink)}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06;
    background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  /* 2x2 tree of panes — one of them powers down (CRT shut-off) */
  .grid{position:absolute; inset:0; display:grid; gap:18px; padding:78px 26px 56px;
    grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr}
  .slot{position:relative; display:grid; place-items:stretch}

  .pane{position:relative; overflow:hidden; border-radius:14px;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    box-shadow:inset 0 1px 0 #ffffff0a, 0 10px 30px #0008; transform-origin:center center; will-change:transform,opacity,filter}
  .pane .body{position:absolute; inset:0; padding:16px; transform-origin:center center; will-change:transform}
  .pane h4{margin:0 0 12px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .ic{width:22px;height:22px;border-radius:7px; display:grid; place-items:center; font-size:13px}
  .rows{display:flex; flex-direction:column; gap:9px}
  .row{height:12px;border-radius:6px;background:#26334a;opacity:.85}
  .row.s{width:52%} .row.m{width:78%} .row.l{width:96%}
  .tilerow{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px}
  .tile{aspect-ratio:1;border-radius:9px;background:linear-gradient(135deg,#22304a,#1a2236);border:1px solid #2b3a55;
    display:grid;place-items:center;font-size:18px;color:#46618c}

  /* the over-bright CRT flash bar + standby dot live on the powered pane's slot */
  .flash{position:absolute; left:0; right:0; top:50%; height:3px; transform:translateY(-50%) scaleX(1);
    background:#fff; border-radius:2px; opacity:0; pointer-events:none; z-index:6;
    box-shadow:0 0 30px 8px #fff, 0 0 60px 16px var(--accent)}
  .glassglow{position:absolute; inset:0; border-radius:14px; pointer-events:none; z-index:5;
    box-shadow:inset 0 0 60px #36e0c000; opacity:0}
  .standby{position:absolute; left:50%; top:50%; width:14px; height:14px; margin:-7px 0 0 -7px;
    border-radius:50%; background:#fff; opacity:0; z-index:7; cursor:pointer;
    box-shadow:0 0 12px 3px var(--accent2), 0 0 28px 8px #ff5d7388}
  .standby::after{content:"POWER"; position:absolute; left:50%; top:20px; transform:translateX(-50%);
    font-size:9px; letter-spacing:.2em; color:var(--dim); white-space:nowrap}
  .standby.live{opacity:1; animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>CRT Power-Down</b> · one pane shuts off like an old TV — collapses to a line, then a dot</div>

  <div class="grid">
    <!-- TOP-LEFT: the pane that powers down -->
    <div class="slot" id="slot">
      <div class="pane" id="crt">
        <div class="body">
          <h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Live Feed</h4>
          <div class="rows"><div class="row l"></div><div class="row m"></div><div class="row s"></div></div>
          <div class="tilerow"><div class="tile">▣</div><div class="tile">◢</div><div class="tile">❖</div></div>
        </div>
      </div>
      <div class="glassglow" id="glassglow"></div>
      <div class="flash" id="flash"></div>
      <div class="standby" id="standby"></div>
    </div>

    <!-- the three panes that stay on -->
    <div class="slot"><div class="pane"><div class="body">
      <h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Inventory</h4>
      <div class="rows"><div class="row m"></div><div class="row l"></div><div class="row s"></div><div class="row m"></div></div>
    </div></div></div>

    <div class="slot"><div class="pane"><div class="body">
      <h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">★</span>Stats</h4>
      <div class="rows"><div class="row l"></div><div class="row s"></div><div class="row m"></div></div>
      <div class="tilerow"><div class="tile">✶</div><div class="tile">◆</div><div class="tile">★</div></div>
    </div></div></div>

    <div class="slot"><div class="pane"><div class="body">
      <h4><span class="ic" style="background:#4a2230;color:var(--accent2)">✶</span>Quests</h4>
      <div class="rows"><div class="row m"></div><div class="row m"></div><div class="row l"></div><div class="row s"></div></div>
    </div></div></div>
  </div>

  <div class="hint">click anywhere — the top-left pane powers down · click the <code>●</code> standby dot to power back on · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  // ===== shared render contract =====
  // render(t): t in [0,1]. 0 = pane fully ON/expanded; 1 = pane fully OFF (a faded standby dot).
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const crt=document.getElementById('crt');
  const body=crt.querySelector('.body');
  const flash=document.getElementById('flash');
  const glow=document.getElementById('glassglow');
  const standby=document.getElementById('standby');

  function render(t){
    document.documentElement.style.setProperty('--t',t);
    // Two-phase CRT shut-off (drive ALL of it from t alone):
    //   phase A  t 0 -> 0.55 : content snaps vertically to a thin bright line (scaleY -> ~0)
    //   phase B  t 0.55 -> 1 : that line collapses horizontally to a single dot (scaleX -> ~0) and fades
    const a = clamp(t/0.55);                       // 0..1 over phase A
    const b = clamp((t-0.55)/0.45);                // 0..1 over phase B

    // easing: vertical squash is snappy; horizontal pinch eases out
    const ay = 1 - a*a;                             // 1 -> 0 (accelerating squash)
    const sy = lerp(1, 0.012, ay>0?1-ay:1);        // (kept simple below)
    const scaleY = lerp(1, 0.014, a*a);            // height collapses to a hairline
    const scaleX = lerp(1, 0.0, b);                // width pinches to a dot in phase B

    crt.style.transform = `scaleY(${scaleY}) scaleX(${scaleX})`;
    // the bright phosphor line: as the picture squashes, the whole pane glows brighter & whiter
    const heat = a;                                // 0 cool -> 1 white-hot line
    crt.style.filter = `brightness(${lerp(1,2.2,heat)}) saturate(${lerp(1,0.2,heat)}) contrast(${lerp(1,1.4,heat)})`;
    crt.style.background = `linear-gradient(180deg,
        ${mix('#161d2e','#eafff9',heat)}, ${mix('#121826','#bff7ec',heat)})`;
    crt.style.boxShadow = `inset 0 1px 0 #ffffff0a, 0 10px 30px #0008, 0 0 ${lerp(0,50,heat)}px ${lerp(0,8,heat)}px #36e0c0aa`;

    // content fades as it squashes (you can't read a hairline)
    body.style.opacity = lerp(1,0,clamp(a*1.4));
    body.style.transform = `scaleY(${lerp(1,0.4,a)})`;

    // over-bright flash bar — peaks right at the A→B handoff (the classic CRT line)
    const flashAmt = Math.sin(clamp((t-0.40)/0.30)*Math.PI); // 0..1..0 around t≈0.55
    flash.style.opacity = clamp(flashAmt*1.1);
    flash.style.transform = `translateY(-50%) scaleX(${lerp(1,0.04,b)})`; // bar pinches to a dot too

    // faint phosphor afterglow ring on the empty glass once it's off
    glow.style.opacity = lerp(0, .0, t) + (t>0.55 ? lerp(0,.5,b) : 0);
    glow.style.boxShadow = `inset 0 0 ${lerp(0,70,b)}px ${mix('#0a0e14','#36e0c0',lerp(.0,.5,b))}`;

    // the lingering standby dot: blooms in at the very end, the click-to-power-on target
    const dot = clamp((t-0.82)/0.18);
    standby.style.opacity = dot;
    standby.style.boxShadow = `0 0 ${lerp(4,12,dot)}px ${lerp(1,3,dot)}px var(--accent2), 0 0 28px 8px #ff5d7355`;
    standby.classList.toggle('live', t>0.985);
  }
  // tiny hex color mixer for the heat-up
  function mix(c1,c2,m){
    const p=h=>[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));
    const [r1,g1,b1]=p(c1),[r2,g2,b2]=p(c2);
    const h=v=>Math.round(v).toString(16).padStart(2,'0');
    return '#'+h(lerp(r1,r2,m))+h(lerp(g1,g2,m))+h(lerp(b1,b2,m));
  }

  // ===== screenshot mode vs interactive mode =====
  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else {
    render(0);
    const toggle=()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); };
    standby.addEventListener('click',e=>{ e.stopPropagation(); if(target>0.5) toggle(); }); // power back on
    addEventListener('click', toggle);                                                      // power down (or on)
  }

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
