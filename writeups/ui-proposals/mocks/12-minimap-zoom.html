<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Minimap Zoom</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff;
    --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 30% -10%, #15314a55, transparent),
      radial-gradient(900px 600px at 110% 110%, #2a123a55, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%;
  }
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; letter-spacing:.04em; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:var(--glow) var(--accent)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .hint code{color:var(--accent)}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06;
    background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  .stage{position:absolute; inset:26px}

  /* ===== MINIMAP ZOOM specifics ===== */
  /* A full-bleed MAP pane that, on collapse, scales down toward the bottom-right
     corner into a rounded game minimap (viewport frame + blips + N marker),
     while the satellite panes reflow to claim the freed space. */
  .pane{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    border-radius:14px; overflow:hidden; box-shadow:inset 0 1px 0 #ffffff0a, 0 14px 36px #0008; position:absolute}
  .pane h4{margin:0; padding:12px 14px 0; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .ic{width:9px;height:9px;border-radius:3px}
  .rows{display:flex; flex-direction:column; gap:9px; padding:12px 14px}
  .row{height:12px;border-radius:6px;background:#26334a;opacity:.85}
  .row.s{width:55%} .row.m{width:80%} .row.l{width:100%}

  /* satellite panes — collapsed (t=0): squeezed into a left rail.
     expanded (t=1): they grow to fill the space the map vacates. */
  .sat{left:0; will-change:transform,width,height}
  #sat1{top:0}
  #sat2{top:0}
  #sat3{top:0}

  /* THE MAP — full-bleed at t=0, corner minimap at t=1 */
  .map{position:absolute; right:0; bottom:0; overflow:hidden; will-change:transform,border-radius;
    transform-origin:100% 100%; z-index:20;
    background:radial-gradient(700px 500px at 42% 38%, #14304688, #0c1119);
    border:1px solid var(--edge)}
  .map .terrain{position:absolute; inset:0; opacity:.55;
    background-image:linear-gradient(#1c3450 1px,transparent 1px),linear-gradient(90deg,#1c3450 1px,transparent 1px);
    background-size:46px 46px; mask-image:radial-gradient(80% 80% at 50% 50%,#000,transparent)}
  .map .water{position:absolute; left:8%; top:12%; width:38%; height:30%; border-radius:40% 60% 55% 45%;
    background:radial-gradient(circle at 40% 35%, #1d4e6e, #123a52); opacity:.7; filter:blur(1px)}
  .map .land{position:absolute; right:10%; bottom:14%; width:42%; height:38%; border-radius:55% 45% 50% 50%;
    background:radial-gradient(circle at 60% 40%, #2a4030, #1c2c22); opacity:.7}
  .blip{position:absolute; width:9px;height:9px;border-radius:50%; background:var(--accent2); box-shadow:var(--glow) var(--accent2); transform:translate(-50%,-50%)}
  .blip.g{background:var(--gold); box-shadow:var(--glow) var(--gold)}
  .blip.c{background:var(--accent); box-shadow:var(--glow) var(--accent)}
  .player{position:absolute; left:50%; top:50%; width:20px;height:20px; transform:translate(-50%,-50%) rotate(28deg);
    background:conic-gradient(from 200deg, var(--accent), #1ec); clip-path:polygon(50% 0,100% 100%,50% 78%,0 100%); filter:drop-shadow(0 0 8px var(--accent))}
  /* viewport rectangle — only meaningful when the map is a minimap */
  .viewport{position:absolute; border:2px solid #ffffffcc; border-radius:4px; box-shadow:0 0 10px #fff5, inset 0 0 12px #fff2;
    left:50%; top:50%; transform:translate(-50%,-50%); pointer-events:none}
  /* North marker for the corner minimap */
  .north{position:absolute; top:6px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:700; color:#cfe3ff; letter-spacing:.1em; opacity:0; text-shadow:0 0 6px #6cf}
  .maplabel{position:absolute; top:10px; left:12px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .maplabel .ic{background:var(--accent)}
  .minimask{position:absolute; inset:0; pointer-events:none; border-radius:inherit; box-shadow:inset 0 0 0 2px #36e0c000}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Minimap Zoom</b> · the map shrinks into a live corner minimap; the panes reflow to fill the space</div>

  <div class="stage">
    <!-- satellites: claim the freed space as the map shrinks -->
    <div class="pane sat" id="sat1">
      <h4><span class="ic" style="background:var(--violet)"></span>Squad</h4>
      <div class="rows"><div class="row l"></div><div class="row m"></div><div class="row s"></div></div>
    </div>
    <div class="pane sat" id="sat2">
      <h4><span class="ic" style="background:var(--gold)"></span>Objectives</h4>
      <div class="rows"><div class="row m"></div><div class="row l"></div><div class="row s"></div></div>
    </div>
    <div class="pane sat" id="sat3">
      <h4><span class="ic" style="background:var(--accent2)"></span>Comms Log</h4>
      <div class="rows"><div class="row s"></div><div class="row m"></div><div class="row l"></div><div class="row m"></div></div>
    </div>

    <!-- THE MAP -->
    <div class="map pane" id="map">
      <div class="terrain"></div>
      <div class="water"></div>
      <div class="land"></div>
      <div class="maplabel" id="maplabel"><span class="ic"></span>Tactical Map</div>
      <div class="north" id="north">▲ N</div>
      <div class="player"></div>
      <div class="blip" style="left:34%;top:28%"></div>
      <div class="blip g" style="left:66%;top:60%"></div>
      <div class="blip c" style="left:58%;top:22%"></div>
      <div class="blip" style="left:24%;top:64%"></div>
      <div class="blip g" style="left:78%;top:40%"></div>
      <div class="viewport" id="viewport"></div>
      <div class="minimask" id="minimask"></div>
    </div>
  </div>

  <div class="hint">click anywhere — the map docks to the corner minimap · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const map=document.getElementById('map');
  const sats=[document.getElementById('sat1'),document.getElementById('sat2'),document.getElementById('sat3')];
  // geometry of the stage (inset:26px)
  function dims(){ return {W:innerWidth-52, H:innerHeight-52}; }
  // t=0 → map is FULL-BLEED (the whole stage); satellites squeezed to a thin left rail.
  // t=1 → map is a small rounded corner MINIMAP; satellites expanded to fill the space.
  function render(t){
    document.documentElement.style.setProperty('--t',t);
    const {W,H}=dims();
    const gap=14;
    // --- MAP: full stage -> corner thumbnail ---
    const mapW = lerp(W, 220, t);
    const mapH = lerp(H, 180, t);
    map.style.width = mapW+'px';
    map.style.height = mapH+'px';
    map.style.borderRadius = lerp(14, 90*0.5, t)+'px';   // tighten toward round-ish
    // make it read as round-cornered minimap near the end
    const radius = lerp(14, 26, clamp((t-0.4)/0.6))+'px';
    map.style.borderRadius = radius;
    map.style.borderColor = t>0.6 ? '#36e0c0' : 'var(--edge)';
    map.style.boxShadow = `inset 0 1px 0 #ffffff0a, 0 ${lerp(14,22,t)}px ${lerp(36,50,t)}px #000a, ${t>0.5?'var(--glow) #36e0c033':'none'}`;
    map.style.filter = `brightness(${lerp(1,1.12,t)}) saturate(${lerp(1,1.2,t)})`;
    // viewport rectangle: invisible/huge when full, a crisp small frame when mini
    const vp=document.getElementById('viewport');
    const vpW=lerp(mapW*0.95, mapW*0.42, t), vpH=lerp(mapH*0.95, mapH*0.4, t);
    vp.style.width=vpW+'px'; vp.style.height=vpH+'px';
    vp.style.opacity = clamp((t-0.45)/0.4).toFixed(2);
    // north marker + minimask ring fade in as it becomes a minimap
    document.getElementById('north').style.opacity = clamp((t-0.55)/0.35).toFixed(2);
    document.getElementById('maplabel').style.opacity = lerp(1,0,clamp(t/0.5)).toFixed(2);
    document.getElementById('minimask').style.boxShadow = `inset 0 0 0 2px rgba(54,224,192,${(clamp((t-0.5)/0.5)*0.5).toFixed(2)})`;

    // --- SATELLITES: thin left rail -> fill the freed region ---
    // collapsed width (t=0): a slim rail; expanded width (t=1): wide, three stacked
    const railW = 150;
    const fullW = lerp(railW, W*0.46, t);          // panes grow wider
    const colX = 0;                                 // anchored left
    const rowH = (H - gap*2)/3;
    sats.forEach((s,i)=>{
      const h = lerp(rowH*0.92, rowH, t);
      s.style.left = colX+'px';
      s.style.top  = (i*(rowH+gap*0))+ (i*gap) + 'px';
      s.style.top  = (i*(h+gap))+'px';
      s.style.width = fullW+'px';
      s.style.height = h+'px';
      // they brighten + saturate as they take focus
      s.style.filter = `brightness(${lerp(0.82,1.04,t)})`;
      s.style.opacity = lerp(0.7,1,t).toFixed(2);
      s.style.borderColor = t>0.6 ? '#2b3a55' : 'var(--edge)';
      s.style.transform = `translateX(${lerp(-8,0,t)}px)`;
    });
  }
  addEventListener('resize',()=>render(currentT));
  let currentT=0;
  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function _r(v){ currentT=v; render(v); }
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;_r(t);raf=null;return;} _r(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ _r(clamp(parseFloat(tParam))); }
  else { _r(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
