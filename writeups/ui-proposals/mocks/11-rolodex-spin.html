<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rolodex Spin</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff;
    --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 50% 8%, #16314a55, transparent),
      radial-gradient(800px 600px at 50% 120%, #2a123a66, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%;
  }
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; letter-spacing:.04em; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:var(--glow) var(--gold)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .hint code{color:var(--accent)}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06;
    background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  /* ===== ROLODEX SPIN specifics ===== */
  /* A vertical drum: ~5 panes mounted at evenly spaced rotateX angles around a
     cylinder of radius R. Only the front pane faces you full + bright; the rest
     curve away, foreshortened + dim. render(t) adds t*stepAngle to every pane,
     spinning the drum so the front pane rolls up-and-back. */
  .scene{position:absolute; inset:0; display:grid; place-items:center;
    perspective:1200px; perspective-origin:50% 46%}
  .drum{position:relative; width:520px; height:300px; transform-style:preserve-3d; will-change:transform}

  .card{position:absolute; left:50%; top:50%; width:520px; height:300px; margin:-150px 0 0 -260px;
    transform-style:preserve-3d; backface-visibility:hidden; will-change:transform,opacity}
  .pane{position:absolute; inset:0;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--edge); border-radius:18px; padding:22px 26px; overflow:hidden;
    box-shadow:inset 0 1px 0 #ffffff0a, 0 26px 60px #000a}
  .pane::after{content:""; position:absolute; inset:0; border-radius:18px; pointer-events:none;
    box-shadow:inset 0 0 60px var(--shade,#0009)}
  .pane h4{margin:0 0 16px; font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim);
    display:flex; gap:10px; align-items:center}
  .ic{width:26px;height:26px;border-radius:8px; display:grid; place-items:center; font-size:15px}
  .body{display:flex; gap:20px}
  .rows{display:flex; flex-direction:column; gap:11px; flex:1}
  .row{height:14px;border-radius:7px;background:#26334a;opacity:.85}
  .row.s{width:50%} .row.m{width:78%} .row.l{width:100%}
  .grid{display:grid; gap:10px; grid-template-columns:repeat(2,1fr); width:150px}
  .tile{aspect-ratio:1; border-radius:12px; background:linear-gradient(135deg,#22304a,#1a2236); border:1px solid #2b3a55;
    display:grid; place-items:center; font-size:20px; color:#3f5170}
  .spindle{position:absolute; left:50%; top:50%; width:8px; height:560px; margin:-280px 0 0 -4px;
    background:linear-gradient(180deg,transparent,#2c3a55 14%,#2c3a55 86%,transparent);
    transform:translateZ(-2px); border-radius:8px; z-index:-1; opacity:.7}
  .frontglow{position:absolute; inset:-2px; border-radius:18px; pointer-events:none;
    box-shadow:0 0 0 1px #ffffff14, var(--glow) #36e0c044}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Rolodex Spin</b> · the drum rolls the front pane up-and-back, bringing the next to face you</div>

  <div class="scene">
    <div class="spindle"></div>
    <div class="drum" id="drum">
      <div class="card" data-i="0"><div class="pane"><div class="frontglow"></div>
        <h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Overview</h4>
        <div class="body"><div class="rows"><div class="row l"></div><div class="row m"></div><div class="row s"></div><div class="row m"></div></div>
        <div class="grid"><div class="tile">◆</div><div class="tile">▣</div><div class="tile">✶</div><div class="tile">❖</div></div></div></div></div>

      <div class="card" data-i="1"><div class="pane">
        <h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Inventory</h4>
        <div class="body"><div class="rows"><div class="row m"></div><div class="row l"></div><div class="row s"></div><div class="row m"></div></div>
        <div class="grid"><div class="tile">★</div><div class="tile">◢</div><div class="tile">◈</div><div class="tile">▣</div></div></div></div></div>

      <div class="card" data-i="2"><div class="pane">
        <h4><span class="ic" style="background:#4a2230;color:var(--accent2)">✶</span>Quests</h4>
        <div class="body"><div class="rows"><div class="row s"></div><div class="row m"></div><div class="row l"></div><div class="row s"></div></div>
        <div class="grid"><div class="tile">❖</div><div class="tile">★</div><div class="tile">◆</div><div class="tile">✶</div></div></div></div></div>

      <div class="card" data-i="3"><div class="pane">
        <h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">★</span>Stats</h4>
        <div class="body"><div class="rows"><div class="row l"></div><div class="row s"></div><div class="row m"></div><div class="row l"></div></div>
        <div class="grid"><div class="tile">▣</div><div class="tile">◈</div><div class="tile">◢</div><div class="tile">★</div></div></div></div></div>

      <div class="card" data-i="4"><div class="pane">
        <h4><span class="ic" style="background:#24344f;color:#7fb4ff">❖</span>Comms</h4>
        <div class="body"><div class="rows"><div class="row m"></div><div class="row s"></div><div class="row l"></div><div class="row m"></div></div>
        <div class="grid"><div class="tile">◆</div><div class="tile">✶</div><div class="tile">❖</div><div class="tile">▣</div></div></div></div></div>
    </div>
  </div>

  <div class="hint">click anywhere — the drum spins one notch · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const cards=[...document.querySelectorAll('.card')];
  const N=cards.length;
  const R=360;                       // cylinder radius (px)
  const step=360/N;                  // angle between mounted panes
  // t=0 → pane 0 is dead front (angle 0), full + bright. Others curve away.
  // t=1 → drum has spun one notch (+step), so pane 0 rolled up-and-back and the
  //        next neighbor now faces you. render(t) is fully determined by t.
  function render(t){
    document.documentElement.style.setProperty('--t',t);
    const spin = t*step;             // current drum rotation
    cards.forEach((c,i)=>{
      const ang = i*step + spin;     // this pane's live angle on the drum
      // place on the cylinder: rotateX then push out by R along its own normal
      const r = ang*Math.PI/180;
      const cosv = Math.cos(r);      // 1 when facing you, -1 when at the back
      const facing = (cosv+1)/2;     // 0..1 frontness
      // foreshorten + dim the side/back panes; pop the front one
      const sc = lerp(0.6, 1.0, facing);                 // front big, sides small
      const op = lerp(0.0, 1.0, Math.pow(facing,1.4));   // back fades out
      const bright = lerp(0.45, 1.18, facing);
      const sat = lerp(0.7, 1.25, facing);
      c.style.transform = `rotateX(${-ang}deg) translateZ(${R}px) scale(${sc})`;
      c.style.opacity = op.toFixed(3);
      c.style.zIndex = Math.round(facing*100);
      const pane=c.querySelector('.pane');
      pane.style.filter = `brightness(${bright}) saturate(${sat})`;
      // darken the inner shade as the pane curves away
      pane.style.setProperty('--shade', `rgba(0,0,0,${lerp(.85,.0,facing).toFixed(2)})`);
      pane.style.borderColor = facing>0.85 ? '#34507a' : 'var(--edge)';
      const fg=c.querySelector('.frontglow');
      if(fg) fg.style.opacity = clamp((facing-0.7)/0.3);
    });
    // give the whole drum a tiny live wobble as it turns (peaks mid-roll)
    const wob = Math.sin(t*Math.PI)*4;
    document.getElementById('drum').style.transform = `rotateZ(${wob*0.1}deg)`;
  }
  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
