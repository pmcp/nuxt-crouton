<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rearrange · drag panes inside a layout</title>
<style>
  :root{
    --bg:#070a10; --bg2:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d; --edge2:#2b3a55;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73;
    --gold:#ffd34d; --violet:#9d7bff; --blue:#7fb4ff; --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:
      radial-gradient(1200px 800px at 75% -10%, #15314a33, transparent),
      radial-gradient(1000px 700px at -10% 110%, #2a123a33, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; height:100%; -webkit-font-smoothing:antialiased}
  .chip{position:fixed; top:18px; left:18px; z-index:60; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; backdrop-filter:blur(8px)}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);box-shadow:var(--glow) var(--violet)}
  .chip b{font-weight:700}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:60; pointer-events:none; text-align:center}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:90; opacity:.04; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  .stage{position:absolute; inset:0; display:grid; place-items:center}
  /* the bound layout */
  #frame{position:relative; width:min(78vw,820px); height:min(70vh,500px);
    border:1.5px solid var(--edge2); border-radius:18px; background:#0b1018; padding:8px;
    box-shadow:0 24px 60px #000a, inset 0 0 0 1px #ffffff08, 0 0 50px -10px #9d7bff33}
  .badge{position:absolute; top:-12px; left:18px; z-index:6; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    background:#0b1018; border:1px solid var(--edge2); color:var(--violet); border-radius:999px; padding:3px 10px}

  .split{display:flex; gap:8px; width:100%; height:100%}
  .split.col{flex-direction:column}
  .split>.cell{flex:1 1 0; min-width:0; min-height:0; display:flex}
  .gutter{flex:0 0 4px; align-self:stretch; border-radius:3px; background:#1c2740}

  .pane{position:relative; flex:1 1 0; min-width:0; min-height:0; border-radius:11px; padding:11px; overflow:hidden;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid #243348; cursor:grab;
    box-shadow:inset 0 1px 0 #ffffff08; will-change:transform}
  .pane:active{cursor:grabbing}
  .pane.lifted{opacity:.25; filter:saturate(.5)}      /* the gap left behind */
  .pane h4{margin:0 0 9px; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); display:flex; gap:7px; align-items:center; pointer-events:none}
  .pane .ic{width:18px;height:18px;border-radius:6px; display:grid; place-items:center; font-size:11px; flex:0 0 auto}
  .gr{pointer-events:none}
  .row-{height:9px;border-radius:5px;background:#26334a;opacity:.85;margin-bottom:7px}
  .row-.s{width:55%}.row-.m{width:78%}.row-.l{width:95%}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal i{aspect-ratio:1;border-radius:3px;background:#22304a}
  .cal i.on{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .bars{display:flex;align-items:flex-end;gap:5px;height:46px;margin-top:4px}
  .bars i{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--accent),#1c8f7e)}
  .kpi{font-size:24px;font-weight:800;letter-spacing:-.02em}.kpi small{font-size:12px;color:var(--accent);font-weight:600;margin-left:6px}
  .field{height:22px;border-radius:7px;background:#1a2336;border:1px solid #283651;margin-bottom:7px}
  .mapb{position:relative;height:60px;margin-top:4px;border-radius:8px;background:radial-gradient(60px 40px at 40% 50%,#16324a,#0e1c2e);overflow:hidden}
  .mapb i{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}

  /* drag ghost + drop zone */
  #ghost{position:fixed; z-index:70; border-radius:12px; pointer-events:none; opacity:0;
    box-shadow:0 30px 70px #000c, 0 0 0 1px #ffffff14, 0 0 40px -6px #9d7bff55; transform:rotate(-1.5deg) scale(1.03); transition:opacity .1s}
  #zone{position:fixed; z-index:65; pointer-events:none; opacity:0; border-radius:10px;
    border:2px solid var(--accent); background:#36e0c022; box-shadow:0 0 26px 2px #36e0c055, inset 0 0 20px #36e0c033;
    transition:opacity .1s, left .12s, top .12s, width .12s, height .12s}
  #zone .arr{position:absolute; inset:0; display:grid; place-items:center; color:var(--accent); font-size:22px; text-shadow:0 0 10px var(--accent)}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Rearrange</b> · grab a pane and drop it on any edge — the layout reflows</div>
  <div class="stage">
    <div id="frame"><span class="badge">⛓ layout · live</span></div>
  </div>
  <div id="ghost"></div>
  <div id="zone"><div class="arr"></div></div>
  <div class="hint">drag any pane onto another's <b>left / right / top / bottom</b> edge — panes glide into their new slots · drop outside to cancel</div>
  <div class="scanlines"></div>

<script>
const APPS={
  cal:{name:'Calendar',icon:'◧',col:'var(--accent2)',kind:'cal'},
  list:{name:'Bookings',icon:'≣',col:'var(--accent)',kind:'list'},
  form:{name:'New Booking',icon:'✎',col:'var(--violet)',kind:'form'},
  kpi:{name:'Revenue',icon:'★',col:'var(--gold)',kind:'kpi'},
  bars:{name:'Activity',icon:'▦',col:'var(--blue)',kind:'bars'},
  map:{name:'Venue Map',icon:'◈',col:'var(--gold)',kind:'map'},
};
function paneInner(app){
  const head=`<h4><span class="ic" style="background:${app.col}22;color:${app.col}">${app.icon}</span>${app.name}</h4>`;
  let b='';
  switch(app.kind){
    case 'cal': b=`<div class="cal">${Array.from({length:21},(_,i)=>`<i class="${[3,9,10,16].includes(i)?'on':''}"></i>`).join('')}</div>`;break;
    case 'list':b=`<div class="row- l"></div><div class="row- m"></div><div class="row- l"></div><div class="row- s"></div>`;break;
    case 'form':b=`<div class="field"></div><div class="field"></div><div class="field" style="width:60%"></div>`;break;
    case 'kpi': b=`<div class="kpi">€48.2k<small>▲12%</small></div><div class="bars">${Array.from({length:7},(_,i)=>`<i style="height:${30+((i*37)%60)}%"></i>`).join('')}</div>`;break;
    case 'bars':b=`<div class="bars">${Array.from({length:9},(_,i)=>`<i style="height:${25+((i*53)%70)}%"></i>`).join('')}</div>`;break;
    case 'map': b=`<div class="mapb"><i style="left:30%;top:50%"></i><i style="left:62%;top:40%;background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></i><i style="left:45%;top:20%;background:var(--accent);box-shadow:0 0 8px var(--accent)"></i></div>`;break;
  }
  return `<div class="gr">${head}${b}</div>`;
}

// ---- layout tree ----
let LID=1;
const leaf=k=>({kind:'leaf',app:APPS[k],id:'p'+(LID++)});
const row=(a,b)=>({kind:'split',dir:'row',a,b});
const col=(a,b)=>({kind:'split',dir:'col',a,b});
// initial composed layout: Calendar | ( (Bookings|NewBooking) / (Revenue|Activity) )
let root = row( leaf('cal'), col( row(leaf('list'),leaf('form')), row(leaf('kpi'),leaf('bars')) ) );

function treeHTML(n){
  if(n.kind==='leaf') return `<div class="pane" data-id="${n.id}">${paneInner(n.app)}</div>`;
  return `<div class="split ${n.dir==='col'?'col':''}"><div class="cell">${treeHTML(n.a)}</div><div class="gutter"></div><div class="cell">${treeHTML(n.b)}</div></div>`;
}
function findLeaf(n,id){ if(n.kind==='leaf') return n.id===id?n:null; return findLeaf(n.a,id)||findLeaf(n.b,id); }
function removeLeaf(n,id){
  if(n.kind==='leaf') return n.id===id?null:n;
  const a=removeLeaf(n.a,id), b=removeLeaf(n.b,id);
  if(a===null) return b; if(b===null) return a; return {...n,a,b};
}
function insertLeaf(n,targetId,side,lf){
  if(n.kind==='leaf'){
    if(n.id!==targetId) return n;
    const dir=(side==='E'||side==='W')?'row':'col';
    const a=(side==='E'||side==='S')?n:lf, b=(side==='E'||side==='S')?lf:n;
    return {kind:'split',dir,a,b};
  }
  return {...n, a:insertLeaf(n.a,targetId,side,lf), b:insertLeaf(n.b,targetId,side,lf)};
}

const frame=document.getElementById('frame');
const ghost=document.getElementById('ghost');
const zone=document.getElementById('zone');
let lastRects={};

function captureRects(){ const m={}; frame.querySelectorAll('.pane[data-id]').forEach(p=>m[p.dataset.id]=p.getBoundingClientRect()); return m; }
function render(flip){
  const before = flip ? lastRects : null;
  frame.innerHTML = `<span class="badge">⛓ layout · live</span>` + treeHTML(root);
  bindPanes();
  if(before){
    frame.querySelectorAll('.pane[data-id]').forEach(p=>{
      const b=before[p.dataset.id]; if(!b) return;
      const a=p.getBoundingClientRect();
      const dx=b.left-a.left, dy=b.top-a.top, sx=b.width/a.width||1, sy=b.height/a.height||1;
      p.style.transformOrigin='top left'; p.style.transition='none';
      p.style.transform=`translate(${dx}px,${dy}px) scale(${sx},${sy})`;
      requestAnimationFrame(()=>{ p.style.transition='transform .34s cubic-bezier(.2,.85,.25,1)'; p.style.transform='none'; });
    });
  }
  lastRects=captureRects();
}

// ---- drag a pane to rearrange ----
let drag=null, dragLeaf=null, backup=null, hover=null;
function bindPanes(){
  frame.querySelectorAll('.pane[data-id]').forEach(p=>{
    p.addEventListener('pointerdown', e=>{
      e.preventDefault();
      const id=p.dataset.id;
      backup=root; dragLeaf=findLeaf(root,id);
      const r=p.getBoundingClientRect();
      drag={id, gx:e.clientX-r.left, gy:e.clientY-r.top, w:r.width, h:r.height};
      // ghost
      ghost.style.width=r.width+'px'; ghost.style.height=r.height+'px';
      ghost.innerHTML=p.outerHTML.replace('class="pane"','class="pane" style="cursor:grabbing"');
      ghost.firstChild.style.opacity='1'; ghost.firstChild.style.transform='none';
      ghost.style.left=r.left+'px'; ghost.style.top=r.top+'px'; ghost.style.opacity='1';
      // lift: remove from tree, reflow the rest
      root=removeLeaf(root,id); render(true);
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp,{once:true});
    });
  });
}
function sideFor(rect,x,y){
  const fx=(x-rect.left)/rect.width, fy=(y-rect.top)/rect.height;
  const d={W:fx, E:1-fx, N:fy, S:1-fy};
  return Object.keys(d).reduce((m,k)=>d[k]<d[m]?k:m,'W');
}
function onMove(e){
  if(!drag) return;
  ghost.style.left=(e.clientX-drag.gx)+'px'; ghost.style.top=(e.clientY-drag.gy)+'px';
  ghost.style.opacity='1';
  zone.style.opacity='0'; hover=null;
  const fr=frame.getBoundingClientRect();
  const inside = e.clientX>fr.left&&e.clientX<fr.right&&e.clientY>fr.top&&e.clientY<fr.bottom;
  if(!inside) return;
  ghost.style.pointerEvents='none';
  const under=document.elementFromPoint(e.clientX,e.clientY);
  const pane=under&&under.closest('.pane[data-id]');
  if(!pane) return;
  const r=pane.getBoundingClientRect();
  const side=sideFor(r,e.clientX,e.clientY);
  hover={targetId:pane.dataset.id, side};
  // draw the insertion zone = the half of the target pane on that side
  let zx=r.left,zy=r.top,zw=r.width,zh=r.height;
  if(side==='E'){ zx=r.left+r.width*0.5; zw=r.width*0.5; }
  if(side==='W'){ zw=r.width*0.5; }
  if(side==='S'){ zy=r.top+r.height*0.5; zh=r.height*0.5; }
  if(side==='N'){ zh=r.height*0.5; }
  Object.assign(zone.style,{left:zx+4+'px',top:zy+4+'px',width:zw-8+'px',height:zh-8+'px',opacity:'1'});
  zone.querySelector('.arr').textContent = {E:'→',W:'←',N:'↑',S:'↓'}[side];
}
function onUp(){
  window.removeEventListener('pointermove',onMove);
  ghost.style.opacity='0'; zone.style.opacity='0';
  if(hover && dragLeaf){
    root=insertLeaf(root,hover.targetId,hover.side,dragLeaf);
    render(true);
  } else {
    root=backup; render(true);   // cancel — snap back
  }
  drag=null; dragLeaf=null; hover=null; backup=null;
}

// initial paint (no flip)
render(false);
addEventListener('resize',()=>render(false));

// ---- screenshot demo: ?demo=drag freezes a mid-rearrange frame ----
if(new URLSearchParams(location.search).get('demo')==='drag'){
  // lift the Revenue pane and show a drop zone on Calendar's right edge
  const revId = (function find(n){ if(n.kind==='leaf') return n.app===APPS.kpi?n.id:null; return find(n.a)||find(n.b);})(root);
  const calId = (function find(n){ if(n.kind==='leaf') return n.app===APPS.cal?n.id:null; return find(n.a)||find(n.b);})(root);
  const rev=findLeaf(root,revId);
  backup=root; dragLeaf=rev; root=removeLeaf(root,revId); render(false);
  const cal=frame.querySelector(`.pane[data-id="${calId}"]`).getBoundingClientRect();
  // ghost floating near top
  ghost.style.width='220px'; ghost.style.height='150px';
  ghost.innerHTML=`<div class="pane" style="cursor:grabbing">${paneInner(APPS.kpi)}</div>`;
  ghost.firstChild.style.opacity='1';
  ghost.style.left=(cal.right-40)+'px'; ghost.style.top=(cal.top-30)+'px'; ghost.style.opacity='1';
  Object.assign(zone.style,{left:(cal.left+cal.width*0.5+4)+'px',top:(cal.top+4)+'px',width:(cal.width*0.5-8)+'px',height:(cal.height-8)+'px',opacity:'1'});
  zone.querySelector('.arr').textContent='→';
}
</script>
</body>
</html>
