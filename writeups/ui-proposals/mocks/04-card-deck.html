<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Card Deck</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff;
    --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 50% -10%, #15314a44, transparent),
      radial-gradient(900px 600px at 50% 120%, #2a123a55, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%;
  }
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; letter-spacing:.04em; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:var(--glow) var(--gold)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .hint code{color:var(--ink)}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.05;
    background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  /* felt-table glow behind the cards, brightens as the hand gathers at t=1 */
  .felt{position:fixed; left:50%; bottom:-120px; width:760px; height:360px; transform:translateX(-50%);
    border-radius:50%; pointer-events:none; z-index:1; opacity:0;
    background:radial-gradient(circle at 50% 50%, #1c5e54aa, transparent 65%)}

  /* perspective container — REQUIRED for the rotateY flip */
  .table{position:absolute; inset:0; perspective:1400px; perspective-origin:50% 75%}
  .card{position:absolute; left:50%; top:50%; width:230px; height:320px;
    transform-style:preserve-3d; will-change:transform; transform-origin:50% 100%}
  /* the visible face — its own border/gradient so the 3D flip edge reads */
  .face{position:absolute; inset:0; border-radius:18px; overflow:hidden; backface-visibility:hidden;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    box-shadow:0 24px 50px #000a, inset 0 1px 0 #ffffff0c; padding:18px}
  .face h4{margin:0 0 14px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .ic{width:24px;height:24px;border-radius:8px; display:grid; place-items:center; font-size:14px}
  .rows{display:flex; flex-direction:column; gap:10px}
  .row{height:12px;border-radius:6px;background:#26334a;opacity:.85}
  .row.s{width:52%} .row.m{width:78%} .row.l{width:96%}
  .pip{position:absolute; font-size:30px; line-height:1; opacity:.9}
  .pip.tl{top:14px; right:16px} .pip.br{bottom:14px; left:16px; transform:rotate(180deg)}
  /* back of the card — what you see at the flip edge during the deal */
  .back{position:absolute; inset:0; border-radius:18px; backface-visibility:hidden;
    transform:rotateY(180deg);
    background:
      repeating-linear-gradient(45deg, #1a2236 0 10px, #202b44 10px 20px),
      linear-gradient(180deg,#1d273e,#141b2c);
    border:1px solid #2b3a55; box-shadow:0 24px 50px #000a}
  .back::after{content:"❖"; position:absolute; inset:0; display:grid; place-items:center; font-size:54px; color:#3a4d72; opacity:.7}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Card Deck</b> · panes deal out as a hand of cards — collapse shuffles them into a fanned stack</div>

  <div class="felt" id="felt"></div>
  <div class="table" id="table">
    <div class="card" data-i="0">
      <div class="face">
        <h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Inventory</h4>
        <div class="rows"><div class="row l"></div><div class="row m"></div><div class="row s"></div><div class="row m"></div></div>
        <div class="pip tl" style="color:var(--violet)">◆</div><div class="pip br" style="color:var(--violet)">◆</div>
      </div>
      <div class="back"></div>
    </div>
    <div class="card" data-i="1">
      <div class="face">
        <h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Map</h4>
        <div class="rows"><div class="row m"></div><div class="row l"></div><div class="row s"></div><div class="row l"></div></div>
        <div class="pip tl" style="color:var(--accent)">◈</div><div class="pip br" style="color:var(--accent)">◈</div>
      </div>
      <div class="back"></div>
    </div>
    <div class="card" data-i="2">
      <div class="face">
        <h4><span class="ic" style="background:#4a2230;color:var(--accent2)">✶</span>Quests</h4>
        <div class="rows"><div class="row l"></div><div class="row s"></div><div class="row m"></div><div class="row m"></div></div>
        <div class="pip tl" style="color:var(--accent2)">✶</div><div class="pip br" style="color:var(--accent2)">✶</div>
      </div>
      <div class="back"></div>
    </div>
    <div class="card" data-i="3">
      <div class="face">
        <h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">★</span>Stats</h4>
        <div class="rows"><div class="row m"></div><div class="row m"></div><div class="row l"></div><div class="row s"></div></div>
        <div class="pip tl" style="color:var(--gold)">★</div><div class="pip br" style="color:var(--gold)">★</div>
      </div>
      <div class="back"></div>
    </div>
  </div>

  <div class="hint">click anywhere — the hand sweeps into a fanned stack · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  // ===== shared render contract =====
  // render(t): t in [0,1]. 0 = cards dealt out as a row of big panes; 1 = swept into a fanned stack at the bottom edge.
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const cards=[...document.querySelectorAll('.card')];
  const N=cards.length;

  function render(t){
    document.documentElement.style.setProperty('--t',t);
    // overshoot remap so the gather has a little snap/settle (still deterministic per-t)
    const o = t<1 ? 1 - Math.pow(1-t, 2.2) : 1;          // ease-out for travel
    const settle = Math.sin(clamp(t)*Math.PI) * (1-Math.abs(t-0.5)*0.4); // mid-motion lift

    cards.forEach((c,i)=>{
      const mid=(N-1)/2;
      // t=0 — dealt out: evenly spread across a row, flat & upright (face-up)
      const rowX = (i-mid)*250;
      const rowY = -40;
      const rowRot = (i-mid)*2.5;                         // a hair of life in the laid-out hand
      // t=1 — fanned hand at the bottom edge: tight overlap, per-card angle, shrunk
      const fanX = (i-mid)*46;                            // heavy overlap -> a held hand
      const fanY = lerp(-40, 250, 1) ;                    // dropped to the bottom edge
      const fanRot = (i-mid)*15;                          // the fan spread
      const fanScale = 0.62;

      const x = lerp(rowX, fanX, o);
      const y = lerp(rowY, 250, o) - settle*60;           // arc up through the middle of the sweep
      const rot = lerp(rowRot, fanRot, o);
      const sc = lerp(1, fanScale, o);
      // rotateY flip: cards turn through their edge mid-sweep, landing face-up again.
      // staggered per card so the hand riffles rather than flipping in unison.
      const phase = clamp((t - i*0.06) / (1 - (N-1)*0.06));
      const flip = Math.sin(clamp(phase)*Math.PI) * 168;  // 0 -> ~168° -> back toward 0 (shows the edge/back mid-way)
      const lift = lerp(0, 60, o);                        // raise toward viewer as they gather (z)

      c.style.zIndex = String(t<0.5 ? i : (i+1));         // keep a sensible stack order in the fan
      c.style.transform =
        `translate(-50%,-50%) translate3d(${x}px, ${y}px, ${lift}px) `+
        `rotateY(${flip}deg) rotate(${rot}deg) scale(${sc})`;
      c.querySelector('.face').style.boxShadow =
        `0 ${lerp(24,14,o)}px ${lerp(50,26,o)}px #000${(t>0.5?'c':'a')}, inset 0 1px 0 #ffffff0c`;
    });

    // felt table glow blooms as the hand gathers
    const felt=document.getElementById('felt');
    felt.style.opacity = lerp(0,.9,o);
    felt.style.transform = `translateX(-50%) scale(${lerp(.7,1.05,o)})`;
  }

  // ===== screenshot mode vs interactive mode =====
  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }
</script>
</body>
</html>
