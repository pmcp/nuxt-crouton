<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fog of War</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73;
    --gold:#ffd34d; --violet:#9d7bff; --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 30% -10%, #15314a55, transparent),
      radial-gradient(900px 600px at 110% 110%, #2a123a55, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%;
  }
  .stage{position:absolute; inset:24px; display:flex; gap:18px}
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; letter-spacing:.04em; backdrop-filter:blur(8px)}
  .chip b{font-weight:700} .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);box-shadow:var(--glow) var(--violet)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .hint code{color:var(--accent)}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06;
    background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  .pane{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    border-radius:14px; padding:16px; position:relative; overflow:hidden; box-shadow:inset 0 1px 0 #ffffff0a, 0 12px 34px #0008}
  .pane h4{margin:0 0 12px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .ic{width:20px;height:20px;border-radius:6px; display:grid; place-items:center; font-size:12px}

  /* MAP pane — the one that gets re-shrouded */
  .map{flex:1; min-width:0}
  .terrain{position:absolute; inset:46px 16px 16px; border-radius:10px; overflow:hidden;
    background:
      radial-gradient(220px 160px at 30% 35%, #1c3a4e, transparent 70%),
      radial-gradient(260px 200px at 72% 64%, #243a26, transparent 70%),
      linear-gradient(180deg,#0e1726,#0c1119)}
  .grid{position:absolute; inset:0; opacity:.5;
    background-image:linear-gradient(#1c345077 1px,transparent 1px),linear-gradient(90deg,#1c345077 1px,transparent 1px);
    background-size:40px 40px; mask-image:radial-gradient(560px 380px at 50% 50%,#000,transparent)}
  .unit{position:absolute; width:14px;height:14px;border-radius:50%; box-shadow:var(--glow) currentColor}
  .unit.a{left:28%;top:34%; color:var(--accent); background:var(--accent)}
  .unit.b{left:66%;top:60%; color:var(--accent2); background:var(--accent2)}
  .unit.c{left:50%;top:46%; color:var(--gold); background:var(--gold)}
  .ridge{position:absolute; font-size:18px; color:#33506e; opacity:.6}

  /* FOG overlay — two drifting layers + a radial reveal mask. */
  .fog{position:absolute; inset:0; pointer-events:none; z-index:8;
    /* roiling clouds from layered radial gradients */
    background:
      radial-gradient(180px 140px at 22% 28%, #41506e, transparent 62%),
      radial-gradient(220px 170px at 68% 24%, #2f3c58, transparent 64%),
      radial-gradient(200px 200px at 40% 72%, #4a4063, transparent 60%),
      radial-gradient(240px 180px at 78% 70%, #36465f, transparent 66%),
      radial-gradient(160px 140px at 88% 40%, #43506b, transparent 60%),
      linear-gradient(180deg,#2a3450,#1b2238);
    filter:blur(6px) contrast(1.15);}
  .fog.l2{mix-blend-mode:screen; opacity:.55;
    background:
      radial-gradient(200px 160px at 56% 36%, #545f86, transparent 62%),
      radial-gradient(240px 200px at 30% 60%, #3c4a6c, transparent 64%),
      radial-gradient(220px 190px at 84% 56%, #4b5a80, transparent 62%);}
  /* "?" unexplored marker, only visible when fully fogged */
  .qmark{position:absolute; inset:0; z-index:9; display:grid; place-items:center; pointer-events:none}
  .qmark span{font-size:74px; font-weight:800; color:#aab6d6; opacity:.0;
    text-shadow:0 0 28px #0b0f1a, 0 0 8px #6c7aa0; letter-spacing:.05em}
  .scout{position:absolute; z-index:9; left:50%; top:50%; width:8px;height:8px;border-radius:50%;
    transform:translate(-50%,-50%); background:#dfe7ff; box-shadow:var(--glow) #dfe7ff; opacity:0}

  /* SIDE panel — stays clear (the explored mini-tree) */
  .side{flex:none; width:240px; transform-origin:left center}
  .tree{display:flex; flex-direction:column; gap:9px; margin-top:4px}
  .node{display:flex; align-items:center; gap:9px; font-size:13px}
  .node .gl{width:20px;height:20px;border-radius:6px; display:grid;place-items:center; font-size:12px; background:#1f2a40; border:1px solid #2b3a55}
  .node.d1{padding-left:18px}
  .bar{height:6px;border-radius:4px;background:#26334a;flex:1}
  .dim{color:var(--dim)}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Fog of War</b> · the map pane gets re-shrouded; the fog burns away from a point to re-explore it</div>

  <div class="stage">
    <!-- MAP pane (fogs over) -->
    <div class="pane map" id="mappane">
      <h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Tactical Map</h4>
      <div class="terrain">
        <div class="grid"></div>
        <div class="ridge" style="left:18%;top:50%">◢◣◢</div>
        <div class="ridge" style="left:60%;top:30%">▲ ▲</div>
        <div class="ridge" style="left:44%;top:74%">◢◣</div>
        <div class="unit a"></div>
        <div class="unit b"></div>
        <div class="unit c"></div>
      </div>
      <div class="fog" id="fog1"></div>
      <div class="fog l2" id="fog2"></div>
      <div class="scout" id="scout"></div>
      <div class="qmark"><span id="qmark">?</span></div>
    </div>

    <!-- SIDE panel (stays clear) -->
    <div class="pane side">
      <h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Recon Log</h4>
      <div class="tree">
        <div class="node"><span class="gl" style="color:var(--accent)">◈</span> Sector Alpha <span class="bar"></span></div>
        <div class="node d1"><span class="gl" style="color:var(--gold)">★</span> Outpost <span class="bar" style="flex:.6"></span></div>
        <div class="node d1"><span class="gl" style="color:var(--accent2)">✶</span> Hostiles <span class="bar" style="flex:.4"></span></div>
        <div class="node"><span class="gl dim">❖</span> <span class="dim">Sector Bravo</span> <span class="bar" style="flex:.5;opacity:.4"></span></div>
        <div class="node d1"><span class="gl dim">▣</span> <span class="dim">Unscouted</span> <span class="bar" style="flex:.3;opacity:.3"></span></div>
      </div>
    </div>
  </div>

  <div class="hint">click anywhere — fog re-shrouds the map · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const fog1=document.getElementById('fog1');
  const fog2=document.getElementById('fog2');
  const qmark=document.getElementById('qmark');
  const scout=document.getElementById('scout');
  const terrain=document.querySelector('.terrain');

  // t=0 = fully REVEALED (no fog, explored). t=1 = fully FOGGED (re-shrouded).
  // The reveal is radial from a point: a circular hole in the fog whose radius
  // shrinks as t→1. Drifting layers are nudged by t.
  function render(t){
    document.documentElement.style.setProperty('--t',t);

    // radial mask: a transparent disc punched through the fog around the scout
    // point. At t=0 the disc is huge (fog gone); at t=1 it collapses (full fog).
    const cx=48, cy=46;                       // reveal origin (%)
    const r = lerp(150, 0, t);                // visible radius shrinks as fog rolls in
    const feather = 18;                        // soft fog edge
    const mask = `radial-gradient(circle at ${cx}% ${cy}%, transparent ${Math.max(0,r-feather)}%, #000 ${r}%)`;
    fog1.style.webkitMaskImage = mask; fog1.style.maskImage = mask;
    fog2.style.webkitMaskImage = mask; fog2.style.maskImage = mask;

    // drift the two fog layers in opposite directions so it roils
    fog1.style.transform = `translate(${lerp(-14,8,t)}px, ${lerp(10,-6,t)}px) scale(${lerp(1.15,1.05,t)})`;
    fog2.style.transform = `translate(${lerp(12,-10,t)}px, ${lerp(-8,8,t)}px) scale(${lerp(1.1,1.2,t)})`;
    fog1.style.opacity = clamp(t*1.25, 0, 1);
    fog2.style.opacity = clamp(t*1.25, 0, 1) * 0.55;

    // dim the terrain to a ghost silhouette under the fog
    terrain.style.filter = `brightness(${lerp(1,0.42,t)}) saturate(${lerp(1,0.4,t)})`;

    // "?" unexplored marker fades in only when nearly fully fogged
    qmark.style.opacity = clamp((t-0.6)/0.35, 0, 1) * 0.9;
    qmark.style.transform = `scale(${lerp(0.7,1,clamp((t-0.5)/0.5,0,1))})`;

    // scout flare at the reveal origin pulses brightest mid-burn (re-exploring)
    const burn = 1 - Math.abs(2*t - 1);       // peaks at t=.5
    scout.style.left = cx+'%'; scout.style.top = cy+'%';
    scout.style.opacity = (1-t) * (0.4 + burn*0.6);
    scout.style.transform = `translate(-50%,-50%) scale(${lerp(1,2.4,burn)})`;
    scout.style.boxShadow = `0 0 ${lerp(8,30,burn)}px #dfe7ff`;
  }

  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.13; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
