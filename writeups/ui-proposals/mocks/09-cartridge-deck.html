<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cartridge Deck</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff;
    --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 30% -10%, #20143a55, transparent),
      radial-gradient(900px 600px at 110% 110%, #11314a55, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%;
  }
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; letter-spacing:.04em; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:var(--glow) var(--gold)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.06; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  .stage{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:40px; padding:60px 90px}

  /* ===== console + slot bezel ===== */
  .console{position:relative; width:560px; height:360px; flex:0 0 auto}
  .bezel{position:absolute; inset:0; border-radius:22px;
    background:linear-gradient(160deg,#1b2336,#0c1119);
    border:1px solid #243349;
    box-shadow:inset 0 2px 0 #ffffff10, inset 0 -18px 40px #0009, 0 22px 50px #000a}
  .bezel::before{content:""; position:absolute; left:18px; top:16px; width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--accent), #0a3); box-shadow:var(--glow) var(--accent)}
  .bezel::after{content:"PANE-LOADER ZX"; position:absolute; right:18px; bottom:12px; font-size:9px; letter-spacing:.22em; color:#33445f}
  /* the slot mouth — where a cartridge seats in / ejects out */
  .slot{position:absolute; left:34px; right:34px; top:40px; bottom:40px; border-radius:14px;
    background:repeating-linear-gradient(90deg,#0a0e16 0 6px,#0d1320 6px 12px);
    border:1px solid #1a2740; box-shadow:inset 0 12px 30px #000c, inset 0 -6px 16px #0008; overflow:hidden}
  .slot-lip{position:absolute; left:30px; right:30px; top:36px; height:10px; border-radius:6px;
    background:linear-gradient(180deg,#2a3a55,#0c1320); box-shadow:0 2px 6px #000a; z-index:30}

  /* the active pane — seats inside the slot at t=0, ejects to a cartridge spine at t=1 */
  .pane{position:absolute; left:48px; right:48px; top:56px; bottom:56px;
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    border-radius:12px; padding:16px; overflow:hidden; z-index:20; will-change:transform,opacity;
    box-shadow:inset 0 1px 0 #ffffff0a, 0 14px 34px #000a; transform-origin:right center}
  .pane h4{margin:0 0 12px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .pane .ic{width:22px;height:22px;border-radius:7px; display:grid; place-items:center; font-size:13px; background:#3a2b1c;color:var(--gold)}
  .rows{display:flex; flex-direction:column; gap:9px}
  .row{height:12px;border-radius:6px;background:#26334a;opacity:.85}
  .row.s{width:55%} .row.m{width:82%}
  .grid{display:grid; gap:8px; grid-template-columns:repeat(3,1fr); margin-top:12px}
  .tile{aspect-ratio:1;border-radius:9px;background:linear-gradient(135deg,#22304a,#1a2236);border:1px solid #2b3a55; display:grid; place-items:center; color:#4f6488; font-size:18px}

  /* the cartridge "skin" that fades in over the pane as it ejects (the label spine look) */
  .cart-skin{position:absolute; inset:0; border-radius:12px; pointer-events:none; opacity:0; z-index:25;
    background:
      linear-gradient(180deg,#2a3550,#19223a),
      repeating-linear-gradient(90deg,#ffffff0c 0 3px, transparent 3px 9px);
    border:1px solid #3a4d70; box-shadow:inset 0 0 0 4px #0d1320, inset 0 0 0 5px #2a3a58}
  .cart-skin .label{position:absolute; left:8px; right:8px; top:14px; bottom:14px; border-radius:6px;
    background:linear-gradient(180deg,var(--gold),#c98a1f); display:flex; align-items:center; justify-content:center;
    writing-mode:vertical-rl; transform:rotate(180deg); font-size:13px; font-weight:800; letter-spacing:.18em; color:#241803;
    box-shadow:inset 0 0 0 2px #00000022}
  .cart-skin .notch{position:absolute; right:-1px; width:12px; height:18px; background:#0a0e14; border:1px solid #3a4d70; border-right:none; border-radius:0 0 0 4px}
  .cart-skin .notch.n1{top:24%} .cart-skin .notch.n2{top:52%} .cart-skin .notch.n3{top:80%}
  .cart-skin .ridges{position:absolute; left:6px; top:8px; bottom:8px; width:10px; border-radius:3px;
    background:repeating-linear-gradient(180deg,#0d1320 0 3px,#2c3c5a 3px 6px)}

  /* ===== the rack of dormant cartridges on the side ===== */
  .rack{position:relative; width:150px; height:380px; flex:0 0 auto; padding:14px 12px;
    border-radius:16px; background:linear-gradient(180deg,#141b2b,#0c1119);
    border:1px solid #213049; box-shadow:inset 0 2px 0 #ffffff08, inset 0 -10px 26px #0008, 0 18px 40px #0009;
    display:flex; flex-direction:column; gap:10px; justify-content:flex-end}
  .rack-label{position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:.22em;
    color:var(--dim); background:#0d1320; padding:2px 10px; border:1px solid #213049; border-radius:999px}
  /* a dormant cartridge spine sitting on the shelf */
  .spine{position:relative; height:54px; border-radius:7px; flex:0 0 auto;
    background:linear-gradient(180deg,#27314a,#171f33);
    border:1px solid #38486a; box-shadow:inset 0 0 0 3px #0d1320, inset 0 0 0 4px #2c3c5a, 0 4px 10px #0007;
    display:flex; align-items:center; padding-left:22px; overflow:hidden}
  .spine::before{content:""; position:absolute; left:6px; top:6px; bottom:6px; width:9px; border-radius:3px;
    background:repeating-linear-gradient(180deg,#0d1320 0 3px,#33456a 3px 6px)}
  .spine .strip{height:26px; flex:1; margin-right:12px; border-radius:4px; box-shadow:inset 0 0 0 1px #00000033;
    font-size:11px; font-weight:800; letter-spacing:.12em; color:#1a1205; display:flex; align-items:center; padding-left:10px}
  /* live slot in the rack where the ejected cartridge lands (kept empty in markup; the pane occupies it visually) */
  .rack-empty{height:54px; border-radius:7px; border:1px dashed #2c3c5a; opacity:.5; flex:0 0 auto}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Cartridge Deck</b> · collapse ejects the pane as a chunky cartridge into the rack</div>

  <div class="stage">
    <div class="console">
      <div class="bezel"></div>
      <div class="slot"></div>
      <div class="slot-lip"></div>

      <!-- the active pane: seated content (t=0) → ejected cartridge spine (t=1) -->
      <div class="pane" id="pane">
        <h4><span class="ic">▣</span>Inventory · loaded</h4>
        <div class="rows"><div class="row m"></div><div class="row"></div><div class="row s"></div></div>
        <div class="grid">
          <div class="tile">◆</div><div class="tile">◈</div><div class="tile">✶</div>
          <div class="tile">★</div><div class="tile">❖</div><div class="tile">◢</div>
        </div>
        <div class="cart-skin" id="skin">
          <div class="ridges"></div>
          <div class="label">INVENTORY</div>
          <div class="notch n1"></div><div class="notch n2"></div><div class="notch n3"></div>
        </div>
      </div>
    </div>

    <!-- rack of dormant cartridges + the landing slot for the ejected one -->
    <div class="rack" id="rack">
      <span class="rack-label">RACK · A1</span>
      <div class="spine"><div class="strip" style="background:linear-gradient(180deg,var(--accent),#1c9)">MAP</div></div>
      <div class="spine"><div class="strip" style="background:linear-gradient(180deg,var(--violet),#6a4fd0)">QUESTS</div></div>
      <div class="spine"><div class="strip" style="background:linear-gradient(180deg,var(--accent2),#c23a52)">COMMS</div></div>
      <div class="spine"><div class="strip" style="background:linear-gradient(180deg,#7fb4ff,#3f6fc0)">STATS</div></div>
      <div class="rack-empty" id="dock"></div>
    </div>
  </div>

  <div class="hint">click anywhere — the pane ejects into the rack · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  // render(t): t in [0,1]. 0 = pane seated in slot, full content. 1 = a cartridge spine parked in the rack.
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const pane=document.getElementById('pane');
  const skin=document.getElementById('skin');

  // measure the destination (rack dock slot) relative to the pane's origin, in viewport coords
  function dockTarget(){
    const dock=document.getElementById('dock').getBoundingClientRect();
    const p=pane.getBoundingClientRect();
    // travel from pane center to dock center
    return { dx: (dock.left+dock.width/2) - (p.left+p.width/2),
             dy: (dock.top+dock.height/2) - (p.top+p.height/2),
             dw: dock.width, dh: dock.height, pw:p.width, ph:p.height };
  }

  function render(t){
    document.documentElement.style.setProperty('--t',t);
    const T=dockTarget();
    // EJECT arc: lurch out of the slot to the left/up first, then slide into the rack.
    const ej = Math.sin(clamp(t/0.45)*Math.PI/2);          // 0..1 over first 45%
    const seat= t<0.45 ? lerp(0,-46,ej) : -46;             // pop forward out of the slot
    const x = lerp(0, T.dx, t) + seat*0.4;
    const y = lerp(0, T.dy, t) + lerp(0,-28,ej)*(t<0.45?1:lerp(1,0,clamp((t-0.45)/0.55)));
    // scale the pane body down to the spine footprint
    const sx = lerp(1, T.dw/T.pw, t);
    const sy = lerp(1, T.dh/T.ph, t);
    // rotate as it tumbles out and re-seats vertically in the shelf
    const rot = lerp(0, -8, ej) + lerp(0, 8, clamp((t-0.45)/0.55));
    pane.style.transform = `translate(${x}px,${y}px) rotate(${rot}deg) scale(${sx},${sy})`;
    pane.style.zIndex = t>0.05 ? 40 : 20;
    pane.style.boxShadow = `inset 0 1px 0 #ffffff0a, 0 ${lerp(14,8,t)}px ${lerp(34,18,t)}px #000${t>0.5?'b':'a'}`;
    // cartridge skin fades in over the second half so it reads as a labeled cart in the rack
    skin.style.opacity = clamp((t-0.30)/0.45);
    // content fades out under the skin
    pane.querySelectorAll('h4,.rows,.grid').forEach(el=>{ el.style.opacity = lerp(1,0,clamp((t-0.25)/0.4)); });
    // glow the dock as the cart approaches home
    document.getElementById('dock').style.boxShadow = `inset 0 0 ${lerp(0,18,t)}px var(--gold)`;
    document.getElementById('dock').style.borderColor = t>0.7 ? 'var(--gold)' : '#2c3c5a';
  }

  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  // re-render on resize so the measured dock target stays correct for frozen frames too
  addEventListener('resize', ()=>render(tParam!==null?clamp(parseFloat(tParam)):t));
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
