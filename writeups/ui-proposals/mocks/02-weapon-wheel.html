<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weapon Wheel</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73; --gold:#ffd34d; --violet:#9d7bff;
    --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1000px 700px at 50% 50%, #16203a, #080b11 70%);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%}
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; backdrop-filter:blur(8px)}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);box-shadow:var(--glow) var(--violet)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.05; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  .wheel{position:absolute; inset:0; display:grid; place-items:center}
  .hub{position:absolute; width:108px;height:108px;border-radius:50%; z-index:5;
    background:radial-gradient(circle at 40% 35%, #2a3550, #0f1422);
    border:1px solid #34507a; display:grid; place-items:center; cursor:pointer;
    box-shadow:0 0 0 6px #ffffff06, var(--glow) #34507a}
  .hub b{font-size:11px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase}
  .ring{position:absolute; width:120px;height:120px;border-radius:50%; border:1px dashed #2c3a55; opacity:.5}

  /* each pane is a wedge that orbits the hub when collapsed, and expands into a
     full card when the wheel "deploys". */
  .seg{position:absolute; width:300px; will-change:transform; transform-origin:center}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    border-radius:16px; padding:16px; box-shadow:0 16px 40px #0009, inset 0 1px 0 #ffffff0a; overflow:hidden}
  .card h4{margin:0 0 12px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .ic{width:22px;height:22px;border-radius:7px; display:grid; place-items:center; font-size:13px}
  .rows{display:flex; flex-direction:column; gap:9px}
  .row{height:12px;border-radius:6px;background:#26334a;opacity:.85}
  .row.s{width:55%} .row.m{width:80%}
  .glowring{position:absolute; width:300px;height:300px;border-radius:50%; pointer-events:none;
    background:conic-gradient(from 0deg, var(--violet)0, transparent 30%, var(--accent) 55%, transparent 80%);
    opacity:0; filter:blur(20px) }
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Weapon Wheel</b> · collapsed panes orbit a hub; flick one out to deploy it full-size</div>
  <div class="wheel">
    <div class="glowring" id="glow"></div>
    <div class="ring"></div>
    <div class="hub" id="hub"><b>Panes</b></div>

    <div class="seg" data-i="0"><div class="card"><h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Inventory</h4><div class="rows"><div class="row m"></div><div class="row"></div><div class="row s"></div></div></div></div>
    <div class="seg" data-i="1"><div class="card"><h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Map</h4><div class="rows"><div class="row"></div><div class="row m"></div><div class="row s"></div></div></div></div>
    <div class="seg" data-i="2"><div class="card"><h4><span class="ic" style="background:#4a2230;color:var(--accent2)">✶</span>Quests</h4><div class="rows"><div class="row m"></div><div class="row s"></div><div class="row"></div></div></div></div>
    <div class="seg" data-i="3"><div class="card"><h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">★</span>Stats</h4><div class="rows"><div class="row"></div><div class="row m"></div><div class="row s"></div></div></div></div>
    <div class="seg" data-i="4"><div class="card"><h4><span class="ic" style="background:#24344f;color:#7fb4ff">❖</span>Comms</h4><div class="rows"><div class="row s"></div><div class="row m"></div><div class="row"></div></div></div></div>
  </div>
  <div class="hint">click the hub — panes fan into an orbit · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>
<script>
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const segs=[...document.querySelectorAll('.seg')];
  const N=segs.length;
  // t=0 → all panes expanded & spread as full cards in a row (deployed).
  // t=1 → panes collapse INTO the wheel: shrink to wedges orbiting the hub.
  function render(t){
    document.documentElement.style.setProperty('--t',t);
    const R = lerp(40, 150, t);          // orbit radius grows as they tuck in
    segs.forEach((s,i)=>{
      const a = (-90 + i*(360/N)) * Math.PI/180;     // angle around hub
      // expanded fan-out position (a wide arc near the top half)
      const spreadX = (i-(N-1)/2) * 330;
      const spreadY = -40;
      const orbitX = Math.cos(a)*R, orbitY = Math.sin(a)*R;
      const x = lerp(spreadX, orbitX, t);
      const y = lerp(spreadY, orbitY, t);
      const sc = lerp(1, 0.30, t);        // shrink to a wedge
      const rot = lerp(0, (a*180/Math.PI)+90, t)*0.15; // slight tilt as it orbits
      s.style.transform = `translate(${x}px,${y}px) scale(${sc}) rotate(${rot}deg)`;
      s.style.opacity = lerp(1, .9, t);
      s.querySelector('.card').style.borderColor = t>0.6 ? '#34507a' : 'var(--edge)';
    });
    document.getElementById('glow').style.opacity = lerp(0,.8,t);
    document.getElementById('glow').style.transform = `rotate(${t*180}deg) scale(${lerp(.6,1,t)})`;
    document.getElementById('hub').style.transform = `scale(${lerp(.85,1,t)})`;
  }
  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.14; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); const go=()=>{target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate);};
    document.getElementById('hub').addEventListener('click',go); addEventListener('click',e=>{ if(!e.target.closest('.seg')) go(); }); }

  // autoplay loop for gallery thumbnails (?auto): ping-pong the collapse
  if(new URLSearchParams(location.search).has("auto")){
    const _delay = parseInt(new URLSearchParams(location.search).get("auto"))||2600;
    setInterval(()=>{ target = target>0.5?0:1; if(!raf) raf=requestAnimationFrame(animate); }, _delay);
  }
</script>
</body>
</html>
