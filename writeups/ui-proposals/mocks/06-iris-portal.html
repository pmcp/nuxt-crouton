<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Iris Portal</title>
<style>
  :root{
    --t:0; --bg:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73;
    --gold:#ffd34d; --violet:#9d7bff; --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1100px 700px at 50% 30%, #16203a, #080b11 72%);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; overflow:hidden; height:100%}
  .chip{position:fixed; top:18px; left:18px; z-index:50; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; backdrop-filter:blur(8px)}
  .chip b{font-weight:700}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:var(--glow) var(--accent)}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:50}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.05; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  /* layout: one big primary pane irises shut beside two stable side panes */
  .stage{position:absolute; inset:0; display:grid; grid-template-columns:1fr 280px; gap:18px; padding:26px 26px 26px 26px; padding-top:74px}
  .pane{background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--edge);
    border-radius:16px; padding:16px; position:relative; overflow:hidden; box-shadow:inset 0 1px 0 #ffffff0a, 0 14px 36px #0009}
  .pane h4{margin:0 0 12px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); display:flex; gap:8px; align-items:center}
  .ic{width:22px;height:22px;border-radius:7px; display:grid; place-items:center; font-size:13px; flex:none}
  .rows{display:flex; flex-direction:column; gap:9px}
  .row{height:12px;border-radius:6px;background:#26334a;opacity:.85}
  .row.s{width:55%} .row.m{width:80%} .row.l{width:100%}
  .grid3{display:grid; gap:10px; grid-template-columns:repeat(3,1fr); margin-top:4px}
  .tile{aspect-ratio:1; border-radius:10px; background:linear-gradient(135deg,#22304a,#1a2236); border:1px solid #2b3a55; display:grid; place-items:center; color:#43597f; font-size:22px}

  .side{display:flex; flex-direction:column; gap:18px}

  /* ===== IRIS PORTAL ===== */
  /* The primary pane's CONTENT is clipped by a circle() whose radius goes 150%→0%.
     Overlaid blade triangles rotate/translate inward like an aperture. A glowing
     core sits at center and intensifies as it shuts. */
  .primary{position:relative}
  .iris-content{position:absolute; inset:0; padding:16px; will-change:clip-path}
  .blades{position:absolute; inset:0; pointer-events:none; display:grid; place-items:center; z-index:8}
  .blade{position:absolute; width:0; height:0; will-change:transform; transform-origin:50% 0%;
    border-left:240px solid transparent; border-right:240px solid transparent;
    border-bottom:0; filter:drop-shadow(0 0 6px #000a)}
  /* each blade is a thin metallic triangle radiating from center outward */
  .blade i{position:absolute; left:-22px; top:0; width:44px; height:520px;
    background:linear-gradient(180deg,#2b3954,#121a2b 60%,#0c121e);
    border-left:1px solid #3a4d6e; border-right:1px solid #0a0f18;
    clip-path:polygon(50% 0, 100% 100%, 0 100%)}
  .core{position:absolute; left:50%; top:50%; width:34px; height:34px; border-radius:50%;
    transform:translate(-50%,-50%); z-index:9; will-change:transform,opacity;
    background:radial-gradient(circle at 50% 50%, #ffffff, var(--accent) 40%, #0c8 70%, transparent 72%);
    box-shadow:0 0 26px var(--accent), 0 0 60px var(--accent)}
  .seed-ring{position:absolute; left:50%; top:50%; width:64px; height:64px; border-radius:50%;
    transform:translate(-50%,-50%); z-index:7; pointer-events:none;
    border:1px solid color-mix(in srgb,var(--accent) 60%,transparent); opacity:0}
  .rim{position:absolute; inset:0; border-radius:16px; pointer-events:none; z-index:10;
    box-shadow:inset 0 0 0 1px #ffffff10}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Iris Portal</b> · the pane is swallowed by a camera-shutter iris into a glowing seed</div>

  <div class="stage">
    <!-- PRIMARY pane that irises shut -->
    <div class="pane primary">
      <div class="iris-content" id="iris">
        <h4><span class="ic" style="background:#1f3a44;color:var(--accent)">◈</span>Mission Console</h4>
        <div class="grid3">
          <div class="tile">◆</div><div class="tile">◈</div><div class="tile">✶</div>
          <div class="tile">❖</div><div class="tile">◢</div><div class="tile">★</div>
          <div class="tile">▣</div><div class="tile">◆</div><div class="tile">◈</div>
        </div>
        <div class="rows" style="margin-top:12px"><div class="row l"></div><div class="row m"></div><div class="row s"></div></div>
      </div>
      <!-- mechanical aperture blades -->
      <div class="blades" id="blades"></div>
      <div class="seed-ring" id="seedring"></div>
      <div class="core" id="core"></div>
      <div class="rim"></div>
    </div>

    <!-- stable side panes -->
    <div class="side">
      <div class="pane">
        <h4><span class="ic" style="background:#3a2b4f;color:var(--violet)">◆</span>Telemetry</h4>
        <div class="rows"><div class="row"></div><div class="row m"></div><div class="row s"></div><div class="row m"></div></div>
      </div>
      <div class="pane">
        <h4><span class="ic" style="background:#4a3c1c;color:var(--gold)">★</span>Cargo</h4>
        <div class="rows"><div class="row m"></div><div class="row"></div><div class="row s"></div><div class="row"></div></div>
      </div>
    </div>
  </div>

  <div class="hint">click anywhere — the primary pane irises shut · add <code>?t=0..1</code> to freeze a frame</div>
  <div class="scanlines"></div>

<script>
  const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
  const NB=8;                       // number of aperture blades
  const bladesEl=document.getElementById('blades');
  // build the blade triangles radiating from center
  const blades=[];
  for(let i=0;i<NB;i++){
    const b=document.createElement('div'); b.className='blade';
    const inner=document.createElement('i'); b.appendChild(inner);
    bladesEl.appendChild(b); blades.push(b);
  }
  const iris=document.getElementById('iris');
  const core=document.getElementById('core');
  const seedring=document.getElementById('seedring');

  // t=0 → iris fully open (content visible, blades parked at the rim, core dim).
  // t=1 → iris fully shut (content clipped to nothing, blades meet at center,
  //         core blazes into a tiny portal seed).
  function render(t){
    document.documentElement.style.setProperty('--t',t);
    // CONTENT CLIP: circle radius 150% (open) → 0% (shut). striking partial at t≈.5
    const radius=lerp(150,0,t);
    iris.style.clipPath=`circle(${radius}% at 50% 50%)`;
    iris.style.filter=`brightness(${lerp(1,.6,t)})`;

    // BLADES: parked far out & feathered open at t=0; rotate + slide inward to
    // overlap at center by t=1. Each blade fans at an even angle around the iris.
    blades.forEach((b,i)=>{
      const ang=i*(360/NB);
      // radial offset: blades start pushed OUT past the rim, converge to center.
      const out=lerp(360,0,t);
      // a mechanical counter-twist as they close (aperture "winds" shut)
      const twist=lerp(-26,0,t);
      b.style.transform=`translate(-50%,-50%) rotate(${ang+twist}deg) translateY(${-out}px)`;
      b.style.opacity=lerp(.0,1,clamp(t*1.4));
    });

    // CORE: dim + small when open, blazes + pulses to a portal seed when shut.
    const cs=lerp(.4,1.25,t);
    core.style.transform=`translate(-50%,-50%) scale(${cs})`;
    core.style.opacity=lerp(.25,1,clamp(t*1.3));
    core.style.boxShadow=`0 0 ${lerp(10,40,t)}px var(--accent), 0 0 ${lerp(24,90,t)}px var(--accent)`;
    // a seed ring that snaps out at the very end as it locks shut
    const lock=clamp((t-0.7)/0.3);
    seedring.style.opacity=Math.sin(lock*Math.PI)*0.9;
    seedring.style.transform=`translate(-50%,-50%) scale(${lerp(.4,1.6,lock)})`;
  }

  const q=new URLSearchParams(location.search), tParam=q.get('t');
  let t=0,target=0,raf=null;
  function animate(){ t+=(target-t)*0.15; if(Math.abs(target-t)<0.001){t=target;render(t);raf=null;return;} render(t); raf=requestAnimationFrame(animate);}
  if(tParam!==null){ render(clamp(parseFloat(tParam))); }
  else { render(0); addEventListener('click', ()=>{ target=target>0.5?0:1; if(!raf)raf=requestAnimationFrame(animate); }); }
</script>
</body>
</html>
