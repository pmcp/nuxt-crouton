<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spatial · mini-apps floating in VR space</title>
<style>
  :root{
    --bg:#070a10; --bg2:#0a0e14; --panel:#121826; --panel2:#161d2e; --edge:#1f2a3d; --edge2:#2b3a55;
    --ink:#e6edf6; --dim:#7c8aa3; --accent:#36e0c0; --accent2:#ff5d73;
    --gold:#ffd34d; --violet:#9d7bff; --blue:#7fb4ff; --glow:0 0 24px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:
      radial-gradient(1400px 900px at 50% 8%, #15314a2e, transparent),
      radial-gradient(1100px 800px at 12% 108%, #2a123a33, transparent),
      var(--bg);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; height:100%; -webkit-font-smoothing:antialiased}
  .chip{position:fixed; top:18px; left:18px; z-index:90; display:flex; gap:10px; align-items:center;
    background:#0d1320cc; border:1px solid var(--edge); border-radius:999px; padding:8px 16px; font-size:13px; backdrop-filter:blur(8px)}
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--violet);box-shadow:var(--glow) var(--violet)}
  .chip b{font-weight:700}
  .hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:var(--dim); font-size:12px; z-index:90; pointer-events:none; text-align:center}
  .scanlines{position:fixed; inset:0; pointer-events:none; z-index:95; opacity:.04; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px)}

  /* stereo split: two eyes side by side */
  #eyes{position:absolute; inset:0; display:flex}
  .eye{position:relative; flex:1 1 0; overflow:hidden; cursor:grab;
    perspective:1200px; perspective-origin:50% 46%}
  .eye.dragging{cursor:grabbing}
  body.stereo .eye+.eye{border-left:3px solid #000}   /* black gutter between eyes */
  body:not(.stereo) #eyeR{display:none}

  /* depth-cue starfield + receding floor live inside each eye */
  .stars{position:absolute; inset:0; pointer-events:none}
  .stars i{position:absolute; width:2px;height:2px; border-radius:50%; background:#cde3ff;
    opacity:.5; box-shadow:0 0 4px #9fd0ff}
  .floor{position:absolute; left:-60%; right:-60%; bottom:-10%; height:140%; pointer-events:none;
    transform:rotateX(74deg); transform-origin:50% 100%; opacity:.5;
    background-image:linear-gradient(#2b6cff44 1px,transparent 1px),linear-gradient(90deg,#2b6cff33 1px,transparent 1px);
    background-size:58px 58px;
    -webkit-mask-image:radial-gradient(58% 70% at 50% 36%,#000,transparent);
            mask-image:radial-gradient(58% 70% at 50% 36%,#000,transparent)}

  /* the 3D world */
  .world{position:absolute; left:50%; top:50%; width:0; height:0; transform-style:preserve-3d; will-change:transform}

  /* a floating glassy panel */
  .panel{position:absolute; left:-130px; top:-94px; width:260px; height:188px;
    transform-style:preserve-3d; will-change:transform; cursor:pointer}
  .panel .card{position:absolute; inset:0; border-radius:16px; overflow:hidden;
    background:linear-gradient(180deg,#161d2eccc 0%,#0e1422e6 100%);
    background:linear-gradient(180deg,rgba(22,29,46,.82),rgba(14,20,34,.9));
    border:1px solid var(--edge2);
    box-shadow:0 40px 70px -20px #000c, 0 0 0 1px #ffffff0a, 0 0 44px -10px #36e0c038;
    backdrop-filter:blur(3px);
    transition:box-shadow .3s, border-color .3s, filter .3s; filter:brightness(.98) saturate(.98)}
  .panel.focus .card{filter:brightness(1.08) saturate(1.05);
    border-color:#3a567f; box-shadow:0 50px 90px -18px #000d, 0 0 0 1px #ffffff18, 0 0 70px -6px #36e0c077}
  .glint{position:absolute; inset:0; pointer-events:none; border-radius:16px;
    background:linear-gradient(135deg,#ffffff14, transparent 38%)}

  /* mini-app pane content */
  .pane{position:absolute; inset:0; padding:13px; overflow:hidden}
  .pane h4{margin:0 0 9px; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); display:flex; gap:7px; align-items:center}
  .pane .ic{width:18px;height:18px;border-radius:6px; display:grid; place-items:center; font-size:11px; flex:0 0 auto}
  .row-{height:9px;border-radius:5px;background:#26334a;opacity:.85;margin-bottom:7px}
  .row-.s{width:55%}.row-.m{width:78%}.row-.l{width:95%}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal i{aspect-ratio:1;border-radius:3px;background:#22304a}
  .cal i.on{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .bars{display:flex;align-items:flex-end;gap:5px;height:54px;margin-top:6px}
  .bars i{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--accent),#1c8f7e)}
  .kpi{font-size:26px;font-weight:800;letter-spacing:-.02em}.kpi small{font-size:12px;color:var(--accent);font-weight:600;margin-left:6px}
  .field{height:24px;border-radius:7px;background:#1a2336;border:1px solid #283651;margin-bottom:7px}
  .mapb{position:relative;height:96px;margin-top:4px;border-radius:8px;background:radial-gradient(70px 46px at 42% 50%,#16324a,#0e1c2e);overflow:hidden}
  .mapb i{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}

  /* idle float — gentle per-panel bob/sway */
  @keyframes bob{0%,100%{translate:0 0}50%{translate:0 9px}}

  /* headset framing: lens vignette + reticle */
  .vignette{position:absolute; inset:0; pointer-events:none; z-index:50;
    background:radial-gradient(closest-side at 50% 50%, transparent 58%, #04060bcc 92%, #02040a 100%)}
  body.stereo .vignette{background:radial-gradient(closest-side at 50% 50%, transparent 52%, #04060bdd 84%, #000 100%)}
  .reticle{position:absolute; left:50%; top:46%; width:7px; height:7px; margin:-3.5px; z-index:51;
    border-radius:50%; background:#dff3ff; box-shadow:0 0 10px #9fd6ff, 0 0 0 6px #9fd6ff22; pointer-events:none}
</style>
</head>
<body>
  <div class="chip"><span class="dot"></span><b>Spatial</b> · mini-apps floating in VR space — drag to orbit · scroll to dolly</div>

  <div id="eyes">
    <div class="eye" id="eyeL">
      <div class="floor"></div><div class="stars"></div>
      <div class="world"></div>
      <div class="vignette"></div><div class="reticle"></div>
    </div>
    <div class="eye" id="eyeR">
      <div class="floor"></div><div class="stars"></div>
      <div class="world"></div>
      <div class="vignette"></div><div class="reticle"></div>
    </div>
  </div>

  <div class="hint">drag to <b>orbit</b> the workspace · scroll to <b>dolly</b> in/out · hover a panel to focus it · <b>?view=stereo</b> for the headset split</div>
  <div class="scanlines"></div>

<script>
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), lerp=(a,b,t)=>a+(b-a)*t;

// ---- 6 mini-apps (same set + content as 13/14) ----
const APPS=[
  {name:'Calendar',   icon:'◧', col:'var(--accent2)', kind:'cal'},
  {name:'Bookings',   icon:'≣', col:'var(--accent)',  kind:'list'},
  {name:'New Booking',icon:'✎', col:'var(--violet)',  kind:'form'},
  {name:'Revenue',    icon:'★', col:'var(--gold)',    kind:'kpi'},
  {name:'Activity',   icon:'▦', col:'var(--blue)',    kind:'bars'},
  {name:'Venue Map',  icon:'◈', col:'var(--gold)',    kind:'map'},
];
function paneInner(app){
  const head=`<h4><span class="ic" style="background:${app.col}22;color:${app.col}">${app.icon}</span>${app.name}</h4>`;
  let b='';
  switch(app.kind){
    case 'cal': b=`<div class="cal">${Array.from({length:21},(_,i)=>`<i class="${[3,9,10,16].includes(i)?'on':''}"></i>`).join('')}</div>`;break;
    case 'list':b=`<div class="row- l"></div><div class="row- m"></div><div class="row- l"></div><div class="row- s"></div><div class="row- m"></div>`;break;
    case 'form':b=`<div class="field"></div><div class="field"></div><div class="field" style="width:60%"></div>`;break;
    case 'kpi': b=`<div class="kpi">€48.2k<small>▲ 12%</small></div><div class="bars">${Array.from({length:7},(_,i)=>`<i style="height:${30+((i*37)%60)}%"></i>`).join('')}</div>`;break;
    case 'bars':b=`<div class="bars">${Array.from({length:9},(_,i)=>`<i style="height:${25+((i*53)%70)}%"></i>`).join('')}</div>`;break;
    case 'map': b=`<div class="mapb"><i style="left:30%;top:50%"></i><i style="left:62%;top:40%;background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></i><i style="left:45%;top:22%;background:var(--accent);box-shadow:0 0 8px var(--accent)"></i></div>`;break;
  }
  return `<div class="pane">${head}${b}</div>`;
}

// ---- concave arc placement: panels curve around the viewer ----
// angle across the arc → x,z on a circle of radius R, panel rotated to face center.
const R=620;                 // arc radius
const SPREAD=128;            // total degrees the 6 panels span
const N=APPS.length;
const layout=APPS.map((app,i)=>{
  const t=(i-(N-1)/2)/((N-1)/2);          // -1 .. 1
  const deg=t*(SPREAD/2);                  // angle from center
  const rad=deg*Math.PI/180;
  const x=Math.sin(rad)*R;
  const z=-Math.cos(rad)*R + R;            // 0 at edges → push center back so it's concave toward viewer
  const y=Math.round(Math.sin(i*1.7)*40) - 30;   // vary height, lift arc up a touch
  return {app, x, y:y, z, rotY:-deg, phase:(i*0.9), dur:5.5+i*0.6};
});

// build panels into both eyes
const worlds=[...document.querySelectorAll('.world')];
let panels=[];   // {el[], cfg}
function build(){
  worlds.forEach(world=>{
    world.innerHTML='';
    layout.forEach((c,i)=>{
      const p=document.createElement('div');
      p.className='panel'; p.dataset.i=i;
      p.style.animation=`bob ${c.dur}s ease-in-out ${(-c.phase).toFixed(2)}s infinite`;
      p.innerHTML=`<div class="card">${paneInner(c.app)}<div class="glint"></div></div>`;
      world.appendChild(p);
    });
  });
  panels=layout.map((c,i)=>({cfg:c, els:worlds.map(w=>w.querySelector(`.panel[data-i="${i}"]`))}));
}

// per-panel base transform (its place on the arc), focus lifts it toward viewer
let focus=-1;
function placePanels(){
  panels.forEach((p,i)=>{
    const c=p.cfg;
    const lift=(i===focus)?90:0;
    const sc=(i===focus)?1.06:1;
    const tf=`translate3d(${c.x}px,${c.y}px,${c.z+lift}px) rotateY(${c.rotY}deg) scale(${sc})`;
    p.els.forEach(el=>{ el.style.transform=tf; el.classList.toggle('focus', i===focus); });
  });
}

// ---- camera: orbit (yaw/pitch) + dolly (z) ----
let yaw=-20, pitch=6, dolly=-40;             // seeded 3/4 angle for a flattering static frame
let tyaw=yaw, tpitch=pitch, tdolly=dolly;
const EYE=26;                                 // stereo eye separation (px of X shift per world)
function applyCam(){
  worlds.forEach((w,e)=>{
    const off=document.body.classList.contains('stereo') ? (e===0?-EYE:EYE) : 0;
    w.style.transform=`translateX(${off}px) translateZ(${dolly}px) rotateX(${pitch}deg) rotateY(${yaw}deg)`;
  });
}

// idle auto-rotate + smoothing toward targets
let interacting=false, idle=true;
function tick(){
  if(idle && !interacting) tyaw += 0.06;       // slow drift
  yaw=lerp(yaw,tyaw,0.12); pitch=lerp(pitch,tpitch,0.12); dolly=lerp(dolly,tdolly,0.12);
  applyCam();
  requestAnimationFrame(tick);
}

// ---- pointer orbit ----
const eyes=document.getElementById('eyes');
let down=false, sx=0, sy=0, yaw0=0, pit0=0;
eyes.addEventListener('pointerdown',e=>{
  down=true; interacting=true; sx=e.clientX; sy=e.clientY; yaw0=tyaw; pit0=tpitch;
  document.querySelectorAll('.eye').forEach(el=>el.classList.add('dragging'));
  eyes.setPointerCapture(e.pointerId);
});
eyes.addEventListener('pointermove',e=>{
  // hover-focus a panel
  const pe=e.target.closest('.panel');
  if(!down) focus = pe ? +pe.dataset.i : -1, placePanels();
  if(!down) return;
  tyaw = yaw0 + (e.clientX-sx)*0.32;
  tpitch = clamp(pit0 - (e.clientY-sy)*0.18, -24, 30);
});
function up(){ down=false; document.querySelectorAll('.eye').forEach(el=>el.classList.remove('dragging'));
  setTimeout(()=>interacting=false,1400); }
eyes.addEventListener('pointerup',up);
eyes.addEventListener('pointercancel',up);
eyes.addEventListener('pointerleave',()=>{ if(!down){focus=-1;placePanels();} });

// click a panel → pull it front & center (focus + face viewer)
eyes.addEventListener('click',e=>{
  const pe=e.target.closest('.panel'); if(!pe) return;
  const i=+pe.dataset.i; focus=i; placePanels();
  tyaw = -layout[i].rotY; tpitch=4; interacting=true; setTimeout(()=>interacting=false,1800);
});

// wheel dolly
eyes.addEventListener('wheel',e=>{
  e.preventDefault(); interacting=true;
  tdolly = clamp(tdolly - e.deltaY*0.6, -520, 220);
  clearTimeout(window._dz); window._dz=setTimeout(()=>interacting=false,900);
},{passive:false});

// ---- starfield ----
function stars(){
  document.querySelectorAll('.stars').forEach(box=>{
    let h='';
    for(let i=0;i<70;i++){ const s=Math.random()*1.6+0.6;
      h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;width:${s}px;height:${s}px;opacity:${(Math.random()*0.6+0.2).toFixed(2)}"></i>`; }
    box.innerHTML=h;
  });
}

// ---- view modes ----
const q=new URLSearchParams(location.search);
const view=q.get('view')||'immersive';
if(view==='stereo') document.body.classList.add('stereo');

build(); stars(); placePanels(); applyCam(); tick();
</script>
</body>
</html>
