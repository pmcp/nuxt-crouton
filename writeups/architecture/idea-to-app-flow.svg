<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 1508" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif">
  <defs><marker id="a-cfcec8" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#cfcec8"/></marker><marker id="a-16a34a" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/></marker><marker id="a-0891b2" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#0891b2"/></marker><marker id="a-0f766e" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#0f766e"/></marker></defs>
  <rect width="1420" height="1508" fill="#ffffff"/>
  <text x="78" y="46" font-size="28" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">Idea → App — what fires at every step</text>
  <text x="78" y="68" font-size="13.5" fill="#8a8a84" font-style="italic">The straight line top-to-bottom; the sign-off gate branches into a loop that repeats until your “lgtm”; CI auto-fixes itself; closed waves delegate the next.</text>
  <line x1="78" y1="142" x2="78" y2="1327" stroke="#d9d8d2" stroke-width="3"/><path d="M 78 152 L 78 321" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><path d="M 78 341 L 78 487" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><path d="M 78 507 L 78 653" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><path d="M 78 673 L 78 796" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><path d="M 78 816 L 78 1031" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><path d="M 78 1051 L 78 1197" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><path d="M 78 1217 L 78 1317" stroke="#cfcec8" stroke-width="2.5" marker-end="url(#a-cfcec8)"/><circle cx="78" cy="142" r="16" fill="#fff" stroke="#0f766e" stroke-width="2.5"/><text x="78" y="148" text-anchor="middle" font-size="16">💡</text><rect x="104" y="120" width="660" height="169" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="120" width="6" height="169" rx="3" fill="#0f766e"/><text x="126" y="145" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">0 · Idea &amp; plan</text><text x="126" y="172" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">github-tasks</tspan><tspan fill="#5a5a55"> — open the epic + sub-issues (as a hypothesis)</tspan></text><text x="126" y="195" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">ecosystem-check</tspan><tspan fill="#5a5a55"> — prior-art check before new infra (optional)</tspan></text><text x="126" y="218" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">decompose-on-issue.yml</tspan><tspan fill="#5a5a55"> — fires on issue opened / labeled</tspan></text><text x="126" y="241" font-size="13.5"><tspan>👤 </tspan><tspan fill="#16a34a" font-weight="700">/task-decompose</tspan><tspan fill="#5a5a55"> — → orchestrator → decomposer → worker</tspan></text><text x="126" y="264" font-size="13.5"><tspan>⚑ </tspan><tspan fill="#0f766e" font-weight="700">ISSUE-FIRST</tspan><tspan fill="#5a5a55"> — no issue, no code — open it before editing</tspan></text><circle cx="78" cy="331" r="16" fill="#fff" stroke="#0f766e" stroke-width="2.5"/><text x="78" y="337" text-anchor="middle" font-size="16">🤝</text><rect x="104" y="309" width="660" height="146" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="309" width="6" height="146" rx="3" fill="#0f766e"/><text x="126" y="334" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">1 · Sign-off gates</text><text x="126" y="361" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">schema-review</tspan><tspan fill="#5a5a55"> — sign off the data model (#314)</tspan></text><text x="126" y="384" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">ui-proposal</tspan><tspan fill="#5a5a55"> — sign off the look — live preview (#307)</tspan></text><text x="126" y="407" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">test-review</tspan><tspan fill="#5a5a55"> — sign off the behaviour — packages/* logic (#774)</tspan></text><text x="126" y="430" font-size="13.5"><tspan>⚑ </tspan><tspan fill="#0f766e" font-weight="700">holds on status:blocked</tspan><tspan fill="#5a5a55"> — each opens the loop on the right →</tspan></text><circle cx="78" cy="497" r="16" fill="#fff" stroke="#ea580c" stroke-width="2.5"/><text x="78" y="503" text-anchor="middle" font-size="16">🔨</text><rect x="104" y="475" width="660" height="146" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="475" width="6" height="146" rx="3" fill="#ea580c"/><text x="126" y="500" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">2 · Build</text><text x="126" y="527" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">crouton</tspan><tspan fill="#5a5a55"> — schema → Form / List / API / migration + default layout</tspan></text><text x="126" y="550" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">db-migrations</tspan><tspan fill="#5a5a55"> — generate &amp; apply the Drizzle migration</tspan></text><text x="126" y="573" font-size="13.5"><tspan>◦ </tspan><tspan fill="#8a8a84" font-weight="700">pnpm typecheck</tspan><tspan fill="#5a5a55"> — after every change — not optional</tspan></text><text x="126" y="596" font-size="13.5"><tspan>⚑ </tspan><tspan fill="#0f766e" font-weight="700">packages/ hook</tspan><tspan fill="#5a5a55"> — blocks shared-code edits · new apps → pocs/</tspan></text><circle cx="78" cy="663" r="16" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text x="78" y="669" text-anchor="middle" font-size="16">📝</text><rect x="104" y="641" width="660" height="123" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="641" width="6" height="123" rx="3" fill="#16a34a"/><text x="126" y="666" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">3 · Commit</text><text x="126" y="693" font-size="13.5"><tspan>👤 </tspan><tspan fill="#16a34a" font-weight="700">/commit</tspan><tspan fill="#5a5a55"> — granular conventional commits, ref (#NN)</tspan></text><text x="126" y="716" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">sync-docs</tspan><tspan fill="#5a5a55"> — update the docs this change touched (runs first)</tspan></text><text x="126" y="739" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">i18n-check</tspan><tspan fill="#5a5a55"> — catch untranslated strings (runs first)</tspan></text><circle cx="78" cy="806" r="16" fill="#fff" stroke="#0891b2" stroke-width="2.5"/><text x="78" y="812" text-anchor="middle" font-size="16">🔀</text><rect x="104" y="784" width="660" height="215" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="784" width="6" height="215" rx="3" fill="#0891b2"/><text x="126" y="809" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">4 · PR opens · CI fans out</text><text x="126" y="836" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">ci.yml</tspan><tspan fill="#5a5a55"> — typecheck + lint + test</tspan></text><text x="126" y="859" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">e2e.yml</tspan><tspan fill="#5a5a55"> — boot → auth → CRUD on a real generated app</tspan></text><text x="126" y="882" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">frontend-review.yml</tspan><tspan fill="#5a5a55"> — Nuxt UI 4 conventions (on .vue)</tspan></text><text x="126" y="905" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">a11y.yml</tspan><tspan fill="#5a5a55"> — WCAG / ARIA</tspan></text><text x="126" y="928" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">red-team.yml</tspan><tspan fill="#5a5a55"> — adversarial security probe</tspan></text><text x="126" y="951" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">deploy-pocs.yml</tspan><tspan fill="#5a5a55"> — a clickable preview URL</tspan></text><text x="126" y="974" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">pipeline-pr-status.yml</tspan><tspan fill="#5a5a55"> — posts the sticky status note</tspan></text><circle cx="78" cy="1041" r="16" fill="#fff" stroke="#0891b2" stroke-width="2.5"/><text x="78" y="1047" text-anchor="middle" font-size="16">🚀</text><rect x="104" y="1019" width="660" height="146" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="1019" width="6" height="146" rx="3" fill="#0891b2"/><text x="126" y="1044" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">5 · Merge → staging</text><text x="126" y="1071" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">deploy-app / -pocs.yml</tspan><tspan fill="#5a5a55"> — merge to main → &lt;app&gt;.pmcp.dev (staging)</tspan></text><text x="126" y="1094" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">automerge-epic-subpr.yml</tspan><tspan fill="#5a5a55"> — a green pipeline sub-PR self-merges</tspan></text><text x="126" y="1117" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">schedule-waves.yml</tspan><tspan fill="#5a5a55"> — Blocked-by edges → delegate the next wave</tspan></text><text x="126" y="1140" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">cleanup-merged-branches.yml</tspan><tspan fill="#5a5a55"> — tidy the merged branch</tspan></text><circle cx="78" cy="1207" r="16" fill="#fff" stroke="#16a34a" stroke-width="2.5"/><text x="78" y="1213" text-anchor="middle" font-size="16">🌐</text><rect x="104" y="1185" width="660" height="100" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="1185" width="6" height="100" rx="3" fill="#16a34a"/><text x="126" y="1210" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">6 · Production</text><text x="126" y="1237" font-size="13.5"><tspan>👤 </tspan><tspan fill="#16a34a" font-weight="700">/deploy-production</tspan><tspan fill="#5a5a55"> — → friendlyinter.net — human-only (#318)</tspan></text><text x="126" y="1260" font-size="13.5"><tspan>◦ </tspan><tspan fill="#8a8a84" font-weight="700">promote pocs/ → apps/</tspan><tspan fill="#5a5a55"> — a POC earns prod by being promoted</tspan></text><circle cx="78" cy="1327" r="16" fill="#fff" stroke="#ea580c" stroke-width="2.5"/><text x="78" y="1333" text-anchor="middle" font-size="16">🎓</text><rect x="104" y="1305" width="660" height="123" rx="12" fill="#fcfcfa" stroke="#e7e6e1"/><rect x="104" y="1305" width="6" height="123" rx="3" fill="#ea580c"/><text x="126" y="1330" font-size="16.5" font-weight="800" fill="#1a1a1a" font-family="Georgia,serif">7 · Close &amp; learn</text><text x="126" y="1357" font-size="13.5"><tspan>🛠 </tspan><tspan fill="#ea580c" font-weight="700">postmortem</tspan><tspan fill="#5a5a55"> — retro at epic close → mints workflow issues</tspan></text><text x="126" y="1380" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">epic-digest</tspan><tspan fill="#5a5a55"> — daily "needs your eyes" QA band</tspan></text><text x="126" y="1403" font-size="13.5"><tspan>⚙️ </tspan><tspan fill="#0891b2" font-weight="700">housekeeping</tspan><tspan fill="#5a5a55"> — weekly repo-drift report</tspan></text><path d="M 764 331 C 780 331, 788 327, 902 393" fill="none" stroke="#0f766e" stroke-width="2.5" marker-end="url(#a-0f766e)"/><text x="776" y="323" font-size="12" fill="#0f766e" font-style="italic">opens →</text><ellipse cx="1040" cy="459" rx="132" ry="132" fill="none" stroke="#d9d8d2" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/><g transform="translate(1133.3,552.3) rotate(315.0)"><path d="M -7,-6 L 7,0 L -7,6 Z" fill="#bdbcb5"/></g><g transform="translate(946.7,552.3) rotate(45.0)"><path d="M -7,-6 L 7,0 L -7,6 Z" fill="#bdbcb5"/></g><g transform="translate(946.7,365.7) rotate(135.0)"><path d="M -7,-6 L 7,0 L -7,6 Z" fill="#bdbcb5"/></g><g transform="translate(1133.3,365.7) rotate(225.0)"><path d="M -7,-6 L 7,0 L -7,6 Z" fill="#bdbcb5"/></g><rect x="945" y="298" width="190" height="58" rx="11" fill="#fff" stroke="#ca8a04" stroke-width="2"/><text x="1040" y="318" text-anchor="middle" font-size="17">🟡</text><text x="1040" y="336" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ca8a04">Agent posts</text><text x="1040" y="352" text-anchor="middle" font-size="10.5" fill="#5a5a55">preview · diagram · schema · test</text><rect x="1077" y="430" width="190" height="58" rx="11" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="1172" y="450" text-anchor="middle" font-size="17">🟢</text><text x="1172" y="468" text-anchor="middle" font-size="13.5" font-weight="700" fill="#16a34a">You command</text><text x="1172" y="484" text-anchor="middle" font-size="10.5" fill="#5a5a55">pin · inline-comment · edit</text><rect x="945" y="562" width="190" height="58" rx="11" fill="#fff" stroke="#c026d3" stroke-width="2"/><text x="1040" y="582" text-anchor="middle" font-size="17">🟣</text><text x="1040" y="600" text-anchor="middle" font-size="13.5" font-weight="700" fill="#c026d3">Auto-comment</text><text x="1040" y="616" text-anchor="middle" font-size="10.5" fill="#5a5a55">🎯 crouton[bot] → PR comment</text><rect x="813" y="430" width="190" height="58" rx="11" fill="#fff" stroke="#0891b2" stroke-width="2"/><text x="908" y="450" text-anchor="middle" font-size="17">🔵</text><text x="908" y="468" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0891b2">Agent acts</text><text x="908" y="484" text-anchor="middle" font-size="10.5" fill="#5a5a55">edits that file · re-posts</text><text x="1040" y="456" text-anchor="middle" font-size="13.5" font-weight="700" fill="#33332e">↻ repeats</text><text x="1040" y="474" text-anchor="middle" font-size="11.5" fill="#8a8a84" font-style="italic">until you reply lgtm</text><rect x="860" y="625" width="360" height="78" rx="9" fill="#f5f5f1" stroke="#e7e6e1"/><text x="872" y="645" font-size="11.5" font-family="ui-monospace,Menlo,monospace" fill="#86198f" font-weight="700">🎯 Preview feedback</text><text x="872" y="663" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#33332e">- Component: app/components/ProductCard.vue</text><text x="872" y="679" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#33332e">- Element: button · Page: /products/view</text><text x="872" y="695" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#5a5a55">&gt; make this smaller, add an icon</text><path d="M 813 459 L 786 459 L 786 548 L 768 548" fill="none" stroke="#16a34a" stroke-width="3.5" marker-end="url(#a-16a34a)"/><text x="780" y="449" text-anchor="end" font-size="12.5" font-weight="700" fill="#16a34a">✅ lgtm</text><text x="794" y="539" font-size="12" font-weight="700" fill="#16a34a">→ continue to Build</text><path d="M 764 814 C 834 794, 834 874, 764 854" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#a-0891b2)"/><text x="842" y="828" font-size="11.5" fill="#0891b2" font-style="italic">⟲ fix-ci-on-failure.yml</text><text x="842" y="844" font-size="11.5" fill="#0891b2" font-style="italic">red → fix → re-run (≤3)</text><path d="M 764 1093 L 1380 1093 L 1380 210 L 768 210" fill="none" stroke="#0891b2" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#a-0891b2)"/><text x="1372" y="569.5" font-size="12" fill="#0891b2" font-style="italic" transform="rotate(-90 1372 569.5)" text-anchor="middle">🌊 next wave → delegate the next ready sub-issue</text>
  <g><circle cx="110" cy="1482" r="6" fill="#ea580c"/><text x="122" y="1486" font-size="12.5" fill="#474744">🛠 a skill</text></g><g><circle cx="224.60000000000002" cy="1482" r="6" fill="#16a34a"/><text x="236.60000000000002" y="1486" font-size="12.5" fill="#474744">👤 you (command)</text></g><g><circle cx="383.6" cy="1482" r="6" fill="#0891b2"/><text x="395.6" y="1486" font-size="12.5" fill="#474744">⚙️ ci workflow</text></g><g><circle cx="527.8" cy="1482" r="6" fill="#ca8a04"/><text x="539.8" y="1486" font-size="12.5" fill="#474744">🟡 agent posts</text></g><g><circle cx="672" cy="1482" r="6" fill="#c026d3"/><text x="684" y="1486" font-size="12.5" fill="#474744">🟣 auto-comment</text></g><g><circle cx="823.6" cy="1482" r="6" fill="#0f766e"/><text x="835.6" y="1486" font-size="12.5" fill="#474744">⚑ human gate</text></g>
</svg>