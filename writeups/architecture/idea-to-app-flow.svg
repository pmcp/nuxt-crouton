="#b4530f" font-weight="600">github-tasks</tspan><tspan fill="#6b7280">  open the epic + sub-issues, as a hypothesis</tspan></text><circle cx="139" cy="227" r="4.5" fill="#ea7a3c"/><text x="153" y="231" font-size="14"><tspan fill="#b4530f" font-weight="600">ecosystem-check</tspan><tspan fill="#6b7280">  prior-art check before new infra</tspan></text><circle cx="139" cy="254" r="4.5" fill="#2f95c4"/><text x="153" y="258" font-size="14"><tspan fill="#0e6f93" font-weight="600">decompose-on-issue.yml</tspan><tspan fill="#6b7280">  fires on issue opened / labeled</tspan></text><circle cx="139" cy="281" r="4.5" fill="#22a865"/><text x="153" y="285" font-size="14"><tspan fill="#15803d" font-weight="600">/task-decompose</tspan><tspan fill="#6b7280">  orchestrator → decomposer → worker</tspan></text><circle cx="139" cy="308" r="4.5" fill="#13897c"/><text x="153" y="312" font-size="14"><tspan fill="#0f766e" font-weight="600">ISSUE-FIRST</tspan><tspan fill="#6b7280">  no issue, no code</tspan></text><rect x="110" y="363" width="740" height="178" rx="16" fill="#ffffff" stroke="#ecebe6" filter="url(#soft)"/><text x="136" y="395" font-size="18.5" font-weight="700" fill="#1f2329">🤝&#8201;&#8201;Sign-off gates</text><text x="828" y="393" text-anchor="end" font-size="11.5" letter-spacing="1.2" fill="#b9bdc4">PHASE 1</text><line x1="136" y1="407" x2="828" y2="407" stroke="#ecebe6"/><circle cx="139" cy="431" r="4.5" fill="#ea7a3c"/><text x="153" y="435" font-size="14"><tspan fill="#b4530f" font-weight="600">schema-review</tspan><tspan fill="#6b7280">  sign off the data model · #314</tspan></text><circle cx="139" cy="458" r="4.5" fill="#ea7a3c"/><text x="153" y="462" font-size="14"><tspan fill="#b4530f" font-weight="600">ui-proposal</tspan><tspan fill="#6b7280">  sign off the look, live preview · #307</tspan></text><circle cx="139" cy="485" r="4.5" fill="#ea7a3c"/><text x="153" y="489" font-size="14"><tspan fill="#b4530f" font-weight="600">test-review</tspan><tspan fill="#6b7280">  sign off the behaviour · #774</tspan></text><circle cx="139" cy="512" r="4.5" fill="#13897c"/><text x="153" y="516" font-size="14"><tspan fill="#0f766e" font-weight="600">status:blocked</tspan><tspan fill="#6b7280">  each opens the loop on the right</tspan></text><rect x="110" y="567" width="740" height="178" rx="16" fill="#ffffff" stroke="#ecebe6" filter="url(#soft)"/><text x="136" y="599" font-size="18.5" font-weight="700" fill="#1f2329">🔨&#8201;&#8201;Build</text><text x="828" y="597" text-anchor="end" font-size="11.5" letter-spacing="1.2" fill="#b9bdc4">PHASE 2</text><line x1="136" y1="611" x2="828" y2="611" stroke="#ecebe6"/><circle cx="139" cy="635" r="4.5" fill="#ea7a3c"/><text x="153" y="639" font-size="14"><tspan fill="#b4530f" font-weight="600">crouton</tspan><tspan fill="#6b7280">  schema → Form / List / API / migration</tspan></text><circle cx="139" cy="662" r="4.5" fill="#ea7a3c"/><text x="153" y="666" font-size="14"><tspan fill="#b4530f" font-weight="600">db-migrations</tspan><tspan fill="#6b7280">  generate &amp; apply the migration</tspan></text><circle cx="139" cy="689" r="4.5" fill="#9aa0a6"/><text x="153" y="693" font-size="14"><tspan fill="#6b7280" font-weight="600">pnpm typecheck</tspan><tspan fill="#6b7280">  after every change</tspan></text><circle cx="139" cy="716" r="4.5" fill="#13897c"/><text x="153" y="720" font-size="14"><tspan fill="#0f766e" font-weight="600">packages/ hook</tspan><tspan fill="#6b7280">  shared-code is gated · new apps → pocs/</tspan></text><rect x="110" y="771" width="740" height="151" rx="16" fill="#ffffff" stroke="#ecebe6" filter="url(#soft)"/><text x="136" y="803" font-size="18.5" font-weight="700" fill="#1f2329">📝&#8201;&#8201;Commit</text><text x="828" y="801" text-anchor="end" font-size="11.5" letter-spacing="1.2" fill="#b9bdc4">PHASE 3</text><line x1="136" y1="815" x2="828" y2="815" stroke="#ecebe6"/><circle cx="139" cy="839" r="4.5" fill="#22a865"/><text x="153" y="843" font-size="14"><tspan fill="#15803d" font-wei