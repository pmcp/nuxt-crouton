<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2ea043"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="580" fill="#0e1116"/>
  <text x="32" y="34" fill="#e6edf3" font-size="20" font-weight="700">Journey: a customer feature request, end to end</text>
  <text x="32" y="54" fill="#9aa7b4" font-size="13">👤 human step · 🤖 agent step · 🔁 closing the loop. Follow the arrows: top-left → right, drop down, right → left.</text>

  <!-- ===== ROW 1 (left -> right) ===== -->
  <!-- 1 -->
  <rect x="40" y="96" width="210" height="76" rx="9" fill="#241a10" stroke="#8a5a1a"/>
  <text x="145" y="124" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">📧 Customer email</text>
  <text x="145" y="143" text-anchor="middle" fill="#f0a020" font-size="10.5">→ lands in HubSpot</text>
  <text x="145" y="160" text-anchor="middle" fill="#9aa7b4" font-size="10">the outside world</text>
  <!-- 2 -->
  <rect x="296" y="96" width="210" height="76" rx="9" fill="#1b2230" stroke="#3d4856"/>
  <text x="401" y="124" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">👤 PM triages</text>
  <text x="401" y="143" text-anchor="middle" fill="#9aa7b4" font-size="10.5">recognises a real need</text>
  <!-- 3 -->
  <rect x="552" y="96" width="210" height="76" rx="9" fill="#1d1830" stroke="#5a3da8"/>
  <text x="657" y="120" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">📚 User story</text>
  <text x="657" y="139" text-anchor="middle" fill="#b69cff" font-size="10.5">in Notion · persona</text>
  <text x="657" y="156" text-anchor="middle" fill="#9aa7b4" font-size="10">links the requester</text>
  <!-- 4 -->
  <rect x="808" y="96" width="210" height="76" rx="9" fill="#1d1830" stroke="#5a3da8"/>
  <text x="913" y="120" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">📚 Epic “work page”</text>
  <text x="913" y="139" text-anchor="middle" fill="#b69cff" font-size="10.5">groups stories → sprint</text>
  <text x="913" y="156" text-anchor="middle" fill="#9aa7b4" font-size="10">👤 marks it ready</text>
  <!-- 5 -->
  <rect x="1030" y="96" width="210" height="76" rx="9" fill="#2a2010" stroke="#f0a020"/>
  <text x="1135" y="124" text-anchor="middle" fill="#f0a020" font-size="13" font-weight="600">⚙ Agent bridge</text>
  <text x="1135" y="143" text-anchor="middle" fill="#9aa7b4" font-size="10">reads epic + stories →</text>
  <text x="1135" y="158" text-anchor="middle" fill="#9aa7b4" font-size="10">creates GitHub issues</text>

  <!-- row1 arrows -->
  <line x1="250" y1="134" x2="296" y2="134" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="506" y1="134" x2="552" y2="134" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="762" y1="134" x2="808" y2="134" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="1018" y1="134" x2="1030" y2="134" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>

  <!-- drop down from 5 to 6 -->
  <path d="M1135,172 L1135,300" fill="none" stroke="#8b949e" stroke-width="2.4" marker-end="url(#a)"/>

  <!-- ===== ROW 2 (right -> left) ===== -->
  <!-- 6 -->
  <rect x="1030" y="300" width="210" height="76" rx="9" fill="#0d1a26" stroke="#1f6feb"/>
  <text x="1135" y="328" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">⚙️ GitHub epic</text>
  <text x="1135" y="347" text-anchor="middle" fill="#9aa7b4" font-size="10.5">+ sub-issues</text>
  <text x="1135" y="364" text-anchor="middle" fill="#9aa7b4" font-size="10">backlinked to stories</text>
  <!-- 7 -->
  <rect x="808" y="300" width="210" height="76" rx="9" fill="#16202c" stroke="#3d5266"/>
  <text x="913" y="324" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">👤🤖 Split the work</text>
  <text x="913" y="343" text-anchor="middle" fill="#9aa7b4" font-size="10.5">devs: gnarly · agents:</text>
  <text x="913" y="359" text-anchor="middle" fill="#9aa7b4" font-size="10">scaffold/tests/docs · plan in Linear</text>
  <!-- 8 -->
  <rect x="552" y="300" width="210" height="76" rx="9" fill="#16202c" stroke="#3d5266"/>
  <text x="657" y="324" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">🔀 PRs + sign-off</text>
  <text x="657" y="343" text-anchor="middle" fill="#9aa7b4" font-size="10.5">preview · screenshots</text>
  <text x="657" y="359" text-anchor="middle" fill="#9aa7b4" font-size="10">👤 approve the gates</text>
  <!-- 9 -->
  <rect x="296" y="300" width="210" height="76" rx="9" fill="#13241a" stroke="#2ea043"/>
  <text x="401" y="328" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="600">🚀 Merge + deploy</text>
  <text x="401" y="347" text-anchor="middle" fill="#9aa7b4" font-size="10.5">staging preview</text>
  <!-- 10 -->
  <rect x="40" y="300" width="210" height="76" rx="9" fill="#102219" stroke="#2ea043" stroke-width="2"/>
  <text x="145" y="326" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="700">🔁 Changelog</text>
  <text x="145" y="345" text-anchor="middle" fill="#9aa7b4" font-size="10.5">“what changed &amp; why”</text>
  <text x="145" y="361" text-anchor="middle" fill="#9aa7b4" font-size="10">→ Slack + HubSpot</text>

  <!-- row2 arrows (pointing left) -->
  <line x1="1030" y1="338" x2="1018" y2="338" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>
  <line x1="808" y1="338" x2="762" y2="338" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="552" y1="338" x2="506" y2="338" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <line x1="296" y1="338" x2="250" y2="338" stroke="#2ea043" stroke-width="2" marker-end="url(#ag)"/>

  <!-- close the loop: changelog back to the customer -->
  <path d="M145,300 C145,240 145,200 145,172" fill="none" stroke="#2ea043" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#ag)"/>
  <text x="160" y="240" fill="#7ee787" font-size="11" font-weight="600">“we listened —</text>
  <text x="160" y="256" fill="#7ee787" font-size="11" font-weight="600">here’s the change”</text>

  <!-- footer -->
  <line x1="40" y1="430" x2="1240" y2="430" stroke="#2a3038"/>
  <text x="40" y="458" fill="#9aa7b4" font-size="11.5">Humans spend their time on <tspan fill="#cdd3e0">judgement</tspan> (priorities · reviews · approvals); agents do the <tspan fill="#cdd3e0">boilerplate</tspan> (scaffolding · tests · docs · screenshots).</text>
  <text x="40" y="480" fill="#9aa7b4" font-size="11.5">The same shape covers a <tspan fill="#cdd3e0">bug</tspan> (skip Notion → straight to GitHub), a <tspan fill="#cdd3e0">chore</tspan> (scheduled, no customer), and a <tspan fill="#cdd3e0">UI change</tspan> (adds the Storybook↔Figma loop).</text>
  <text x="40" y="508" fill="#6e7681" font-size="11">Other journeys are written out in team-operating-model.md.</text>
</svg>
