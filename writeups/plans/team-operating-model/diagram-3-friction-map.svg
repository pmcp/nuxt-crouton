<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 770" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e6edf3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="770" fill="#0e1116"/>
  <text x="32" y="34" fill="#e6edf3" font-size="20" font-weight="700">Friction map — a request from anywhere, end to end (15 steps)</text>
  <text x="32" y="54" fill="#9aa7b4" font-size="13">Intake is "capture from anywhere → Notion", not "write a story". <tspan fill="#f85149">Red boxes = where work stalls or leaks.</tspan></text>

  <!-- ===== PHASE HEADERS ===== -->
  <rect x="30"   y="96" width="226" height="40" rx="8" fill="#2a2010" stroke="#f0a020"/>
  <text x="143"  y="121" text-anchor="middle" fill="#f0a020" font-size="13" font-weight="700">A · CAPTURE</text>
  <rect x="274"  y="96" width="226" height="40" rx="8" fill="#1d1830" stroke="#b69cff"/>
  <text x="387"  y="121" text-anchor="middle" fill="#b69cff" font-size="13" font-weight="700">B · SHAPE</text>
  <rect x="518"  y="96" width="226" height="40" rx="8" fill="#2a1a10" stroke="#f0883e"/>
  <text x="631"  y="121" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="700">C · BRIDGE</text>
  <rect x="762"  y="96" width="226" height="40" rx="8" fill="#0d1a26" stroke="#58a6ff"/>
  <text x="875"  y="121" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">D · DO THE WORK</text>
  <rect x="1006" y="96" width="226" height="40" rx="8" fill="#102219" stroke="#2ea043"/>
  <text x="1119" y="121" text-anchor="middle" fill="#2ea043" font-size="13" font-weight="700">E · SHIP + CLOSE</text>

  <!-- phase flow arrows -->
  <line x1="258" y1="116" x2="272" y2="116" stroke="#e6edf3" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="502" y1="116" x2="516" y2="116" stroke="#e6edf3" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="746" y1="116" x2="760" y2="116" stroke="#e6edf3" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="990" y1="116" x2="1004" y2="116" stroke="#e6edf3" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ============ A · CAPTURE (cx=143) ============ -->
  <rect x="30" y="156" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="143" y="178" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">1 · Intent appears</text>
  <text x="143" y="196" text-anchor="middle" fill="#9aa7b4" font-size="10">Slack · Claude · Codex · email</text>
  <text x="143" y="214" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ request, or just chatter?</text>

  <rect x="30" y="246" width="226" height="78" rx="8" fill="#1f1416" stroke="#f85149"/>
  <text x="143" y="268" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">2 · 🤖 Capture agent</text>
  <text x="143" y="286" text-anchor="middle" fill="#9aa7b4" font-size="10">normalize → draft Notion story</text>
  <text x="143" y="304" text-anchor="middle" fill="#f85149" font-size="9.5">⚠ clean "need" from messy input</text>

  <rect x="30" y="336" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="143" y="358" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">3 · 🤖 Dedup check</text>
  <text x="143" y="376" text-anchor="middle" fill="#9aa7b4" font-size="10">new, or duplicate / sibling?</text>
  <text x="143" y="394" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ fuzzy matching both ways</text>

  <rect x="30" y="426" width="226" height="78" rx="8" fill="#1f1416" stroke="#f85149"/>
  <text x="143" y="448" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">4 · 👤 PM confirms draft</text>
  <text x="143" y="466" text-anchor="middle" fill="#9aa7b4" font-size="10">right? edit / merge</text>
  <text x="143" y="484" text-anchor="middle" fill="#f85149" font-size="9.5">⚠ validate + 🪪 who asked?</text>

  <line x1="143" y1="234" x2="143" y2="246" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="143" y1="324" x2="143" y2="336" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="143" y1="414" x2="143" y2="426" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ============ B · SHAPE (cx=387) ============ -->
  <rect x="274" y="156" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="387" y="178" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">5 · 👤 Link related</text>
  <text x="387" y="196" text-anchor="middle" fill="#9aa7b4" font-size="10">Notion relations</text>
  <text x="387" y="214" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ manual; miss siblings</text>

  <rect x="274" y="246" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="387" y="268" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">6 · 👤 Group → epic</text>
  <text x="387" y="286" text-anchor="middle" fill="#9aa7b4" font-size="10">"work page" for a sprint</text>
  <text x="387" y="304" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ when is a cluster ready?</text>

  <rect x="274" y="336" width="226" height="78" rx="8" fill="#1f1416" stroke="#f85149"/>
  <text x="387" y="358" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">7 · 👤 Mark ready</text>
  <text x="387" y="376" text-anchor="middle" fill="#9aa7b4" font-size="10">the go signal</text>
  <text x="387" y="394" text-anchor="middle" fill="#f85149" font-size="9.5">⚠ fuzzy gate; weak criteria cascade</text>

  <line x1="387" y1="234" x2="387" y2="246" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="387" y1="324" x2="387" y2="336" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ============ C · BRIDGE (cx=631) ============ -->
  <rect x="518" y="156" width="226" height="78" rx="8" fill="#1f1416" stroke="#f85149"/>
  <text x="631" y="178" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">8 · 🤖 Agent bridge</text>
  <text x="631" y="196" text-anchor="middle" fill="#9aa7b4" font-size="10">→ GitHub epic + sub-issues</text>
  <text x="631" y="214" text-anchor="middle" fill="#f85149" font-size="9.5">⚠ mapping fidelity + re-sync?</text>

  <rect x="518" y="246" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="631" y="268" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">9 · 🤖 Backlinks + Linear</text>
  <text x="631" y="286" text-anchor="middle" fill="#9aa7b4" font-size="10">native two-way mirror</text>
  <text x="631" y="304" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ bot-identity vs triggers</text>

  <line x1="631" y1="234" x2="631" y2="246" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ============ D · DO THE WORK (cx=875) ============ -->
  <rect x="762" y="156" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="875" y="178" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">10 · 👤🤖 Route work</text>
  <text x="875" y="196" text-anchor="middle" fill="#9aa7b4" font-size="10">agents vs devs · plan in Linear</text>
  <text x="875" y="214" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ who splits? capacity</text>

  <rect x="762" y="246" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="875" y="268" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">11 · 🤖 Open PRs</text>
  <text x="875" y="286" text-anchor="middle" fill="#9aa7b4" font-size="10">preview URLs + screenshots</text>
  <text x="875" y="304" text-anchor="middle" fill="#3fb950" font-size="9.5">✓ flows</text>

  <rect x="762" y="336" width="226" height="78" rx="8" fill="#1f1416" stroke="#f85149"/>
  <text x="875" y="358" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">12 · 🚦 Sign-off gates</text>
  <text x="875" y="376" text-anchor="middle" fill="#9aa7b4" font-size="10">👤 approve · 🤖 revise</text>
  <text x="875" y="394" text-anchor="middle" fill="#f85149" font-size="9.5">⚠ LATENCY — #1 bottleneck</text>

  <line x1="875" y1="234" x2="875" y2="246" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="875" y1="324" x2="875" y2="336" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ============ E · SHIP + CLOSE (cx=1119) ============ -->
  <rect x="1006" y="156" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="1119" y="178" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">13 · 🚀 Merge + deploy</text>
  <text x="1119" y="196" text-anchor="middle" fill="#9aa7b4" font-size="10">staging preview</text>
  <text x="1119" y="214" text-anchor="middle" fill="#3fb950" font-size="9.5">✓ flows</text>

  <rect x="1006" y="246" width="226" height="78" rx="8" fill="#16202c" stroke="#30363d"/>
  <text x="1119" y="268" text-anchor="middle" fill="#e6edf3" font-size="12.5" font-weight="600">14 · 🤖 Changelog</text>
  <text x="1119" y="286" text-anchor="middle" fill="#9aa7b4" font-size="10">"what changed &amp; why"</text>
  <text x="1119" y="304" text-anchor="middle" fill="#f0a020" font-size="9.5">⚠ tone + map to requester</text>

  <rect x="1006" y="336" width="226" height="78" rx="8" fill="#1f1416" stroke="#f85149"/>
  <text x="1119" y="358" text-anchor="middle" fill="#7ee787" font-size="12.5" font-weight="700">15 · 🔁 Tell them</text>
  <text x="1119" y="376" text-anchor="middle" fill="#9aa7b4" font-size="10">HubSpot · Slack · digest</text>
  <text x="1119" y="394" text-anchor="middle" fill="#f85149" font-size="9.5">⚠ most likely to silently drop</text>

  <line x1="1119" y1="234" x2="1119" y2="246" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>
  <line x1="1119" y1="324" x2="1119" y2="336" stroke="#8b949e" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ===== FRICTION HOTSPOTS ===== -->
  <line x1="30" y1="540" x2="1232" y2="540" stroke="#2a3038"/>
  <text x="30" y="568" fill="#f85149" font-size="14" font-weight="700" letter-spacing=".5">🔥 FRICTION HOTSPOTS — focus here</text>

  <text x="30" y="596" fill="#cdd3e0" font-size="11.5">① <tspan fill="#f0a020">Capture &amp; normalization (1–4)</tspan> — turn any surface's mess into a clean, de-duped, owned story. Most of the friction lives here.</text>
  <text x="30" y="618" fill="#cdd3e0" font-size="11.5">② <tspan fill="#f0a020">The "ready" gate (7)</tspan> — fuzzy human judgement; weak acceptance criteria poison everything downstream.</text>
  <text x="30" y="640" fill="#cdd3e0" font-size="11.5">③ <tspan fill="#f0a020">Notion → GitHub handoff (8)</tspan> — no native sync, so fidelity + "what if the story changes later?" are unsolved.</text>
  <text x="30" y="662" fill="#cdd3e0" font-size="11.5">④ <tspan fill="#f0a020">Sign-off latency (12)</tspan> — gates block on a human looking; this is the top throughput bottleneck.</text>
  <text x="30" y="684" fill="#cdd3e0" font-size="11.5">⑤ <tspan fill="#f0a020">Closing the loop (15)</tspan> — the "we listened" step is the one most likely to silently never happen.</text>

  <text x="30" y="722" fill="#6e7681" font-size="11">A bug skips A–B (straight to GitHub). A chore starts at D (scheduled, no requester). A UI change adds the Storybook↔Figma loop inside D.</text>
</svg>
