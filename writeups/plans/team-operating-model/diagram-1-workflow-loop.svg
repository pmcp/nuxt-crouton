<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1020" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowWarn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f0a020"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="1020" fill="#0e1116"/>
  <text x="32" y="34" fill="#e6edf3" font-size="20" font-weight="700">Team Workflow Loop — draft v1</text>
  <text x="32" y="54" fill="#9aa7b4" font-size="13">5 people (CEO · CTO · PM · 2 devs) + AI agents. Orange = open decision, not locked.</text>

  <!-- ===================== BAND 1: HUMANS ===================== -->
  <rect x="30" y="70" width="1220" height="118" rx="12" fill="#10151c" stroke="#2a3038"/>
  <text x="46" y="90" fill="#9aa7b4" font-size="12" letter-spacing="1.5">👥 HUMANS — WORK WHERE YOU'RE COMFORTABLE</text>

  <g>
    <rect x="55" y="104" width="270" height="64" rx="9" fill="#1b2230" stroke="#3d4856"/>
    <text x="190" y="132" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">💬 Slack</text>
    <text x="190" y="152" text-anchor="middle" fill="#9aa7b4" font-size="11">ask · get pinged · kick off</text>
  </g>
  <g>
    <rect x="355" y="104" width="270" height="64" rx="9" fill="#1b2230" stroke="#3d4856"/>
    <text x="490" y="132" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">📋 Linear</text>
    <text x="490" y="152" text-anchor="middle" fill="#9aa7b4" font-size="11">plan together / roadmap</text>
  </g>
  <g>
    <rect x="655" y="104" width="270" height="64" rx="9" fill="#1b2230" stroke="#3d4856"/>
    <text x="790" y="132" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">📚 Notion</text>
    <text x="790" y="152" text-anchor="middle" fill="#9aa7b4" font-size="11">docs + knowledge base</text>
  </g>
  <g>
    <rect x="955" y="104" width="270" height="64" rx="9" fill="#1b2230" stroke="#3d4856"/>
    <text x="1090" y="132" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">📣 HubSpot</text>
    <text x="1090" y="152" text-anchor="middle" fill="#9aa7b4" font-size="11">marketing-page initiatives</text>
  </g>

  <!-- Slack -> Notion (knowledge) -->
  <line x1="325" y1="136" x2="650" y2="136" stroke="#8b949e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="487" y="128" text-anchor="middle" fill="#9aa7b4" font-size="10.5">or → knowledge doc</text>

  <!-- ===================== BAND 2: ENGINE ===================== -->
  <rect x="180" y="248" width="920" height="150" rx="12" fill="#0d1a26" stroke="#1f6feb"/>
  <text x="196" y="268" fill="#58a6ff" font-size="12" letter-spacing="1.2">⚙️ GITHUB — THE ENGINE</text>
  <text x="420" y="268" fill="#f0a020" font-size="12">❓ proposed source of truth</text>

  <g>
    <rect x="205" y="288" width="190" height="72" rx="8" fill="#16202c" stroke="#3d5266"/>
    <text x="300" y="318" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="600">Issues</text>
    <text x="300" y="336" text-anchor="middle" fill="#9aa7b4" font-size="10.5">+ sub-issues · labels=triggers</text>
  </g>
  <g>
    <rect x="431" y="288" width="190" height="72" rx="8" fill="#16202c" stroke="#3d5266"/>
    <text x="526" y="314" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="600">🤖 Agents</text>
    <text x="526" y="332" text-anchor="middle" fill="#9aa7b4" font-size="10">orchestrator → decomposer</text>
    <text x="526" y="346" text-anchor="middle" fill="#9aa7b4" font-size="10">→ worker</text>
  </g>
  <g>
    <rect x="657" y="288" width="190" height="72" rx="8" fill="#16202c" stroke="#3d5266"/>
    <text x="752" y="318" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="600">PRs</text>
    <text x="752" y="336" text-anchor="middle" fill="#9aa7b4" font-size="10.5">+ sign-off gates</text>
  </g>
  <g>
    <rect x="883" y="288" width="190" height="72" rx="8" fill="#16202c" stroke="#3d5266"/>
    <text x="978" y="318" text-anchor="middle" fill="#e6edf3" font-size="13.5" font-weight="600">Postmortem</text>
    <text x="978" y="336" text-anchor="middle" fill="#9aa7b4" font-size="10.5">→ improvement tickets</text>
  </g>

  <!-- engine internal arrows -->
  <line x1="395" y1="324" x2="431" y2="324" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <line x1="621" y1="324" x2="657" y2="324" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <line x1="847" y1="324" x2="883" y2="324" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <!-- return loop postmortem -> issues -->
  <path d="M978,360 L978,380 L300,380 L300,360" fill="none" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arrowAccent)"/>
  <text x="639" y="394" text-anchor="middle" fill="#58a6ff" font-size="10">the loop tightens itself</text>

  <!-- ===================== INTAKE arrows (humans -> engine) ===================== -->
  <!-- Slack -> Issues -->
  <path d="M190,168 L210,230 L290,288" fill="none" stroke="#f0a020" stroke-width="2" marker-end="url(#arrowWarn)"/>
  <text x="150" y="222" fill="#f0a020" font-size="10.5">question → ticket ❓</text>
  <!-- Linear <-> engine (two-way) -->
  <line x1="490" y1="168" x2="490" y2="248" stroke="#8b949e" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="500" y="212" fill="#9aa7b4" font-size="10.5">two-way sync</text>
  <!-- HubSpot <-> engine -->
  <path d="M1090,168 L1060,210 L1010,248" fill="none" stroke="#8b949e" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="1075" y="206" fill="#9aa7b4" font-size="10.5">initiative ↔ ticket</text>

  <!-- ===================== BAND 3: TWO LOOPS ===================== -->
  <!-- Design-system loop -->
  <rect x="30" y="440" width="600" height="218" rx="12" fill="#13101c" stroke="#5a3da8"/>
  <text x="46" y="460" fill="#b69cff" font-size="12" letter-spacing="1">🎨 DESIGN-SYSTEM LOOP — STORYBOOK-LED</text>

  <g>
    <rect x="70" y="480" width="230" height="58" rx="8" fill="#1d1830" stroke="#5a3da8"/>
    <text x="185" y="506" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Storybook</text>
    <text x="185" y="524" text-anchor="middle" fill="#9aa7b4" font-size="10">source of truth (components)</text>
  </g>
  <g>
    <rect x="360" y="480" width="230" height="58" rx="8" fill="#1d1830" stroke="#5a3da8"/>
    <text x="475" y="506" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Figma</text>
    <text x="475" y="524" text-anchor="middle" fill="#9aa7b4" font-size="10">kept in sync</text>
  </g>
  <g>
    <rect x="215" y="576" width="230" height="58" rx="8" fill="#1d1830" stroke="#5a3da8"/>
    <text x="330" y="602" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Detach → fix → propose</text>
    <text x="330" y="620" text-anchor="middle" fill="#9aa7b4" font-size="10">team reviews</text>
  </g>
  <line x1="300" y1="509" x2="360" y2="509" stroke="#b69cff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="500" text-anchor="middle" fill="#b69cff" font-size="9.5">sync</text>
  <path d="M475,538 L430,576" fill="none" stroke="#b69cff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="562" fill="#b69cff" font-size="9.5">detach</text>
  <path d="M230,576 L190,538" fill="none" stroke="#b69cff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="120" y="562" fill="#b69cff" font-size="9.5">approved → code</text>

  <!-- Docs loop -->
  <rect x="660" y="440" width="590" height="218" rx="12" fill="#0d1a14" stroke="#2ea043"/>
  <text x="676" y="460" fill="#7ee787" font-size="12" letter-spacing="1">📝 DOCS LOOP — ALWAYS IN SYNC</text>

  <g>
    <rect x="720" y="520" width="220" height="60" rx="8" fill="#13211a" stroke="#2ea043"/>
    <text x="830" y="546" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Code change</text>
    <text x="830" y="564" text-anchor="middle" fill="#9aa7b4" font-size="10">in the repo</text>
  </g>
  <g>
    <rect x="1000" y="520" width="220" height="60" rx="8" fill="#13211a" stroke="#2ea043"/>
    <text x="1110" y="546" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Docs</text>
    <text x="1110" y="564" text-anchor="middle" fill="#9aa7b4" font-size="10">site + Notion</text>
  </g>
  <line x1="940" y1="542" x2="1000" y2="542" stroke="#7ee787" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="970" y="534" text-anchor="middle" fill="#7ee787" font-size="9.5">sync-docs</text>
  <line x1="1000" y1="562" x2="940" y2="562" stroke="#7ee787" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="970" y="578" text-anchor="middle" fill="#7ee787" font-size="9.5">feedback</text>

  <!-- engine -> loops -->
  <path d="M470,360 L360,440" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="420" fill="#9aa7b4" font-size="10">components</text>
  <path d="M640,360 L830,440" fill="none" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="720" y="420" fill="#9aa7b4" font-size="10">docs</text>

  <!-- ===================== BAND 4: RUNNERS & PREVIEW TARGETS ===================== -->
  <rect x="180" y="700" width="920" height="120" rx="12" fill="#10151c" stroke="#2a3038"/>
  <text x="196" y="720" fill="#9aa7b4" font-size="12" letter-spacing="1.2">🖥️ RUNNERS &amp; PREVIEW TARGETS — WHERE WORK EXECUTES &amp; DEPLOYS</text>

  <g>
    <rect x="210" y="740" width="280" height="60" rx="8" fill="#1b2230" stroke="#3d4856"/>
    <text x="350" y="764" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">Cloud CI + Cloudflare</text>
    <text x="350" y="782" text-anchor="middle" fill="#9aa7b4" font-size="10">crouton apps · e2e · staging preview</text>
  </g>
  <g>
    <rect x="510" y="740" width="280" height="60" rx="8" fill="#0d1620" stroke="#4a4a4a"/>
    <text x="650" y="764" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">▲ Vercel</text>
    <text x="650" y="782" text-anchor="middle" fill="#9aa7b4" font-size="10">marketing site · dashboards · preview deploys</text>
  </g>
  <g>
    <rect x="810" y="740" width="280" height="60" rx="8" fill="#241a10" stroke="#8a5a1a"/>
    <text x="950" y="764" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600">🍎 Mac mini</text>
    <text x="950" y="782" text-anchor="middle" fill="#f0a020" font-size="10">macOS / Apple builds + physical tests</text>
  </g>

  <!-- engine -> runners (center spine, between the two loops) -->
  <path d="M645,398 L645,700" fill="none" stroke="#8b949e" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="652" y="690" fill="#9aa7b4" font-size="10">dispatch work</text>

  <!-- results/feedback return channel (far right, up and over into Slack + Linear) -->
  <path d="M1090,758 L1242,758 L1242,62 L175,62 L175,70" fill="none" stroke="#2ea043" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M490,62 L490,70" fill="none" stroke="#2ea043" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="1254" y="430" fill="#7ee787" font-size="11" transform="rotate(90 1254 430)" text-anchor="middle">feedback → preview links · screenshots · CI status · test outcomes · blocked-needs-you</text>
  <text x="640" y="57" fill="#7ee787" font-size="11.5" font-weight="600">🔔 ping + 💬 reply → lands in Slack &amp; Linear</text>

  <!-- postmortem -> notion -->
  <path d="M940,288 L860,188 L820,168" fill="none" stroke="#9aa7b4" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="905" y="240" fill="#9aa7b4" font-size="10">learnings</text>

  <!-- ===================== BAND 5: MEASUREMENT (PostHog) ===================== -->
  <rect x="400" y="858" width="480" height="62" rx="12" fill="#1c1408" stroke="#f0883e"/>
  <text x="640" y="884" text-anchor="middle" fill="#f5a623" font-size="14" font-weight="700">📊 PostHog — the measurement loop</text>
  <text x="640" y="904" text-anchor="middle" fill="#9aa7b4" font-size="10.5">measures real user journeys + analytics (in production)</text>

  <!-- production -> PostHog -->
  <path d="M645,820 L645,858" fill="none" stroke="#8b949e" stroke-width="2.2" marker-end="url(#arrow)"/>
  <text x="654" y="844" fill="#9aa7b4" font-size="10">real usage</text>

  <!-- evidence channel (far left, PostHog -> back up to Notion / capture) -->
  <path d="M400,889 L60,889 L60,136 L655,136" fill="none" stroke="#f0883e" stroke-width="2.2" marker-end="url(#arrowWarn)"/>
  <text x="48" y="500" fill="#f5a623" font-size="11" transform="rotate(-90 48 500)" text-anchor="middle">evidence → new stories · validate the bet (did it actually work?)</text>

  <!-- ===================== LEGEND ===================== -->
  <text x="32" y="962" fill="#9aa7b4" font-size="11">──▶ solid = work / artifacts flow</text>
  <text x="290" y="962" fill="#9aa7b4" font-size="11">┄┄▶ dashed = knowledge / feedback</text>
  <text x="560" y="962" fill="#9aa7b4" font-size="11">◀──▶ two-way sync</text>
  <text x="760" y="962" fill="#2ea043" font-size="11">right = results back · left = evidence back</text>

  <text x="32" y="990" fill="#6e7681" font-size="11">Open ❓: (1) Slack intake target  (2) source of truth  (3) Storybook↔Figma sync mechanism  (4) HubSpot build path  (5) Mac mini scope</text>
</svg>
