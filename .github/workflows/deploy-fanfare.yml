name: Deploy Fanfare

# Thin caller for the reusable Workers deploy pipeline (#121, on #114's deploy-app.yml).
# Merge to `main` (or open a PR) → isolated, demo-seeded staging deploy
# (auto-provisioned fanfare-staging-db + KV, bound to kassa.pmcp.dev). Manual
# dispatch with environment=production → production (reuses fanfare-db, kassa.friendlyinter.net).
#
# Trunk = staging (#347): a merge to `main` touching the paths below auto-deploys
# the STAGING env — never production. Production stays a deliberate, human-only
# workflow_dispatch (env=production) per STANDING RULE #318 — important here:
# kassa.friendlyinter.net is a live cash register, so a merge must never ship prod.
# A push can never reach prod (the `environment` input requires workflow_dispatch).
#
# Replaces the old Pages workflows (deploy-fanfare.yml production + the separate
# deploy-fanfare-preview.yml that seeded the SHARED prod DB). The staging env now binds
# its own isolated DB — a PR deploy never touches production data.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/fanfare/**'
      - 'packages/crouton/**'
      - 'packages/crouton-core/**'
      - 'packages/crouton-auth/**'
      - 'packages/crouton-i18n/**'
      - 'packages/crouton-charts/**'
      - 'packages/crouton-pages/**'
      - 'packages/crouton-sales/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-fanfare.yml'
      - '.github/workflows/deploy-app.yml'
  pull_request:
    paths:
      - 'apps/fanfare/**'
      - 'packages/crouton/**'
      - 'packages/crouton-core/**'
      - 'packages/crouton-auth/**'
      - 'packages/crouton-i18n/**'
      - 'packages/crouton-charts/**'
      - 'packages/crouton-pages/**'
      - 'packages/crouton-sales/**'
      - '.github/workflows/deploy-fanfare.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    # The reusable workflow's PR-comment step needs pull-requests: write; a caller
    # must grant it explicitly or the call fails to validate under restrictive
    # default token permissions ("only allowed pull-requests: none").
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-app.yml
    with:
      app: fanfare
      environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') && 'production' || 'staging' }}
      production-url: https://kassa.friendlyinter.net
      staging-url: https://kassa.pmcp.dev
      # Only the dist-consumed packages with a build script. crouton-i18n/charts/
      # pages/sales are pure source layers — the reusable workflow skips those.
      layer-packages: '@fyit/crouton-core @fyit/crouton-auth @fyit/crouton'
    secrets: inherit
