name: Red-Team (PR)

# Per-PR adversarial security scan (epic #540). Runs the red-team subagent at
# depth=quick over the PR diff, posts an advisory comment, and FAILS the check on
# any high/critical finding (owner's choice — fail on high+), blocking merge.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      # Only the surfaces the threat model cares about — skip docs-only / config-only PRs.
      - '**/server/**'
      - '**/app/**'
      - '**/nuxt.config.ts'
      - 'packages/**'
      - 'apps/**'
      - 'pocs/**'

concurrency:
  group: red-team-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  red-team:
    # Skip drafts and bot-authored PRs (no point scanning Dependabot/agent noise here).
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.type != 'Bot'
    # Runner toggle (#610/#655): set repo var AGENT_RUNNER=mac-mini to route the agent loop
    # to the self-hosted Mac mini; unset ⇒ GitHub-hosted. This is the one fork-PR-triggered
    # Claude workflow, so the WS4 fork-PR approval gate (#656) is a HARD prerequisite before
    # AGENT_RUNNER is ever pointed at our own hardware.
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    # NOTE: permissions MUST live at the job level. GitHub job-level `permissions` fully
    # OVERRIDES (does not merge with) any workflow-level block, so `id-token: write` has to
    # be here or the claude-code-action OIDC token request fails ("Could not fetch an OIDC
    # token"). A workflow-level block would be silently shadowed.
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the agent can diff the PR against its base branch.
          fetch-depth: 0

      # Pinned to the same SHA as the repo's other claude-code-action workflows — bump together.
      - uses: anthropics/claude-code-action@c26cb6427d54362f5fd9834ac6818cbaaf82490a
        # The VERDICT FILE is the gate — NOT this step's exit code. The agent can exit non-zero
        # on `max_turns` (it flails writing the verdict / the SDK errors) even when it found
        # nothing high/critical, which was turning every PR red on a flake (#499, #602; #603 P1).
        # `continue-on-error` makes the "Gate on high/critical" step below the sole decider:
        # no verdict ⇒ inconclusive pass; a high/critical in the verdict ⇒ fail.
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: "--max-turns 30"
          prompt: |
            Act as the **red-team subagent** defined in `.claude/agents/red-team.md`.
            Input: { scope: "diff", depth: "quick" }.

            The PR diff is this branch vs its base. The base branch is
            `origin/${{ github.event.pull_request.base.ref }}` — diff against it
            (`git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD`)
            and scan ONLY the changed server/app/config code through the threat model in the
            agent definition. Be precise and avoid false positives — a red CI check on a
            wrong call is worse than a comment.

            Then do exactly two outputs:

            1. **Post a single PR comment** summarising the findings (severity table + each
               finding's location + one-line fix). Make it a sticky comment containing the
               literal marker `<!-- red-team -->` on its own line, and EDIT that comment in
               place if it already exists rather than posting a new one. If there are no
               findings, post/update the comment saying the quick scan found nothing.

            2. **Write `red-team-verdict.json`** at the repo root, exactly:
               `{"highest":"<none|low|medium|high|critical>","critical":N,"high":N,"medium":N,"low":N}`
               where `highest` is the most severe finding's severity (or `none`). This file
               is the machine signal the gate step reads — always write it, even for a clean scan.

            Do NOT edit any `apps/`/`packages/` code. Do NOT file GitHub issues (the daily
            sweep and the /red-team skill own issue-filing). Reporting + the verdict file is all.

      - name: Gate on high/critical
        if: always()
        run: |
          if [ ! -f red-team-verdict.json ]; then
            echo "::warning::red-team produced no verdict file — treating as inconclusive (not blocking)."
            exit 0
          fi
          echo "Verdict: $(cat red-team-verdict.json)"
          HIGHEST=$(node -e "process.stdout.write((require('./red-team-verdict.json').highest||'none').toLowerCase())")
          case "$HIGHEST" in
            critical|high)
              echo "::error::Red-team found a ${HIGHEST}-severity issue in this PR's diff — see the red-team PR comment. Blocking merge (fail on high+)."
              exit 1
              ;;
            *)
              echo "Red-team highest severity: ${HIGHEST}. No high/critical — check passes."
              ;;
          esac
