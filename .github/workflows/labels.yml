name: Sync issue labels

# Keeps the repo's label set in sync with .github/labels.yml (the source of truth).
# Non-destructive: skip_delete means existing labels are never removed.
# Runs when the label file changes on main, or on demand via the Actions tab.

on:
  push:
    branches: [main]
    paths: ['.github/labels.yml']
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml_file: .github/labels.yml
          skip_delete: true
          dry_run: false
