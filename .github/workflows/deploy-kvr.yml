name: Deploy KVR

on:
  push:
    branches:
      - main
    paths:
      - 'apps/kvr/**'
      - 'packages/crouton/**'
      - 'packages/crouton-auth/**'
      - 'packages/crouton-admin/**'
      - 'packages/crouton-core/**'
      - 'packages/crouton-i18n/**'
      - 'packages/crouton-email/**'
      - 'packages/crouton-maps/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-kvr.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache layer builds
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/crouton-auth/dist
            packages/crouton-core/dist
            packages/crouton/dist
          key: layer-builds-kvr-${{ hashFiles('packages/crouton-auth/**/*.ts', 'packages/crouton-core/**/*.ts', 'packages/crouton/**/*.ts') }}

      - name: Build layer packages
        if: steps.layer-cache.outputs.cache-hit != 'true'
        run: |
          pnpm --filter '@fyit/crouton-auth' build
          pnpm --filter '@fyit/crouton-core' build
          pnpm --filter '@fyit/crouton' build

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/kvr/node_modules/.cache
            apps/kvr/.nuxt/cache
          key: nuxt-build-kvr-${{ hashFiles('apps/kvr/**', 'packages/**/*.ts') }}
          restore-keys: |
            nuxt-build-kvr-

      - name: Run database migrations
        run: npx wrangler d1 migrations apply DB --remote
        working-directory: apps/kvr

      - name: Prepare Nuxt
        run: npx nuxt prepare
        working-directory: apps/kvr

      - name: Build
        run: npx nuxt build
        working-directory: apps/kvr
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          NITRO_PRESET: 'cloudflare-pages'
          BETTER_AUTH_SECRET: prerender-placeholder
          BETTER_AUTH_URL: 'https://kvr.friendlyinter.net'

      # Workaround: Wrangler 4.64+ rejects env blocks in redirected configs.
      # Nitro copies the full wrangler config (including env) into the generated
      # _worker.js/wrangler.json. Strip it so deploy succeeds.
      - name: Strip env from redirected wrangler config
        run: |
          CONFIG="dist/_worker.js/wrangler.json"
          if [ -f "$CONFIG" ] && grep -q '"env"' "$CONFIG"; then
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('$CONFIG', 'utf8'));
              delete cfg.env;
              fs.writeFileSync('$CONFIG', JSON.stringify(cfg, null, 2));
            "
          fi
        working-directory: apps/kvr

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/ --commit-dirty=true
        working-directory: apps/kvr