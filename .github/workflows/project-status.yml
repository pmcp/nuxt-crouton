name: Project status automation

# Auto-moves cards on the GitHub Project board (Status field) so it reflects
# reality without manual dragging:
#   - PR opened / reopened / ready for review  -> In review
#   - PR back to draft                          -> In progress
#   - PR closed (merged or not)                 -> Done
#   - Issue assigned or reopened                -> In progress
#   - Issue labeled status:in-progress          -> In progress
#   - Issue labeled status:blocked              -> Blocked
#   - Issue closed                              -> Done
# The label triggers are the reliable signal: the github-tasks flow (and
# agents) mark "work started" by applying status:in-progress, not by
# assigning — so without these an issue would skip In progress entirely and
# jump straight to In review when its PR opens.
# We own merged/closed -> Done here rather than delegating to the Project's
# built-in workflow, so the board advances deterministically without depending
# on a UI toggle that can silently be off. When a merged PR auto-closes its
# linked issues, each fires its own `issues: closed` event, so those cards move
# to Done too — including a parent epic once you close it.
# (Item added -> Backlog is still handled by the Project's built-in workflow.)
#
# ── Auth (#546): org-scoped Nuxt Harness App token, no PAT ──────────────────
# The board is now the FriendlyInternet **org** Projects v2 board ("Crouton").
# GITHUB_TOKEN can't write a Projects v2 board, but the Nuxt Harness App can:
# installed on the org with Organization → Projects: Read & write, it mints a
# short-lived installation token at runtime. This retires the PROJECTS_TOKEN PAT
# (the repo is fully PAT-free). Needs Actions secrets HARNESS_APP_ID +
# HARNESS_APP_PRIVATE_KEY (org-level). Set repo variable PROJECT_NAME only if
# the board isn't named "Crouton".
#
# The board is resolved by title at the ORG level (organization.projectsV2), NOT via
# repository.projectsV2 — a private org board isn't reliably returned by the repo-link
# lookup to an App token even when linked, which silently no-op'd this on every event.
# So card-moving no longer depends on the repo<->project link. (#646)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft, closed]
  issues:
    types: [assigned, reopened, labeled, closed]

permissions:
  contents: read

jobs:
  set-status:
    runs-on: ubuntu-latest
    steps:
      # Mint an org-scoped Nuxt Harness App installation token. `owner` (no
      # `repositories`) yields a token carrying the org-level grants — here
      # Organization → Projects: Read & write — which is what writing the
      # org board requires. (#546)
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
          owner: FriendlyInternet
      - uses: actions/github-script@v7
        env:
          PROJECT_NAME: ${{ vars.PROJECT_NAME || 'Crouton' }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const projectName = process.env.PROJECT_NAME
            const { owner, repo } = context.repo

            // Map a status:* label to a board column. Returning null means
            // "ignore this label" so unrelated labels are a clean no-op.
            const labelToStatus = (name) => {
              switch ((name || '').toLowerCase()) {
                case 'status:in-progress': return 'In progress'
                case 'status:blocked':     return 'Blocked'
                default:                   return null
              }
            }

            // Decide the target Status from the event
            let target = null
            if (context.eventName === 'pull_request') {
              const a = context.payload.action
              // closed covers both merge and close-without-merge — either way
              // the PR is off the board's active lanes.
              if (a === 'closed') target = 'Done'
              else if (a === 'converted_to_draft') target = 'In progress'
              else target = 'In review' // opened / reopened / ready_for_review
            } else if (context.eventName === 'issues') {
              const a = context.payload.action
              // A merged PR's `Closes #NN` auto-closes its issues, firing this
              // `closed` event — that's what advances sub-issues (and a manually
              // closed parent epic) to Done.
              if (a === 'closed') target = 'Done'
              // `labeled` is the reliable "work started/blocked" signal; the
              // label name decides the column. assigned/reopened keep the old
              // In-progress behaviour as a fallback.
              else if (a === 'labeled') target = labelToStatus(context.payload.label?.name)
              else target = 'In progress'
            }
            if (!target) return

            const contentNodeId = context.payload.pull_request?.node_id
              ?? context.payload.issue?.node_id
            if (!contentNodeId) return

            // 1) Find the project + its Status field/options by title, among the ORG's
            //    Projects v2 boards. Resolving at the org level (not repository.projectsV2)
            //    keeps this working without the repo<->project link, which doesn't reliably
            //    surface a private org board to the App token even when linked. (#646)
            let project = null
            let pcursor = null
            do {
              const projQ = await github.graphql(`
                query($org:String!,$cursor:String){
                  organization(login:$org){
                    projectsV2(first:100, after:$cursor){
                      pageInfo{ hasNextPage endCursor }
                      nodes {
                        id title
                        field(name:"Status"){ ... on ProjectV2SingleSelectField { id options { id name } } }
                      }
                    }
                  }
                }`, { org: owner, cursor: pcursor })
              const conn = projQ.organization.projectsV2
              project = conn.nodes.find(p => p.title === projectName)
              pcursor = (!project && conn.pageInfo.hasNextPage) ? conn.pageInfo.endCursor : null
            } while (pcursor)
            if (!project || !project.field) { core.warning(`Project "${projectName}" or its Status field not found`); return }
            const option = project.field.options.find(o => o.name.toLowerCase() === target.toLowerCase())
            if (!option) { core.warning(`Status option "${target}" not found`); return }

            // 2) Find this item on the project (add it if missing)
            const itemQ = await github.graphql(`
              query($id:ID!){ node(id:$id){
                ... on Issue { projectItems(first:50){ nodes { id project { id } } } }
                ... on PullRequest { projectItems(first:50){ nodes { id project { id } } } }
              } }`, { id: contentNodeId })
            let item = (itemQ.node.projectItems?.nodes || []).find(i => i.project.id === project.id)
            if (!item) {
              const added = await github.graphql(`
                mutation($project:ID!,$content:ID!){
                  addProjectV2ItemById(input:{projectId:$project,contentId:$content}){ item { id } }
                }`, { project: project.id, content: contentNodeId })
              item = { id: added.addProjectV2ItemById.item.id }
            }

            // 3) Set Status
            await github.graphql(`
              mutation($project:ID!,$item:ID!,$field:ID!,$opt:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$project, itemId:$item, fieldId:$field,
                  value:{ singleSelectOptionId:$opt }
                }){ projectV2Item { id } }
              }`, { project: project.id, item: item.id, field: project.field.id, opt: option.id })

            core.info(`Set "${projectName}" status -> ${target} for ${contentNodeId}`)
