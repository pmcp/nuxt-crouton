name: Wave scheduler

# Auto-advances a decomposed waterfall (#283). When a workstream completes — its PR
# merges (`Closes #NN`), or its issue closes — release any dependent workstream whose
# blockers are now ALL closed by applying the `delegate` label, which dispatches its
# worker via decompose-on-issue.yml. This is the "baton pass" that removes the manual
# per-wave label so the chain self-advances.
#
# Dependency edges are machine-readable: each dependent issue body carries a
#   Blocked-by: #454            (or:  Blocked-by: #275, #276)
# line. Fan-in matters — a dependent is only released when EVERY listed blocker is
# closed (diamonds, not just lines).
#
# AUTH (#519 WS5): the label is applied with a Nuxt Harness GitHub App installation token, so
# the resulting decompose run is attributed to `nuxt-harness[bot]` and passes claude-code-action's
# bot-actor guard via its `allowed_bots` allow-list (see decompose-on-issue.yml). Retires the human
# PAT. Needs Actions secrets HARNESS_APP_ID + HARNESS_APP_PRIVATE_KEY, and the App granted Issues: write.

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: read

jobs:
  release:
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    steps:
      # Mint a Nuxt Harness App installation token so the released `delegate` label is applied by
      # `nuxt-harness[bot]` → the dispatched decompose run passes the bot-actor guard via
      # `allowed_bots` (decompose-on-issue.yml). Retires the human PAT here. (#535 / #519 WS5)
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
      - uses: actions/github-script@v7
        with:
          # All calls use the App token so the addLabels event is actored as nuxt-harness[bot].
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo

            // 1) What just completed?
            // On a merged PR: sub-PRs merge into the EPIC branch, so GitHub does NOT
            // auto-close their `Closes #NN` issues (auto-close is default-branch only).
            // Close them here — that resulting `issues: closed` event then drives the
            // release path below. (Keeps one release codepath.)
            if (context.eventName === 'pull_request') {
              if (!context.payload.pull_request.merged) { core.info('PR closed unmerged — nothing to do.'); return }

              // #1021 defence-in-depth: only act on merges into the default branch or an
              // epic/* branch — the two shapes this codepath exists for. Anything else
              // (throwaway branches, stacked feature branches) must not close issues.
              const base = context.payload.pull_request.base.ref
              const defaultBranch = context.payload.repository.default_branch
              if (base !== defaultBranch && !/^epic\//.test(base)) {
                core.info(`PR merged into '${base}' (not ${defaultBranch}/epic/*) — not a close-driving merge.`); return
              }

              // #1021 root fix: match `Closes #NN` the way GitHub's native auto-close does —
              // NEVER inside code. Strip fenced blocks and inline code spans first, so an
              // illustrative "`Closes #839`" in a How-to-test line can't mis-close a live
              // issue (the #839 incident: PR #1020's quoted example closed a real issue).
              const raw = context.payload.pull_request.body || ''
              const prose = raw.replace(/```[\s\S]*?```/g, '').replace(/`[^`\n]*`/g, '')
              const closes = [...prose.matchAll(/\bCloses\s+#(\d+)/gi)].map(x => Number(x[1]))
              if (!closes.length) { core.info('Merged PR has no `Closes #NN` (in prose) — nothing to do.'); return }
              for (const n of closes) {
                try {
                  const gi = await github.rest.issues.get({ owner, repo, issue_number: n })
                  if (gi.data.state === 'closed') continue
                  // #1035 incident: never auto-close a HELD issue. `status:blocked` means a
                  // sign-off or human step is pending — closing it destroys the hold ("done
                  // is signed off, not asserted"). The human closes it when the hold clears.
                  const held = gi.data.labels.some(l => (typeof l === 'string' ? l : l.name) === 'status:blocked')
                  if (held) {
                    core.info(`#${n} is status:blocked (held for a human) — NOT auto-closing.`); continue
                  }
                  await github.rest.issues.update({ owner, repo, issue_number: n, state: 'closed', state_reason: 'completed' })
                  core.info(`Closed #${n} (its PR merged into ${base}) — release runs on the issues:closed event.`)
                } catch (e) { core.warning(`Could not close #${n}: ${e.message}`) }
              }
              return
            }

            // issues: closed → release dependents
            const done = context.payload.issue.number
            if (!done) return
            core.info(`Completed workstream: #${done}`)

            // 2) Candidate dependents: open issues with a Blocked-by line.
            const q = `repo:${owner}/${repo} is:issue is:open in:body "Blocked-by:"`
            const found = await github.paginate(github.rest.search.issuesAndPullRequests, { q, per_page: 100 })
            const reLine = /Blocked-by:\s*([#\d,\s]+)/i

            for (const it of found) {
              const mm = (it.body || '').match(reLine)
              if (!mm) continue
              const blockers = [...new Set((mm[1].match(/\d+/g) || []).map(Number))]
              if (!blockers.includes(done)) continue

              // Idempotency: already dispatched / in-flight?
              const names = it.labels.map(l => (typeof l === 'string' ? l : l.name))
              if (names.includes('delegate') || names.includes('status:in-progress')) {
                core.info(`#${it.number} already dispatched — skip.`); continue
              }

              // 3) Fan-in: ALL blockers closed?
              let allClosed = true
              for (const b of blockers) {
                const bi = await github.rest.issues.get({ owner, repo, issue_number: b })
                if (bi.data.state !== 'closed') { allClosed = false; break }
              }
              if (!allClosed) { core.info(`#${it.number} still has open blockers — wait.`); continue }

              // 4) Release: apply `delegate` (as the PAT user → human-actor trigger).
              await github.rest.issues.addLabels({ owner, repo, issue_number: it.number, labels: ['delegate'] })
              await github.rest.issues.createComment({ owner, repo, issue_number: it.number,
                body: `▶️ All blockers closed (#${done} just completed) — auto-dispatching this workstream `
                  + `(applied \`delegate\`). Wave scheduler (#283).` })
              core.info(`Released #${it.number}`)
            }
