name: Comment dispatch

# Hand an issue to the agent pipeline by COMMENTING — mobile-friendly, no label UI.
# Comment `/delegate` (or `/deploy`) on an issue and this applies the `delegate` label,
# which fires decompose-on-issue.yml. Only the repo owner / members / collaborators can
# trigger it.
#
# AUTH (#519 WS5): the label is applied with a Nuxt Harness GitHub App installation token, so
# the dispatched decompose run is attributed to `nuxt-harness[bot]` and passes claude-code-action's
# bot-actor guard via its `allowed_bots` allow-list (see decompose-on-issue.yml). This retires the
# human PAT (PROJECTS_TOKEN) from the trigger path. Needs Actions secrets HARNESS_APP_ID +
# HARNESS_APP_PRIVATE_KEY, and the App granted Issues: write.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read

jobs:
  dispatch:
    # Owner/member/collaborator comment, on an issue (not a PR), containing the command.
    if: |
      !github.event.issue.pull_request &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR') &&
      (contains(github.event.comment.body, '/delegate') ||
       contains(github.event.comment.body, '/deploy'))
    # Runner toggle (#610/#655): set repo var AGENT_RUNNER=mac-mini to route the agent loop
    # to the self-hosted Mac mini; unset ⇒ GitHub-hosted. Enable the fork-PR approval gate
    # first (WS4 security, #656) — these jobs run our code on our own box.
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    steps:
      # Mint a Nuxt Harness App installation token so the `delegate` label is applied by
      # `nuxt-harness[bot]`. That makes the dispatched decompose run App-actored, which passes
      # claude-code-action's bot-actor guard via `allowed_bots` (decompose-on-issue.yml) — no
      # human PAT needed. An App installation token (unlike the built-in GITHUB_TOKEN) DOES
      # trigger the downstream `labeled` workflow. (#535 / #519 WS5)
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
      - uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo
            const issue_number = context.payload.issue.number
            const comment_id = context.payload.comment.id

            // Fire a FRESH `delegate` labeled event: decompose-on-issue only triggers on the
            // label being *added* (not merely present), so if it's already there, remove first.
            const cur = (context.payload.issue.labels || []).map(l => (typeof l === 'string' ? l : l.name))
            if (cur.includes('delegate')) {
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'delegate' }) } catch (e) {}
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['delegate'] })

            // Acknowledge so the commenter sees it registered (handy on mobile).
            try { await github.rest.reactions.createForIssueComment({ owner, repo, comment_id, content: 'rocket' }) } catch (e) {}
            await github.rest.issues.createComment({ owner, repo, issue_number,
              body: `▶️ Dispatched by comment — applied \`delegate\`, the agent pipeline is picking up #${issue_number}.` })
            core.info(`Dispatched #${issue_number} via comment.`)
