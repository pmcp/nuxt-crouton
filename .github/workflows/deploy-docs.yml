name: Deploy Docs

# Self-contained Workers deploy for the docs site (#99). docs is NOT a crouton/NuxtHub
# app — it's a plain @nuxt/content site — so it does NOT use the reusable deploy-app.yml
# (which assumes NuxtHub generates the deploy config). Instead, nitro generates the
# deploy config itself (nuxt.config nitro.cloudflare.deployConfig) and we `wrangler deploy`
# directly — the official @nuxt/content → Workers path.
#
# Single environment (public docs has no per-PR data to isolate). The custom domain
# (docs.pmcp.dev now → docs.friendlyinter.net at the DNS cutover, #134) is attached
# separately; this just deploys the worker.

on:
  push:
    branches:
      - staging
    paths:
      - 'docs/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy docs to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # @nuxt/content uses better-sqlite3 at BUILD time to process collections into the
      # local DB (the dump loaded into D1 at runtime); --ignore-scripts skips its native
      # build, so rebuild it before the build.
      - name: Rebuild better-sqlite3
        run: pnpm rebuild better-sqlite3

      # build (cloudflare_module → nitro generates .output/server/wrangler.json via
      # deployConfig) then deploy. Don't gate the build with PRs that only validate.
      - name: Build + deploy
        if: github.event_name != 'pull_request'
        run: pnpm cf:deploy
        working-directory: docs

      # On PRs, build only (no deploy) as a smoke test that the cloudflare_module build
      # + content→D1 dump succeed.
      - name: Build only (PR smoke test)
        if: github.event_name == 'pull_request'
        run: NITRO_PRESET=cloudflare_module npx nuxt build
        working-directory: docs