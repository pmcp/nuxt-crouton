name: Deploy Blog (POC preview)

# Thin caller of the reusable Workers deploy pipeline (deploy-app.yml, #114) for the
# blog POC (epic #265/#274). Pushing to `staging` (path-filtered to pocs/blog/**) — or a
# manual dispatch — deploys an isolated, auto-provisioned Cloudflare Workers *staging*
# env (its own id-less D1) and posts the preview URL on the run. Stable at
# https://blog.pmcp.dev so BETTER_AUTH_URL is predictable and auth works on the preview.
#
# Safe-to-fail — staging only, no production. Promote pocs/blog → apps/blog and use the
# /deploy skill for a prod deploy. Requires the CLOUDFLARE_ACCOUNT_ID + CLOUDFLARE_API_TOKEN
# repo secrets (account Workers/D1 edit + zone Workers-Routes/DNS edit for blog.pmcp.dev).

on:
  push:
    branches:
      - staging
    paths:
      - 'pocs/blog/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-blog.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

jobs:
  deploy:
    # The reusable workflow's PR/preview-comment step needs pull-requests: write; a caller
    # must grant it explicitly under restrictive default token permissions.
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-app.yml
    with:
      app: blog
      workspace: pocs
      environment: staging
      staging-url: https://blog.pmcp.dev
      # Dist-consumed framework packages with a build script (pure source layers are
      # skipped automatically by the reusable workflow).
      layer-packages: '@fyit/crouton-core @fyit/crouton-auth @fyit/crouton-i18n @fyit/crouton'
    secrets: inherit
