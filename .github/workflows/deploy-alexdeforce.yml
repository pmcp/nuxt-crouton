name: Deploy Alexdeforce

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache layer builds
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/crouton-core/dist
            packages/crouton/dist
          key: layer-builds-${{ hashFiles('packages/crouton-core/**/*.ts', 'packages/crouton/**/*.ts') }}

      - name: Build layer packages
        if: steps.layer-cache.outputs.cache-hit != 'true'
        run: |
          pnpm --filter '@fyit/crouton-core' build
          pnpm --filter '@fyit/crouton' build

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/alexdeforce/node_modules/.cache
            apps/alexdeforce/.nuxt/cache
          key: nuxt-build-alexdeforce-${{ hashFiles('apps/alexdeforce/**', 'packages/**/*.ts') }}
          restore-keys: |
            nuxt-build-alexdeforce-

      - name: Run database migrations
        run: npx wrangler d1 migrations apply DB --remote
        working-directory: apps/alexdeforce

      - name: Prepare Nuxt (generate tsconfig)
        run: npx nuxt prepare
        working-directory: apps/alexdeforce

      - name: Build
        run: npx nuxt build
        working-directory: apps/alexdeforce
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          NITRO_PRESET: 'cloudflare-pages'
          BETTER_AUTH_URL: 'https://alexdeforce.friendlyinter.net'
          BETTER_AUTH_SECRET: prerender-placeholder
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/ --commit-dirty=true
        working-directory: apps/alexdeforce
