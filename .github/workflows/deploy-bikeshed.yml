name: Deploy Bikeshed

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: nuxt build
        working-directory: apps/bikeshed
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Deploy to Cloudflare Pages
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            npx wrangler --cwd dist pages deploy --commit-dirty=true
          else
            npx wrangler --cwd dist pages deploy --commit-dirty=true --branch staging
          fi
        working-directory: apps/bikeshed
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run migrations (production only)
        if: inputs.environment == 'production'
        run: npx wrangler d1 migrations apply bikeshed-db --remote
        working-directory: apps/bikeshed
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
