name: Deploy Three Demo

# Reference CALLER for the reusable Workers deploy pipeline (#114).
# Push to `staging` (or a PR) → isolated, auto-provisioned preview env.
# Manual dispatch with environment=production → production deploy.
# All the work lives in .github/workflows/deploy-app.yml + the app's cf:* scripts.

on:
  push:
    branches:
      - staging
    paths:
      - 'apps/three-demo/**'
      - 'packages/crouton/**'
      - 'packages/crouton-core/**'
      - 'packages/crouton-auth/**'
      - 'packages/crouton-i18n/**'
      - 'packages/crouton-three/**'
      - 'packages/crouton-pages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-three-demo.yml'
      - '.github/workflows/deploy-app.yml'
  pull_request:
    paths:
      - 'apps/three-demo/**'
      - '.github/workflows/deploy-three-demo.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    uses: ./.github/workflows/deploy-app.yml
    with:
      app: three-demo
      # Only a manual production dispatch hits prod; pushes & PRs deploy preview.
      environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') && 'production' || 'preview' }}
      production-url: https://three-demo.cloudflare-e53.workers.dev
      preview-url: https://three-demo-preview.cloudflare-e53.workers.dev
    secrets: inherit
