name: Deploy Velo

# Thin caller for the reusable Workers deploy pipeline (#120, on #114's deploy-app.yml).
# Push to `staging` (or a PR) → isolated staging env on velo.pmcp.dev (reuses
# velo-staging-db + velo-staging-blob). Manual dispatch with environment=production
# → production (reuses velo-db + velo-blob). The prod custom domain
# (velo.friendlyinter.net) is bound at the DNS cutover (#134).

on:
  push:
    branches:
      - staging
    paths:
      - 'apps/velo/**'
      - 'packages/crouton/**'
      - 'packages/crouton-core/**'
      - 'packages/crouton-auth/**'
      - 'packages/crouton-i18n/**'
      - 'packages/crouton-assets/**'
      - 'packages/crouton-bookings/**'
      - 'packages/crouton-email/**'
      - 'packages/crouton-pages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-velo.yml'
      - '.github/workflows/deploy-app.yml'
  pull_request:
    paths:
      - 'apps/velo/**'
      - '.github/workflows/deploy-velo.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    # The reusable workflow's PR-comment step needs pull-requests: write; a caller
    # must grant it explicitly or the call fails to validate under restrictive
    # default token permissions ("only allowed pull-requests: none").
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-app.yml
    with:
      app: velo
      environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') && 'production' || 'staging' }}
      production-url: https://velo.friendlyinter.net
      staging-url: https://velo.pmcp.dev
      # Dist-consumed framework packages with a build script (pure source layers are
      # skipped automatically by the reusable workflow).
      layer-packages: '@fyit/crouton-core @fyit/crouton-auth @fyit/crouton-i18n @fyit/crouton-assets @fyit/crouton-bookings @fyit/crouton-email @fyit/crouton-pages @fyit/crouton'
    secrets: inherit
