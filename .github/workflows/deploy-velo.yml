name: Deploy Velo

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build layer packages
        run: |
          pnpm --filter '@fyit/crouton-auth' build
          pnpm --filter '@fyit/crouton-core' build
          pnpm --filter '@fyit/crouton' build

      - name: Run database migrations
        run: |
          if [ "${{ inputs.environment || 'staging' }}" = "production" ]; then
            npx wrangler d1 migrations apply DB --remote
          else
            npx wrangler d1 migrations apply DB --env preview --remote
          fi
        working-directory: apps/velo

      - name: Build
        run: npx nuxt build
        working-directory: apps/velo
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          NITRO_PRESET: 'cloudflare-pages'
          CLOUDFLARE_ENV: ${{ (inputs.environment || 'staging') == 'staging' && 'preview' || '' }}

      # Workaround: Wrangler 4.64+ rejects env blocks in redirected configs.
      # Nitro copies the full wrangler.jsonc (including env) into the generated
      # _worker.js/wrangler.json. Strip it so deploy succeeds.
      - name: Strip env from redirected wrangler config
        run: |
          CONFIG="dist/_worker.js/wrangler.json"
          if [ -f "$CONFIG" ] && grep -q '"env"' "$CONFIG"; then
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('$CONFIG', 'utf8'));
              delete cfg.env;
              fs.writeFileSync('$CONFIG', JSON.stringify(cfg, null, 2));
            "
          fi
        working-directory: apps/velo

      - name: Deploy to Cloudflare Pages
        run: |
          if [ "${{ inputs.environment || 'staging' }}" = "production" ]; then
            npx wrangler pages deploy dist/ --commit-dirty=true
          else
            npx wrangler pages deploy dist/ --commit-dirty=true --branch staging
          fi
        working-directory: apps/velo
