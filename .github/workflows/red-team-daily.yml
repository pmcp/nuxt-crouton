name: Red-Team (daily deep sweep)

# Scheduled whole-repo adversarial sweep (epic #540). Runs the red-team probe at
# depth=deep — static across every app/package, with best-effort dynamic confirmation
# of high/critical candidates against a fixture — then DMs the report privately by email.
#
# PUBLIC REPO ⇒ PRIVATE DISCLOSURE: this repo is public, so findings are NOT posted to
# public issues or a public standing issue (that would disclose unfixed vulns). The report
# stays in the runner (gitignored) and is emailed to the maintainer via Resend.
#
# Required repo config:
#   secrets.RESEND_API_KEY        — Resend API key (https://resend.com)
#   secrets.ANTHROPIC_API_KEY     — already present (shared with the other claude workflows)
#   vars.RED_TEAM_EMAIL_FROM      — verified Resend sender, e.g. "red-team@your-domain"
#   vars.RED_TEAM_REPORT_EMAIL    — recipient (your inbox)
# If RESEND_API_KEY / the vars are unset the email step warns and skips (the job stays green).

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC daily, before the working day
  workflow_dispatch:        # manual run

concurrency:
  group: red-team-daily
  cancel-in-progress: false

jobs:
  red-team-daily:
    # Runner toggle (#610/#655): set repo var AGENT_RUNNER=mac-mini to route the agent loop
    # to the self-hosted Mac mini; unset ⇒ GitHub-hosted. Enable the fork-PR approval gate
    # first (WS4 security, #656) — these jobs run our code on our own box.
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    # Job-level permissions (see red-team.yml for why id-token MUST be here). No issues/PR
    # write — this workflow does NOT post to GitHub; disclosure is by private email only.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The deep pass may boot a fixture for dynamic confirmation — give it node + pnpm + deps.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile

      # Pinned to the same SHA as the repo's other claude-code-action workflows — bump together.
      - uses: anthropics/claude-code-action@c26cb6427d54362f5fd9834ac6818cbaaf82490a
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: "--max-turns 60"
          prompt: |
            Run the **`/red-team`** skill (`.claude/skills/red-team/SKILL.md`) at
            **depth=deep, scope=repo**. Fan out the `red-team` subagent across the
            apps/security-relevant packages, collate ONE whole-repo report to
            `writeups/reports/red-team-repo-$(date -u +%Y%m%d).md` following
            `writeups/reports/red-team-TEMPLATE.md`, and attempt dynamic confirmation of
            high/critical candidates against a `fixtures/` app (reuse the `e2e-smoke`
            harness — boot it, authenticate, send the malicious request). Only probe this
            repo's own local fixtures — never any external or production host.

            PRIVATE DISCLOSURE — this is a PUBLIC repo. Do **NOT** post anything to GitHub:
            no public issue, no standing-issue comment, no PR comment. Do **NOT** file
            `security`/`sec:*` issues. Your single deliverable is the written report file at
            `writeups/reports/red-team-repo-<YYYYMMDD>.md` — a later workflow step emails it
            to the maintainer privately. Always write the report, even on a clean sweep.

            Do NOT edit any `apps/`/`packages/` product code.

      - name: Email the report (Resend)
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.RED_TEAM_EMAIL_FROM }}
          EMAIL_TO: ${{ vars.RED_TEAM_REPORT_EMAIL }}
        run: |
          REPORT=$(ls -t writeups/reports/red-team-repo-*.md 2>/dev/null | head -1 || true)
          if [ -z "$REPORT" ]; then
            echo "::warning::No red-team report file was produced — nothing to email."
            exit 0
          fi
          if [ -z "$RESEND_API_KEY" ] || [ -z "$EMAIL_FROM" ] || [ -z "$EMAIL_TO" ]; then
            echo "::warning::RESEND_API_KEY / RED_TEAM_EMAIL_FROM / RED_TEAM_REPORT_EMAIL not set — skipping email. Report at $REPORT (in this run's workspace only)."
            exit 0
          fi
          SUBJECT="🔴 Red-team daily report — $(date -u +%F)"
          echo "Emailing $REPORT → $EMAIL_TO"
          # Build the JSON payload with jq so the markdown body is safely escaped.
          jq -n \
            --arg from "$EMAIL_FROM" \
            --arg to "$EMAIL_TO" \
            --arg subject "$SUBJECT" \
            --rawfile body "$REPORT" \
            '{from:$from, to:[$to], subject:$subject, text:$body, html:("<pre style=\"font-family:ui-monospace,monospace;white-space:pre-wrap\">"+($body|@html)+"</pre>")}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d @- -w '\nHTTP %{http_code}\n'
