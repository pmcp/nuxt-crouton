name: Decompose on issue

# Hand an issue to the Claude agent pipeline when it's opted in via the
# `delegate` label (added at creation or any time after). The pipeline spawns
# the orchestrator → decomposer → worker agents (see .claude/skills/task-decompose).
on:
  issues:
    types: [opened, labeled]

jobs:
  decompose:
    # Fire ONLY when `delegate` is freshly applied (or present at creation) — NOT on every
    # later label change while `delegate` happens to still be on the issue. Otherwise the
    # worker adding `status:in-progress` re-fires this workflow as claude[bot], which then
    # dies on the bot-actor guard (the mystery duplicate failures). Gate on the *added* label.
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'delegate') ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'delegate'))
    # Runner toggle (#610/#655): set repo var AGENT_RUNNER=mac-mini to route the agent loop
    # to the self-hosted Mac mini; unset ⇒ GitHub-hosted. Enable the fork-PR approval gate
    # first (WS4 security, #656) — these jobs run our code on our own box.
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    # NOTE: permissions MUST live at the job level. GitHub job-level `permissions` fully
    # OVERRIDES (does not merge with) any workflow-level block, so `id-token: write` has to
    # be here or the claude-code-action OIDC token request fails
    # ("Could not fetch an OIDC token"). A workflow-level block would be silently shadowed.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Timestamp the run start so the artifact-gate can tell "produced during this run"
      # from pre-existing comments/PRs.
      - id: t0
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Pinned to the same SHA as claude.yml — keep these in sync when bumping.
      # AUTH: this is headless/unattended, so it MUST use an API key. Do NOT swap in a
      # subscription CLAUDE_CODE_OAUTH_TOKEN — subscription OAuth is for interactive
      # Claude Code use only, not CI automation (Anthropic Legal & Compliance terms).
      - uses: anthropics/claude-code-action@c26cb6427d54362f5fd9834ac6818cbaaf82490a
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/task-decompose #${{ github.event.issue.number }}"
          claude_args: "--max-turns 30"
          show_full_output: true
          # WS5 (#535): the `delegate` label is now applied by the Nuxt Harness App, so this run is
          # actored as nuxt-harness[bot]. Allow exactly that bot past the bot-actor guard — nothing
          # else. (The pinned SHA already supports allowed_bots.)
          allowed_bots: "nuxt-harness[bot]"

      # ── Artifact-gate (#461) ──────────────────────────────────────────────────
      # A run is only allowed to be GREEN if the agent produced an OBSERVABLE
      # deliverable on the issue during this run: a comment (sign-off / breadcrumb /
      # orchestration note) OR a linked PR (`Closes #NN`). A worker that narrates
      # "I'm now creating X / posting Y…" and then stops — exiting `success` with
      # nothing to show (the #454 no-op: 8/30 turns, $0.74, zero output) — must go
      # RED, not masquerade as done. Deterministic, no LLM. Uses GITHUB_TOKEN (not
      # the claude OIDC), so it never trips the bot-actor guard.
      - name: Artifact-gate — fail if the agent produced nothing
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number
            const since = '${{ steps.t0.outputs.ts }}'
            const sinceMs = new Date(since).getTime()

            // (a) any comment posted on this issue during the run
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo, issue_number, since,
            })
            const newComment = comments.length > 0

            // (b) any PR that cross-references this issue, created during the run
            const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
              ...context.repo, issue_number,
            })
            const prRefs = timeline.filter(e =>
              e.event === 'cross-referenced' &&
              e.source && e.source.issue && e.source.issue.pull_request
            )
            const linkedPR = prRefs.some(e => new Date(e.created_at).getTime() >= sinceMs) // a PR opened THIS run
            const alreadyLinkedPR = prRefs.length > 0 // issue ALREADY has a linked PR (a prior run finished it)

            // (c) is the issue now HELD as a sign-off gate? (worker posted a review + status:blocked)
            const issue = await github.rest.issues.get({ ...context.repo, issue_number })
            const blocked = issue.data.labels.some(l => (typeof l === 'string' ? l : l.name) === 'status:blocked')
            const alreadyClosed = issue.data.state === 'closed' // already done

            // (d) did THIS run create sub-issues? An orchestrator/epic run's deliverable is a
            // tree of newly-created sub-issues, NOT a PR — so creating them this run is a real
            // artifact (#572: the #566 epic decompose was falsely failed for "no PR"). Scope to
            // `created_at >= since` so a re-run that creates nothing still fails honestly.
            // This is also what decouples a slow first leaf (#612): the orchestrator persists the
            // whole tree (sub-issues + pushed epic branch) BEFORE spawning the first leaf, so even
            // if a heavy leaf (e.g. `crouton init`) later exhausts the job budget, the orchestration
            // output survives here as a GREEN deliverable and an idempotent re-dispatch (#611)
            // continues from it.
            let createdSubIssues = false
            try {
              const subs = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                ...context.repo, issue_number, per_page: 100,
              })
              createdSubIssues = subs.some(s => new Date(s.created_at).getTime() >= sinceMs)
            } catch (e) { core.warning(`sub-issue check skipped: ${e.message}`) }

            // KIND-AWARE pass: a build/deploy issue must yield a PR; a sign-off gate must post a
            // review AND hold (status:blocked + a comment); an orchestrator/epic run yields
            // sub-issues. A bare progress comment with no PR, no hold, and no sub-issues is the
            // no-op → FAIL. BUT a re-dispatch of an ALREADY-satisfied issue (it already has a
            // linked PR, or is closed) correctly reports "already done" — pass it, don't red-flag
            // (#500/WS4: the #457 re-dispatch false-failure).
            const signoffHeld = blocked && newComment
            if (linkedPR || signoffHeld || alreadyLinkedPR || alreadyClosed || createdSubIssues) {
              core.info(`Artifact-gate OK for #${issue_number}: linkedPR=${linkedPR} signoffHeld=${signoffHeld} alreadyLinkedPR=${alreadyLinkedPR} alreadyClosed=${alreadyClosed} createdSubIssues=${createdSubIssues}`)
              return
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.createComment({
              ...context.repo, issue_number,
              body: '⚠️ **Artifact-gate failed (#461).** @pmcp — this run produced no real deliverable on '
                + 'this issue: no PR was opened, and it is not held for sign-off (`status:blocked` + a review). '
                + 'A bare progress comment ("spawning the worker…") does not count — the '
                + '"narrate-the-plan-then-stop" no-op. The run is marked **failed** so it is not mistaken '
                + 'for done.\n\n'
                + `🔗 **Run log:** ${runUrl}\n`
                + '↻ Re-apply the `delegate` label to retry.',
            })
            core.setFailed(`Artifact-gate: run on #${issue_number} produced no deliverable (no PR, not held for sign-off).`)
