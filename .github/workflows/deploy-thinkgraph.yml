name: Deploy ThinkGraph

on:
  push:
    branches:
      - staging
    paths:
      - 'apps/thinkgraph/**'
      - 'packages/crouton/**'
      - 'packages/crouton-core/**'
      - 'packages/crouton-flow/**'
      - 'packages/crouton-ai/**'
      - 'packages/crouton-mcp-toolkit/**'
      - 'packages/crouton-collab/**'
      - 'workers/collab-worker/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-thinkgraph.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Cache layer builds
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/crouton-core/dist
            packages/crouton-flow/dist
            packages/crouton-ai/dist
            packages/crouton-mcp-toolkit/dist
            packages/crouton-collab/dist
            packages/crouton/dist
          key: layer-builds-thinkgraph-${{ hashFiles('packages/crouton-core/**/*.ts', 'packages/crouton-flow/**/*.ts', 'packages/crouton-ai/**/*.ts', 'packages/crouton-mcp-toolkit/**/*.ts', 'packages/crouton-collab/**/*.ts', 'packages/crouton/**/*.ts') }}

      - name: Build layer packages
        if: steps.layer-cache.outputs.cache-hit != 'true'
        run: |
          pnpm --filter '@fyit/crouton-core' build
          pnpm --filter '@fyit/crouton-flow' build
          pnpm --filter '@fyit/crouton-ai' build
          pnpm --filter '@fyit/crouton-mcp-toolkit' build
          pnpm --filter '@fyit/crouton-collab' build
          pnpm --filter '@fyit/crouton' build

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            apps/thinkgraph/node_modules/.cache
            apps/thinkgraph/.nuxt/cache
          key: nuxt-build-thinkgraph-${{ hashFiles('apps/thinkgraph/**', 'packages/**/*.ts') }}
          restore-keys: |
            nuxt-build-thinkgraph-

      - name: Run database migrations
        run: |
          if [ "${{ inputs.environment || 'staging' }}" = "production" ]; then
            npx wrangler d1 migrations apply DB --remote
          else
            npx wrangler d1 migrations apply DB --env preview --remote
          fi
        working-directory: apps/thinkgraph

      - name: Prepare Nuxt (generate tsconfig)
        run: npx nuxt prepare
        working-directory: apps/thinkgraph

      - name: Build
        run: npx nuxt build
        working-directory: apps/thinkgraph
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          NITRO_PRESET: 'cloudflare-pages'
          CLOUDFLARE_ENV: ${{ (inputs.environment || 'staging') == 'staging' && 'preview' || '' }}
          BETTER_AUTH_URL: ${{ (inputs.environment || 'staging') == 'production' && 'https://thinkgraph.pages.dev' || 'https://staging.thinkgraph.pages.dev' }}
          BETTER_AUTH_SECRET: prerender-placeholder

      - name: Strip env from redirected wrangler config
        run: |
          CONFIG="dist/_worker.js/wrangler.json"
          if [ -f "$CONFIG" ] && grep -q '"env"' "$CONFIG"; then
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('$CONFIG', 'utf8'));
              delete cfg.env;
              fs.writeFileSync('$CONFIG', JSON.stringify(cfg, null, 2));
            "
          fi
        working-directory: apps/thinkgraph

      - name: Deploy Collab Worker (Durable Objects)
        run: npx wrangler deploy
        working-directory: workers/collab-worker

      - name: Run collab D1 migration
        run: |
          npx wrangler d1 execute thinkgraph-db --remote \
            --file=../../packages/crouton-collab/server/database/migrations/0001_yjs_collab_states.sql
        working-directory: workers/collab-worker

      - name: Deploy to Cloudflare Pages
        run: |
          if [ "${{ inputs.environment || 'staging' }}" = "production" ]; then
            npx wrangler pages deploy dist/ --commit-dirty=true
          else
            npx wrangler pages deploy dist/ --commit-dirty=true --branch staging
          fi
        working-directory: apps/thinkgraph
