name: Deploy Triage

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build layer packages
        run: |
          pnpm --filter '@fyit/crouton-auth' build
          pnpm --filter '@fyit/crouton-core' build
          pnpm --filter '@fyit/crouton-ai' build
          pnpm --filter '@fyit/crouton' build

      - name: Run database migrations
        run: npx wrangler d1 migrations apply triage-db --remote
        working-directory: apps/triage

      - name: Build
        run: npx nuxt build
        working-directory: apps/triage
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          NITRO_PRESET: 'cloudflare-pages'

      - name: Deploy to Cloudflare Pages
        run: npx wrangler --cwd dist pages deploy --commit-dirty=true
        working-directory: apps/triage