name: Cleanup merged branches

# Lossless periodic branch janitor (#644, epic #633) — the ONLY auto-destructive housekeeping
# action, deliberately split from the report-only digest (#635) by blast radius. It deletes a
# branch ONLY if it is provably contained in `main` (`git branch -r --merged origin/main`), so
# every commit already lives in `main` and nothing is lost. Unmerged branches are never touched
# here — those are a human-eye item in the weekly digest.
#
# REPORT-ONLY until enabled: runs dry-run unless APPLY is on (repo var
# CLEANUP_BRANCHES_APPLY=true, or a manual dispatch with apply=true). Confirm the dry-run output
# looks right, THEN flip the var. Complements cleanup-epic-branches.yml (which deletes epic/*
# on PR merge) by sweeping anything that slipped past an event trigger.

on:
  schedule:
    - cron: '30 6 * * 1'   # weekly, Monday ~07:30 CET
  workflow_dispatch:
    inputs:
      apply:
        description: 'Actually delete (false = dry-run report only)'
        type: boolean
        default: false

permissions:
  contents: write   # delete refs

concurrency:
  group: cleanup-merged-branches
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git branch --merged main` is accurate

      - name: Fetch all remote branches
        run: git fetch --no-tags origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prune merged branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
          # APPLY: manual dispatch input wins; otherwise the repo var gates it (default dry-run).
          APPLY: ${{ (github.event_name == 'workflow_dispatch' && inputs.apply) && 'true' || (vars.CLEANUP_BRANCHES_APPLY == 'true' && 'true' || 'false') }}
        run: node .claude/skills/housekeeping/prune-merged-branches.mjs
