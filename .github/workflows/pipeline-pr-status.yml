name: Pipeline PR status

# Always-on status for the agent pipeline (#337, epic #336). Deterministic, NO LLM:
# keep exactly ONE "sticky" status comment on each pipeline PR (head branch
# `claude/issue-*`), edited in place across runs — never a new comment per run — plus a
# single roll-up line on the parent epic so the whole tree's health reads at a glance.
#
# The sticky is found by a hidden HTML marker and updated; the epic roll-up by its own
# marker on the epic issue. Both are idempotent, so the high-frequency `check_suite`
# firing just refreshes the same two comments (no spam).
#
# Scope: only PRs whose HEAD branch is `claude/issue-*` (pipeline-authored) — human PRs
# are never touched. Uses GITHUB_TOKEN (it only writes comments; nothing here needs to
# cascade to another workflow, so no App token is required).

on:
  check_suite:
    types: [completed]
  status: {}
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

# Key by head SHA so concurrent check_suite completions for the SAME commit collapse to
# one refresh (each run recomputes full state, so the latest wins); distinct PRs (distinct
# SHAs) never cancel each other.
concurrency:
  group: pipeline-status-${{ github.event.check_suite.head_sha || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const PR_STICKY = '<!-- crouton-pipeline-status -->'
            const EPIC_ROLLUP = '<!-- crouton-epic-rollup -->'
            const HEADER = '> 🤖 **Claude Code** · agent pipeline (CI)'
            const now = new Date().toISOString().replace('T', ' ').slice(0, 16) + 'Z'

            // Upsert a marker-tagged comment: edit the existing one in place, else create.
            async function upsert(issue_number, marker, body) {
              const comments = await github.paginate(github.rest.issues.listComments,
                { owner, repo, issue_number, per_page: 100 })
              const existing = comments.find(c => (c.body || '').includes(marker))
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body })
              }
            }

            // Aggregate every check-run + commit-status for a SHA into one verdict.
            async function ciState(ref) {
              let success = 0, pending = 0, failure = 0
              const runs = await github.paginate(github.rest.checks.listForRef,
                { owner, repo, ref, per_page: 100 })
              for (const r of runs) {
                if (r.status !== 'completed') { pending++; continue }
                if (['success', 'neutral', 'skipped'].includes(r.conclusion)) success++
                else failure++ // failure, cancelled, timed_out, action_required, stale
              }
              try {
                const combined = (await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref })).data
                for (const s of combined.statuses || []) {
                  if (s.state === 'pending') pending++
                  else if (s.state === 'success') success++
                  else failure++ // error, failure
                }
              } catch (e) { core.warning(`combined status for ${ref}: ${e.message}`) }
              const total = success + pending + failure
              let icon = '⏳', word = 'pending'
              if (total === 0) { icon = '⏳'; word = 'queued' }
              else if (failure > 0) { icon = '❌'; word = 'failing' }
              else if (pending > 0) { icon = '⏳'; word = 'running' }
              else { icon = '✅'; word = 'passing' }
              return { icon, word, success, pending, failure, total }
            }

            // One sticky status note on the pipeline PR.
            async function updatePr(pr) {
              const st = await ciState(pr.head.sha)
              const labels = (pr.labels || []).map(l => (typeof l === 'string' ? l : l.name))
              const fix = labels.map(l => /^ci-fix-attempts:(\d+)$/.exec(l)).find(Boolean) // forward-compat with #338
              const parts = [`${st.success}/${st.total} checks passed`]
              if (st.pending) parts.push(`${st.pending} running`)
              if (st.failure) parts.push(`${st.failure} failing`)
              const body =
                `${PR_STICKY}\n${HEADER} · _pipeline status (#337)_\n\n` +
                `### ${st.icon} CI ${st.word}\n` +
                `${parts.join(' · ')}.\n\n` +
                (fix ? `🔧 Auto-fix attempts: **${fix[1]}**\n\n` : '') +
                `Branch \`${pr.head.ref}\` → \`${pr.base.ref}\` · ` +
                `[checks](${pr.html_url}/checks) · _updated ${now}_`
              await upsert(pr.number, PR_STICKY, body)
              const epicMatch = /^epic\/(\d+)-/.exec(pr.base.ref)
              if (epicMatch) await updateEpic(Number(epicMatch[1]))
            }

            // One roll-up line on the parent epic, computed from sub-issue state + labels
            // (cheap, deterministic). Per-PR red/green lives on each PR's own sticky note.
            async function updateEpic(epicNumber) {
              let subs
              try {
                subs = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  { owner, repo, issue_number: epicNumber, per_page: 100 })
              } catch (e) { core.warning(`sub-issues for #${epicNumber}: ${e.message}`); return }
              if (!subs.length) return
              const names = s => (s.labels || []).map(l => (typeof l === 'string' ? l : l.name))
              const total = subs.length
              const done = subs.filter(s => s.state === 'closed').length
              const open = subs.filter(s => s.state === 'open')
              const blocked = open.filter(s => names(s).includes('status:blocked')).length
              const inProgress = open.filter(s => names(s).includes('status:in-progress')).length
              const queued = open.length - blocked - inProgress
              const body =
                `${EPIC_ROLLUP}\n${HEADER} · _epic roll-up (#337)_\n\n` +
                `**📊 ${done}/${total} done** · ▶️ ${inProgress} in progress · ` +
                `⏸️ ${blocked} blocked · 🗒️ ${queued} queued. _Updated ${now}._`
              await upsert(epicNumber, EPIC_ROLLUP, body)
            }

            // Resolve candidate PR numbers from whatever event fired.
            const prNumbers = new Set()
            if (context.eventName === 'pull_request') {
              prNumbers.add(context.payload.pull_request.number)
            } else {
              const sha = context.payload.check_suite?.head_sha || context.payload.sha
              if (sha) {
                const assoc = await github.paginate(
                  github.rest.repos.listPullRequestsAssociatedWithCommit,
                  { owner, repo, commit_sha: sha, per_page: 100 })
                assoc.forEach(p => prNumbers.add(p.number))
              }
            }
            if (!prNumbers.size) { core.info('No associated PRs — nothing to do.'); return }

            for (const pull_number of prNumbers) {
              let pr
              try { pr = (await github.rest.pulls.get({ owner, repo, pull_number })).data } catch { continue }
              if (pr.state !== 'open') continue
              if (!pr.head.ref.startsWith('claude/issue-')) {
                core.info(`#${pull_number} head ${pr.head.ref} is not a pipeline branch — skipping.`); continue
              }
              await updatePr(pr)
              core.info(`Updated sticky status for #${pull_number}.`)
            }
