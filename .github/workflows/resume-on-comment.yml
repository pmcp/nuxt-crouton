name: Resume blocked decomposition

# When an agent in the task-decomposition pipeline gets stuck it comments a question,
# @mentions the owner, labels the issue `status:blocked`, and stops. This workflow lets
# the owner resume simply by REPLYING on that issue — no slash command, no @claude needed.
on:
  issue_comment:
    types: [created]

# NOTE: permissions MUST live at the job level. GitHub job-level `permissions` fully
# OVERRIDES (does not merge with) any workflow-level block, so `id-token: write` has to
# be here or the claude-code-action OIDC token request fails
# ("Could not fetch an OIDC token"). A workflow-level block would be silently shadowed.
jobs:
  resume:
    # Resume only when: the issue carries `status:blocked`, the comment is a human's
    # (not a bot — avoids the agent answering itself / loops), and it's an issue not a PR.
    if: |
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.issue.labels.*.name, 'status:blocked')
    # Runner toggle (#610/#655): set repo var AGENT_RUNNER=mac-mini to route the agent loop
    # to the self-hosted Mac mini; unset ⇒ GitHub-hosted. Enable the fork-PR approval gate
    # first (WS4 security, #656) — these jobs run our code on our own box.
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Timestamp run start so the artifact-gate (below) can tell "produced during THIS run".
      - id: t0
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # Pinned to the same SHA as claude.yml — keep these in sync when bumping.
      # AUTH: this is headless/unattended, so it MUST use an API key. Do NOT swap in a
      # subscription CLAUDE_CODE_OAUTH_TOKEN — subscription OAuth is for interactive
      # Claude Code use only, not CI automation (Anthropic Legal & Compliance terms).
      - uses: anthropics/claude-code-action@c26cb6427d54362f5fd9834ac6818cbaaf82490a
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Resume the task-decomposition pipeline for issue #${{ github.event.issue.number }}.
            The owner has replied to a blocking question — read the full issue comment
            thread (the latest comment is their answer), incorporate it, remove the
            `status:blocked` label, then continue via /task-decompose #${{ github.event.issue.number }}.
          claude_args: "--max-turns 30"
          show_full_output: true

      # Mint a Nuxt Harness App token for the merge step. CRUCIAL: the merge MUST use the
      # App token, NOT the default GITHUB_TOKEN — GitHub suppresses workflow triggers for
      # events initiated by GITHUB_TOKEN, so a GITHUB_TOKEN merge's `pull_request: closed`
      # event would NOT reach schedule-waves and the chain stalls (the #572 first-attempt
      # regression). An App installation token is a non-GITHUB_TOKEN actor, so its merge
      # fires schedule-waves → close issue → release next workstream. (#535/#519 WS5.)
      - uses: actions/create-github-app-token@v1
        id: app-token
        if: always()
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
          owner: FriendlyInternet

      # ── Merge-on-approval (#572) ───────────────────────────────────────────────
      # The pipeline's design is that a sign-off gate's sub-PR merges into the EPIC
      # branch once approved — the owner's `approve`/`lgtm` IS the review. Nothing
      # implemented that, so approved gates STALLED: the gate PR stayed a draft, its
      # issue never closed, and schedule-waves never released the next workstream.
      # This deterministically completes the handoff on an approval comment, regardless
      # of what the agent step above did. Merge commit — NOT squash (preserve curated
      # commits; merge policy). Merges with the App token so the resulting
      # `pull_request: closed` event TRIGGERS schedule-waves → close issue → release the
      # next workstream (a GITHUB_TOKEN merge does NOT cascade — #572).
      - name: Merge the gate PR on approval
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = context.payload.issue.number
            const body = context.payload.comment.body || ''
            // Approval only — a change-request reply must NOT merge anything.
            if (!/\b(approve|approved|lgtm)\b/i.test(body)) {
              core.info('Comment is not an approval — nothing to merge.'); return
            }
            // Find the PR(s) that close THIS issue, via the issue timeline cross-references.
            const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
              ...context.repo, issue_number,
            })
            const prNums = [...new Set(timeline
              .filter(e => e.event === 'cross-referenced' && e.source && e.source.issue && e.source.issue.pull_request)
              .map(e => e.source.issue.number))]
            let merged = false
            for (const n of prNums) {
              let pr
              try { pr = (await github.rest.pulls.get({ ...context.repo, pull_number: n })).data } catch { continue }
              if (pr.state !== 'open' || pr.merged) continue
              // Only the gate PR: it says "Closes #<issue>" and targets an epic branch.
              if (!new RegExp(`\\bcloses\\s+#${issue_number}\\b`, 'i').test(pr.body || '')) continue
              if (!/^epic\//.test(pr.base.ref)) {
                core.info(`PR #${n} base ${pr.base.ref} is not an epic branch — skipping.`); continue
              }
              // Mark ready (REST can't flip draft→ready; GraphQL can), then merge.
              if (pr.draft) {
                try {
                  await github.graphql(
                    `mutation($id:ID!){ markPullRequestReadyForReview(input:{pullRequestId:$id}){ pullRequest { id } } }`,
                    { id: pr.node_id })
                } catch (e) { core.warning(`markReady #${n}: ${e.message}`) }
              }
              try {
                await github.rest.pulls.merge({ ...context.repo, pull_number: n, merge_method: 'merge' })
                merged = true
                core.info(`Merged gate PR #${n} into ${pr.base.ref}.`)
              } catch (e) { core.warning(`merge #${n} failed: ${e.message}`) }
            }
            // Clear the block defensively so the issue can close cleanly.
            try { await github.rest.issues.removeLabel({ ...context.repo, issue_number, name: 'status:blocked' }) } catch (e) {}
            core.info(merged ? 'Gate PR merged — schedule-waves will advance the chain.' : 'No gate PR merged (none matched / already merged).')

      # ── Artifact-gate (#603 P0) ────────────────────────────────────────────────
      # A resume must PRODUCE something — otherwise a no-op silently exits green and the
      # run looks done while nothing advanced. That exact failure bit #590: a plan-gate
      # `approve` resumed, cleared `status:blocked`, but created ZERO sub-issues; the green
      # run hid it and it took a manual re-/delegate to notice. `decompose-on-issue` already
      # has this gate; the resume path didn't. Now a no-op resume goes RED (visible →
      # re-dispatch). Uses GITHUB_TOKEN (read-only check), never trips the bot-actor guard.
      - name: Artifact-gate — fail if the resume produced nothing
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number
            const since = '${{ steps.t0.outputs.ts }}'
            const sinceMs = new Date(since).getTime()

            // (a) sub-issues created this run (a plan/decompose gate proceeding)
            let createdSubIssues = false
            try {
              const subs = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                ...context.repo, issue_number, per_page: 100,
              })
              createdSubIssues = subs.some(s => new Date(s.created_at).getTime() >= sinceMs)
            } catch (e) { core.warning(`sub-issue check skipped: ${e.message}`) }

            // (b) a comment posted this run (an answer / progress / revision note)
            const comments = await github.paginate(github.rest.issues.listComments, { ...context.repo, issue_number, since })
            const newComment = comments.length > 0

            // (c) issue state now
            const issue = (await github.rest.issues.get({ ...context.repo, issue_number })).data
            const closed = issue.state === 'closed'
            const stillBlocked = issue.labels.some(l => (typeof l === 'string' ? l : l.name) === 'status:blocked')

            // (d) a gate PR merged this run (a sign-off gate approved + merged)
            let mergedPR = false
            try {
              const tl = await github.paginate(github.rest.issues.listEventsForTimeline, { ...context.repo, issue_number })
              const prNums = [...new Set(tl.filter(e => e.event === 'cross-referenced' && e.source && e.source.issue && e.source.issue.pull_request).map(e => e.source.issue.number))]
              for (const n of prNums) {
                const pr = (await github.rest.pulls.get({ ...context.repo, pull_number: n })).data
                if (pr.merged_at && new Date(pr.merged_at).getTime() >= sinceMs) { mergedPR = true; break }
              }
            } catch (e) { core.warning(`merged-PR check skipped: ${e.message}`) }

            // PASS if the resume did anything observable, OR it's still holding (legit "still
            // iterating" — not a no-op). FAIL only when the block was cleared yet nothing came
            // of it — the silent no-op.
            if (createdSubIssues || mergedPR || closed || newComment || stillBlocked) {
              core.info(`Resume artifact OK: subIssues=${createdSubIssues} mergedPR=${mergedPR} closed=${closed} newComment=${newComment} stillBlocked=${stillBlocked}`)
              return
            }
            await github.rest.issues.createComment({ ...context.repo, issue_number,
              body: '> 🤖 **Claude Code** · agent pipeline (CI) · _resume artifact-gate (#603)_\n\n'
                + '⚠️ The resume ran but produced **nothing** (no sub-issues, no merged gate PR, no new '
                + 'comment, not closed, and the block was cleared) — a silent no-op (the #590 failure mode). '
                + 'Re-dispatch with `/delegate` to retry.' })
            core.setFailed(`Resume on #${issue_number} produced no artifact — likely a no-op; re-dispatch.`)
