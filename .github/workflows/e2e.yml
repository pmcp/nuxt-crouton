name: E2E

# Boots each crouton fixture app and runs the Playwright smoke (login + CRUD).
# Catches regressions — e.g. a dependency bump that breaks a generated app —
# before merge. Matrix = one job per fixture (see fixtures/* + e2e/CLAUDE.md).
on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'fixtures/**'
      - 'e2e/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'fixtures/**'
      - 'e2e/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: E2E (${{ matrix.fixture }})
    runs-on: ubuntu-latest
    # Canary (#393): only `with-assets` runs inside the official, version-matched
    # Playwright image (Chromium + system libs baked in) to prove the container
    # approach kills the flaky `--with-deps` apt step before we roll it out to all
    # four fixtures (#394). An empty value (the other three) means "run on the
    # host", unchanged. The tag must track @playwright/test ^1.57 — see #395.
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        # with-collab is intentionally NOT here yet: the #197 gate type-checks each
        # fixture, and the crouton-collab package it extends has pre-existing type
        # errors (CollabCursors/useCollabPresence/avatar/ws.ts). Per #210 ("add to
        # CI once stable"), with-collab stays a local-only spike until the package
        # is type-clean. Its runtime smoke passes; only the typecheck gate blocks it.
        fixture: [minimal, with-pages, with-bookings, with-assets]
        include:
          - fixture: with-assets
            container: mcr.microsoft.com/playwright:v1.57.0-jammy
    env:
      # Better-auth needs a secret present; the value is irrelevant in CI.
      BETTER_AUTH_SECRET: ci-placeholder-secret
      BETTER_AUTH_URL: http://localhost:3000
      E2E_FIXTURE: ${{ matrix.fixture }}
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v4

      # In-container only (canary #393): the repo is checked out as root inside the
      # Playwright image, so mark the workspace safe to keep git from tripping on
      # dubious ownership. No-op on the host fixtures (guarded by matrix.container).
      - name: Trust workspace dir (container)
        if: ${{ matrix.container }}
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build the fixture's workspace dependencies
        # '^...' selects the fixture's transitive workspace deps (the dist-consumed
        # @fyit/* packages), excluding the fixture app itself.
        run: pnpm --filter "e2e-fixture-${{ matrix.fixture }}^..." build

      # Type-safety gate for CLI output (#197): regenerate the fixture from its
      # committed schemas with the current generator, then type-check it. This
      # turns a generator regression (e.g. a malformed template) into a red CI
      # run instead of code that only breaks once someone scaffolds a new app.
      - name: Regenerate the fixture (prove current generator output)
        working-directory: fixtures/${{ matrix.fixture }}
        run: node ../../packages/crouton-cli/bin/crouton-generate.js config --force

      - name: Type-check the generated fixture
        run: pnpm --filter "e2e-fixture-${{ matrix.fixture }}" typecheck

      # Host path only: fetch the browser + apt system deps at runtime. Skipped
      # in-container (#393) — the Playwright image already ships Chromium at
      # /ms-playwright (PLAYWRIGHT_BROWSERS_PATH preset), so there's nothing to
      # install and no flaky `--with-deps` apt step to hang on.
      - name: Cache Playwright browsers
        if: ${{ !matrix.container }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright (chromium)
        if: ${{ !matrix.container }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e smoke
        run: pnpm test:e2e

      # Visual-QA artifact (#356): upload the self-contained HTML report on EVERY
      # run (not just failures) so each PR carries reviewable visual proof — open
      # index.html to see each test's video, trace timeline, and screenshots.
      - name: Upload visual-QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-${{ matrix.fixture }}
          path: playwright-report/
          retention-days: 14
