name: Deploy App (reusable, Cloudflare Workers)

# Reusable deploy pipeline for any crouton app on Cloudflare Workers (#114).
#
# Per-app callers stay tiny — they just say which app + environment and pass
# secrets (see deploy-three-demo.yml for the reference caller). All the real work
# lives in the app's own `cf:deploy` / `cf:staging` scripts (build → deploy →
# auto-provision id-less D1/KV → sync ids back into wrangler.jsonc → remote D1
# migrate), so the pipeline has ONE source of truth: package.json. CI only adds
# the environment, the workspace layer builds, and the PR staging-URL comment.
#
# Domain convention (#133): production → friendlyinter.net, staging → pmcp.dev.
#
# No Pages "strip env from redirected config" step is needed: the cloudflare_module
# preset strips `env` from the generated .output config itself, and cf:staging
# re-injects it via scripts/inject-wrangler-env.mjs.

on:
  workflow_call:
    inputs:
      app:
        description: App/POC directory name (e.g. velo, blog)
        required: true
        type: string
      workspace:
        description: "Workspace dir holding the app: 'apps' (launched, default) or 'pocs' (preview)."
        required: false
        default: apps
        type: string
      environment:
        description: 'production | staging'
        required: false
        default: staging
        type: string
      production-url:
        description: Public production URL (used as BETTER_AUTH_URL at build time)
        required: false
        default: ''
        type: string
      staging-url:
        description: Public staging URL (used as BETTER_AUTH_URL at build time)
        required: false
        default: ''
        type: string
      node-version:
        required: false
        default: '22'
        type: string
      layer-packages:
        description: >-
          Space-separated pnpm filter names of dist-consumed framework packages
          to build before the app (only those WITH a build script are built;
          pure source layers like crouton-editor/pages/charts are skipped).
        required: false
        default: '@fyit/crouton-auth @fyit/crouton-core @fyit/crouton'
        type: string
      review-pr:
        description: >-
          PR number to wire the preview-review bridge to (staging only, #607).
          When set, the staging Worker is given the `croutonReview` runtime config
          (repo + this PR + the Nuxt Harness App creds) so in-page overlay comments
          POST to this PR as nuxt-harness[bot]. Empty = bridge left unconfigured.
        required: false
        default: ''
        type: string
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      # Optional: a JSON object of { "NAME": "value", … } pushed to the Worker as
      # secrets on every deploy (wrangler secret bulk). Store it as a GitHub
      # *Environment* secret so production and staging can hold env-specific values
      # (e.g. different BETTER_AUTH_URL). Omit it to manage Worker secrets manually
      # (they persist across deploys, so a one-time `wrangler secret bulk` also works).
      WORKER_SECRETS_JSON:
        required: false
      # Optional repo-level secret used only to derive the throwaway review login's
      # password (#608). Absent → a fixed fallback salt is used (fine: staging is
      # throwaway + isolated and the creds are posted publicly on the PR anyway).
      REVIEW_SEED_SECRET:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    # GitHub deployment environment — kept as production/staging so any
    # environment-scoped secrets/protection from the existing setup still apply
    # (the Workers target is staging/prod independently, via inputs.environment).
    environment: ${{ inputs.environment == 'production' && 'production' || 'staging' }}
    permissions:
      contents: read
      pull-requests: write   # for the staging-URL PR comment
    # Serialize (don't cancel — a cancel mid-migration is unsafe) deploys to the
    # same app+env so concurrent runs can't race on auto-provisioning / sync / D1.
    concurrency:
      group: deploy-${{ inputs.app }}-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs['node-version'] }}
          cache: 'pnpm'

      # --ignore-scripts: skip every workspace postinstall (guarded `nuxt prepare`)
      # during a whole-monorepo install; the app's own prepare runs below.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # --ignore-scripts above also skips native-module build steps. @nuxt/content
      # (the docs app) needs better-sqlite3's native binding at BUILD time to process
      # collections into the local DB (the dump that's loaded into D1 at runtime).
      # Rebuild it so the build doesn't fail with "Could not locate the bindings file".
      # No-op for apps that don't have it in their graph.
      - name: Rebuild native build deps skipped by --ignore-scripts
        run: pnpm rebuild better-sqlite3 2>/dev/null || true

      # The dist-consumed framework packages (inputs.layer-packages) must be built
      # before the app build. Pure source layers (crouton-editor/pages/charts) have
      # no build script and are skipped.

      # The layer cache is shared across ALL callers (one runner cache), but the set
      # of dists a deploy needs varies per app (different layer-packages, + devtools
      # below). Keying on source alone (`hashFiles('packages/**/*.ts')`) meant the
      # first app to populate the cache decided which dists every later app got — a
      # cache HIT could restore a set MISSING a package the current app needs, and
      # the build step (gated on cache-miss) would skip it → `nuxt prepare` failing
      # to load it. That's the #745 devtools crash, but it's a general cross-app
      # collision class (e.g. an i18n-needing app hitting an i18n-less cache). So we
      # fold the resolved build set into the cache key: different sets → different
      # entries → no collision.
      - name: Compute layer build-set key
        id: layer-set
        env:
          LAYER_PACKAGES: ${{ inputs['layer-packages'] }}
        run: |
          # The EXACT set built below: caller's layer-packages + devtools (always),
          # sorted + de-duped so key is order-independent. crouton-devtools is in the
          # set unconditionally — scaffolded apps declare it in nuxt.config `modules`
          # (scaffold-app.ts), so `nuxt prepare` needs its dist on every deploy (there
          # is no review flag to gate on; building it for apps that don't list it is
          # cheap and inert). (#745)
          set_str=$(printf '%s\n' $LAYER_PACKAGES @fyit/crouton-devtools | sort -u | tr '\n' ' ')
          echo "Layer build set: $set_str"
          echo "hash=$(printf '%s' "$set_str" | sha256sum | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Cache layer builds
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
          key: layer-builds-${{ steps.layer-set.outputs.hash }}-${{ hashFiles('packages/**/*.ts') }}

      - name: Build layer packages
        if: steps.layer-cache.outputs.cache-hit != 'true'
        env:
          LAYER_PACKAGES: ${{ inputs['layer-packages'] }}
        run: |
          # Same set the cache key was computed from (layer-set step). de-dupe is by
          # "dist already built this run" so an explicit devtools in layer-packages
          # isn't built twice.
          for pkg in $LAYER_PACKAGES @fyit/crouton-devtools; do
            dir="packages/${pkg#@fyit/}"
            # de-dupe: skip if this dist was already built earlier in the loop
            if [ -d "$dir/dist" ] && [ -n "$(ls -A "$dir/dist" 2>/dev/null)" ]; then
              echo "Skipping $pkg (already built this run)"
              continue
            fi
            if node -e "process.exit(require('./$dir/package.json').scripts?.build ? 0 : 1)" 2>/dev/null; then
              echo "Building $pkg"
              pnpm --filter "$pkg" build
            else
              echo "Skipping $pkg (no build script / pure source layer)"
            fi
          done

      - name: Cache Nuxt build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.workspace }}/${{ inputs.app }}/node_modules/.cache
            ${{ inputs.workspace }}/${{ inputs.app }}/.nuxt/cache
          key: nuxt-build-${{ inputs.app }}-${{ hashFiles(format('{0}/{1}/**', inputs.workspace, inputs.app), 'packages/**/*.ts') }}
          restore-keys: |
            nuxt-build-${{ inputs.app }}-

      # Rolldown's tsconfig generation needs an explicit prepare before build
      # (see deploy-learnings); cf:deploy/cf:staging only run `nuxt build`.
      - name: Prepare Nuxt (generate tsconfig)
        run: npx nuxt prepare
        working-directory: ${{ inputs.workspace }}/${{ inputs.app }}

      # The one real step: run the SAME script a developer runs locally. It builds
      # with NITRO_PRESET=cloudflare_module, deploys (auto-provisioning id-less
      # D1/KV on first run), syncs the provisioned ids back into wrangler.jsonc,
      # and applies remote D1 migrations.
      - name: Deploy (build → provision → sync ids → migrate)
        id: deploy
        working-directory: ${{ inputs.workspace }}/${{ inputs.app }}
        env:
          # BETTER_AUTH_* are only needed by the prerender pass at build time.
          BETTER_AUTH_SECRET: prerender-placeholder
          BETTER_AUTH_URL: ${{ inputs.environment == 'production' && inputs['production-url'] || inputs['staging-url'] }}
        run: |
          set -o pipefail
          if [ "${{ inputs.environment }}" = "production" ]; then
            pnpm run cf:deploy | tee deploy.log
          else
            pnpm run cf:staging | tee deploy.log
          fi
          # Surface the deployed URL for the PR comment, seed-login + review steps.
          # Prefer the configured custom-domain URL (staging-url/production-url input):
          # the workflow already knows it, and it's the actual deploy target (the route
          # in wrangler.jsonc env.staging). The log-grep only matches *.workers.dev,
          # which a custom-domain deploy NEVER emits — so grepping left the URL empty,
          # which in turn skipped the seed-login + PR-comment steps (gated on url != '').
          # Fall back to the log-grep only when no URL was configured (#293).
          if [ "${{ inputs.environment }}" = "production" ]; then
            URL="${{ inputs['production-url'] }}"
          else
            URL="${{ inputs['staging-url'] }}"
          fi
          if [ -z "$URL" ]; then
            URL=$(grep -oiE 'https://[a-z0-9.-]+\.workers\.dev' deploy.log | tail -1 || true)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: ${URL:-<url not parsed>}"

      # (Optional) explicit Worker secrets from the WORKER_SECRETS_JSON bundle —
      # an OVERRIDE for known/shared values (e.g. a deliberate production secret).
      # The "Ensure BETTER_AUTH_SECRET" step below covers the common case, so this
      # is only for values you want to pin. Runs first so an explicit BETTER_AUTH_SECRET
      # wins over the auto-generated one. Secrets persist across deploys (no-op re-upload).
      #
      # IMPORTANT — scoping: WORKER_SECRETS_JSON MUST be a *repository-level* Actions
      # secret, NOT an *Environment* secret. This job is reached via `secrets: inherit`
      # from a thin caller whose calling job declares no `environment:`, so
      # Environment-scoped secrets are never in scope to inherit and resolve to EMPTY
      # (they silently skip). Repository-level secrets inherit correctly.
      - name: Sync explicit Worker secrets (optional override)
        working-directory: ${{ inputs.workspace }}/${{ inputs.app }}
        env:
          SECRETS_JSON: ${{ secrets.WORKER_SECRETS_JSON }}
        run: |
          if [ -z "$SECRETS_JSON" ]; then
            echo "No WORKER_SECRETS_JSON provided — the Ensure BETTER_AUTH_SECRET step below covers auth."
            exit 0
          fi
          printf '%s' "$SECRETS_JSON" > "$RUNNER_TEMP/worker-secrets.json"
          if [ "${{ inputs.environment }}" = "production" ]; then
            npx wrangler secret bulk "$RUNNER_TEMP/worker-secrets.json"
          else
            npx wrangler secret bulk "$RUNNER_TEMP/worker-secrets.json" --env staging
          fi
          rm -f "$RUNNER_TEMP/worker-secrets.json"

      # ── Preview-review bridge wiring (#607, part of #488) ───────────────────────
      # The live-preview comment loop turns the overlay ON at build (NUXT_PUBLIC_CROUTON_REVIEW)
      # but the bridge (`/api/_review`, @fyit/crouton-devtools) also needs RUNTIME config to
      # know which PR to post to and how to auth — which no deploy ever set, so every overlay
      # comment 4xx'd "Review bridge not configured". These two steps inject it on staging,
      # PR-tied deploys: routing (repo + PR) + the Nuxt Harness App creds (so the bridge mints
      # an installation token at request time and posts as nuxt-harness[bot]). Pushed as Worker
      # secrets (persist on the live Worker; no redeploy needed). Skipped when not staging,
      # not PR-tied, or the App creds are absent — so the bridge simply stays off.
      - name: Mint Harness App installation id (for review bridge)
        id: review-app-token
        if: ${{ inputs.environment == 'staging' && inputs.review-pr != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Wire preview-review bridge config (staging, PR-tied)
        if: ${{ inputs.environment == 'staging' && inputs.review-pr != '' && steps.review-app-token.outputs.installation-id != '' }}
        working-directory: ${{ inputs.workspace }}/${{ inputs.app }}
        env:
          REPOSITORY: ${{ github.repository }}
          PR: ${{ inputs.review-pr }}
          APP_ID: ${{ secrets.HARNESS_APP_ID }}
          INSTALLATION_ID: ${{ steps.review-app-token.outputs.installation-id }}
          PRIVATE_KEY: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
        run: |
          jq -n \
            --arg repo "$REPOSITORY" \
            --arg pr "$PR" \
            --arg appId "$APP_ID" \
            --arg inst "$INSTALLATION_ID" \
            --arg key "$PRIVATE_KEY" \
            '{
              NUXT_CROUTON_REVIEW_REPOSITORY: $repo,
              NUXT_CROUTON_REVIEW_PR: $pr,
              NUXT_CROUTON_REVIEW_GITHUB_APP_ID: $appId,
              NUXT_CROUTON_REVIEW_GITHUB_APP_INSTALLATION_ID: $inst,
              NUXT_CROUTON_REVIEW_GITHUB_APP_PRIVATE_KEY: $key
            }' > "$RUNNER_TEMP/review-secrets.json"
          npx wrangler secret bulk "$RUNNER_TEMP/review-secrets.json" --env staging
          rm -f "$RUNNER_TEMP/review-secrets.json"
          echo "✓ Wired preview-review bridge → PR #$PR on $REPOSITORY (posts as nuxt-harness[bot])"

      # Guarantee a new app can AUTHENTICATE on first deploy with ZERO per-app setup.
      # A freshly provisioned Worker has no secrets, so member login 500s with
      # "[crouton/auth] BETTER_AUTH_SECRET is required". If the Worker lacks one,
      # generate a strong secret and set it. Worker secrets persist across deploys,
      # so this runs exactly once per Worker and is a no-op afterwards — it NEVER
      # rotates an existing secret (which would invalidate live sessions). If the
      # secret list can't be read (e.g. an app whose wrangler.jsonc has no `name`),
      # we skip generation rather than risk clobbering. BETTER_AUTH_URL isn't needed:
      # better-auth infers it from the request for email/password login.
      - name: Ensure BETTER_AUTH_SECRET (auto-generate if missing)
        working-directory: ${{ inputs.workspace }}/${{ inputs.app }}
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -o pipefail
          ENV_FLAG=""
          if [ "$ENVIRONMENT" != "production" ]; then ENV_FLAG="--env staging"; fi
          if ! existing=$(npx wrangler secret list $ENV_FLAG 2>/dev/null); then
            echo "::warning::Could not list Worker secrets for ${{ inputs.app }} ($ENVIRONMENT) — skipping auto-generate to avoid clobbering an existing BETTER_AUTH_SECRET."
            exit 0
          fi
          if echo "$existing" | grep -q 'BETTER_AUTH_SECRET'; then
            echo "✓ BETTER_AUTH_SECRET already present on the Worker — leaving it untouched."
          else
            echo "::notice::No BETTER_AUTH_SECRET on ${{ inputs.app }} ($ENVIRONMENT) — generating one (persists; override anytime via a repo-level WORKER_SECRETS_JSON)."
            printf '%s' "$(openssl rand -hex 32)" | npx wrangler secret put BETTER_AUTH_SECRET $ENV_FLAG
          fi

      # Seed a throwaway, loginable test account on the (isolated, staging-only)
      # preview so a reviewer can open the URL and be inside the app in one step —
      # no register → create-team wall (#608). Drives the app's own HTTP auth on the
      # deployed Worker (no raw SQL). Idempotent: deterministic creds per preview, so
      # a redeploy reprints the SAME working login instead of piling up users; an
      # existing user is detected and reused. Best-effort — a seed hiccup never fails
      # the deploy. Staging only; production seeds nothing.
      - name: Seed review login (staging only)
        id: seed
        if: ${{ inputs.environment != 'production' && steps.deploy.outputs.url != '' }}
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          APP: ${{ inputs.app }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
          REVIEW_SEED_SECRET: ${{ secrets.REVIEW_SEED_SECRET }}
        run: |
          set -o pipefail
          # Stable per-preview key: the PR number when this is a PR, else the ref.
          if [ -n "$PR_NUMBER" ]; then KEY="pr${PR_NUMBER}"; else KEY="$(printf '%s' "$REF_NAME" | tr -c 'a-zA-Z0-9' '-')"; fi
          EMAIL="review+${APP}-${KEY}@example.com"
          # Deterministic password so redeploys reprint the same working login.
          SALT="${REVIEW_SEED_SECRET:-crouton-review-seed}"
          PW="$(printf '%s' "${SALT}:${APP}:${KEY}" | sha256sum | cut -c1-24)"
          echo "::add-mask::$PW"
          node scripts/seed-review-login.mjs --url "$DEPLOY_URL" --email "$EMAIL" --password "$PW" --team "Review Team" || true
          # Surface for the PR comment + the run summary (the password is masked in logs).
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"
          echo "password=$PW" >> "$GITHUB_OUTPUT"
          {
            echo "### 🔑 Review test login (${APP})"
            echo "- **URL:** $DEPLOY_URL"
            echo "- **Email:** \`$EMAIL\`"
            echo "- **Password:** \`$PW\`"
            echo "_Disposable account on an isolated, throwaway staging DB._"
          } >> "$GITHUB_STEP_SUMMARY"

      # Prove the DEPLOYED preview actually works — log in with the seeded account, run
      # any app-declared CRUD + public read, and screenshot it (#293). This is the
      # acceptance typecheck/boot can't give: auth + a data round-trip on the real Worker
      # (D1 + secrets + better-auth). Report-only by DEFAULT — a brittle smoke must never
      # red a previously-green deploy across velo/fanfare/triage; an app opts into gating
      # with `"smoke": { "required": true }` in its deploy.config.json. Login proof + CRUD
      # use plain fetch (always available); the screenshot is best-effort (skips cleanly
      # when no browser is present on the runner).
      - name: Verify deployed preview (smoke)
        id: smoke
        if: ${{ inputs.environment != 'production' && steps.deploy.outputs.url != '' }}
        continue-on-error: true
        env:
          URL: ${{ steps.deploy.outputs.url }}
          EMAIL: ${{ steps.seed.outputs.email }}
          PW: ${{ steps.seed.outputs.password }}
          APP: ${{ inputs.app }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          MANIFEST="$WORKSPACE/$APP/deploy.config.json"
          if node scripts/smoke-deployed.mjs --url "$URL" --email "$EMAIL" --password "$PW" --app "$APP" --manifest "$MANIFEST"; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "### ✅ Deployed-preview smoke ($APP) — passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "### ❌ Deployed-preview smoke ($APP) — failed (see step log)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke screenshot
        if: ${{ always() && steps.smoke.outputs.result != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ inputs.app }}
          path: screenshots/${{ inputs.app }}-smoke.png
          if-no-files-found: ignore

      # Gate the deploy on the smoke ONLY when the app opted in (smoke.required: true).
      # Otherwise a failing smoke is a loud warning, not a red deploy.
      - name: Gate on smoke result (opt-in)
        if: ${{ steps.smoke.outputs.result == 'fail' }}
        env:
          APP: ${{ inputs.app }}
          WORKSPACE: ${{ inputs.workspace }}
        run: |
          REQUIRED=$(jq -r '.smoke.required // false' "$WORKSPACE/$APP/deploy.config.json" 2>/dev/null || echo false)
          if [ "$REQUIRED" = "true" ]; then
            echo "::error::Deployed-preview smoke failed and $APP sets smoke.required=true."
            exit 1
          fi
          echo "::warning::Deployed-preview smoke failed (report-only; set smoke.required=true in $APP/deploy.config.json to gate)."

      # On PRs, post/update a sticky comment with the isolated staging URL.
      - name: Comment staging URL on PR
        if: ${{ inputs.environment != 'production' && github.event_name == 'pull_request' && steps.deploy.outputs.url != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const app = '${{ inputs.app }}'
            const email = `${{ steps.seed.outputs.email }}`
            const password = `${{ steps.seed.outputs.password }}`
            const marker = `<!-- deploy-staging:${app} -->`
            // Disposable test login (#608) — only present when the seed step ran + produced creds.
            const login = (email && password)
              ? `\n\n🔑 **Test login** — paste straight in, no registration:\n\`\`\`\nEmail:    ${email}\nPassword: ${password}\n\`\`\`\n_Disposable account on this isolated, throwaway staging DB._`
              : ''
            const body = `${marker}\n🚀 **${app}** staging deployed: ${url}${login}\n\n_Isolated, auto-provisioned Workers staging env (its own D1 + KV)._`
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
            const existing = comments.find(c => c.body && c.body.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
