name: Cleanup merged epic branches

# Auto-delete an `epic/<NN>-<slug>` integration branch once its epic→`main` PR merges (#613).
# Epic branches otherwise pile up after the feature lands (the #348 integration-branch flow
# cuts one per epic). When the PR whose head is an `epic/*` branch merges INTO `main`, the
# epic is done and its branch is fully contained in `main` — safe to delete, zero loss.
#
# Scope is deliberately narrow:
#   • head ref starts with `epic/`  AND  base ref is `main`  AND  the PR merged.
# Sub-PRs (head `claude/issue-*`) merging into an epic branch do NOT match — only the final
# epic→main merge does, so we never delete an epic branch that still has open sub-work.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-epic-branch:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'epic/') &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref
            const ref = `heads/${branch}`
            try {
              await github.rest.git.deleteRef({ ...context.repo, ref })
              core.info(`🧹 Deleted merged epic branch ${branch} (its epic→main PR merged).`)
            } catch (e) {
              // Already gone (e.g. "delete branch on merge" beat us) — not an error.
              core.warning(`Could not delete ${branch}: ${e.message}`)
            }
