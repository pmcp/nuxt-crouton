# Settings for the recurring reports (#637) — cadence + delivery as config-as-data.
#
# This is the "settings page" for the digests, deliberately a versioned, PR-reviewed file
# rather than a hosted UI (a GitHub App can't host settings; a GUI would only ever be a
# front-end over this same file). To change WHEN a report runs or HOW it's delivered, edit
# one line here — never the workflow plumbing.
#
# How it works (cadence-as-data): each report's workflow cron fires DAILY (a cheap wake-up);
# .claude/skills/housekeeping/schedule.mjs reads this file and exits early when today isn't a
# send day. That sidesteps GitHub's static-cron limitation without ever editing `cron`.
#
# Fields per report:
#   schedule: daily | weekly:<dow>      dow = mon|tue|wed|thu|fri|sat|sun (UTC)
#   deliver:  [issue] | [issue, email]  rails that already exist (issue = standing issue;
#                                        email = Resend, no-op when RESEND_API_KEY unset)
#   to:       [addr, ...]               recipients — required only when deliver includes email

housekeeping:
  schedule: daily   # run more regularly (#763) — low-noise: upserts ONE standing issue, empty sections drop
  deliver: [issue]
  # to: [you@example.com]   # only used when deliver includes email

# epic-digest currently hard-codes its own daily cron; retrofitting it onto this schema is a
# nice-to-have follow-up (#637). Declared here so the config is the single source of intent.
# Delivered by email only (Resend) — the standing-issue rail was retired to stop the duplicate
# GitHub-notification mail.
epic-digest:
  schedule: daily
  deliver: [email]

# WS6b.2 (#884) — the model-routing scoreboard: cost-per-success per (model × flow), rolled up
# from writeups/reports/eval-ledger.jsonl and posted to one standing issue. Low-noise weekly is
# plenty (routing tiers change slowly); a manual dispatch always sends. No email rail needed.
eval-scoreboard:
  schedule: weekly:mon
  deliver: [issue]
