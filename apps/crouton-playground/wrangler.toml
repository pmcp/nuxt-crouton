# Cloudflare Pages configuration for crouton-playground
# Deploy with: npx wrangler pages deploy dist/

name = "crouton-playground"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 Database binding
# Create with: npx wrangler d1 create crouton-playground-db
[[d1_databases]]
binding = "DB"
database_name = "crouton-playground-db"
database_id = "TODO_REPLACE_WITH_REAL_ID"
migrations_dir = "server/db/migrations/sqlite"

# KV Namespace binding
# Create with: npx wrangler kv namespace create crouton-playground-kv
[[kv_namespaces]]
binding = "KV"
id = "TODO_REPLACE_WITH_REAL_ID"

# R2 Bucket binding for blob storage (file uploads)
# Create with: npx wrangler r2 bucket create crouton-playground-blob
[[r2_buckets]]
binding = "BLOB"
bucket_name = "crouton-playground-blob"

# Environment variables (set in Cloudflare dashboard or via wrangler secret)
# [vars]
# NUXT_PUBLIC_SITE_URL = "https://crouton-playground.pages.dev"
