# Cloudflare Pages configuration for fanfare
# Deploy with: npx wrangler pages deploy dist/

name = "fanfare"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 Database binding
# Create with: npx wrangler d1 create fanfare-db
[[d1_databases]]
binding = "DB"
database_name = "fanfare-db"
database_id = "adf00808-3c47-49d3-832c-49cf57f6e3f7"
migrations_dir = "server/db/migrations/sqlite"

# KV Namespace binding
# Create with: npx wrangler kv namespace create fanfare-kv
[[kv_namespaces]]
binding = "KV"
id = "b3183976e74846ff9913e1b6c641d951"

# Environment variables (set in Cloudflare dashboard or via wrangler secret)
# [vars]
# NUXT_PUBLIC_SITE_URL = "https://fanfare.pages.dev"
