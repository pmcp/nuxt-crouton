# Cloudflare Pages configuration for bookingtest3
# Deploy with: npx wrangler pages deploy dist/

name = "bookingtest3"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 Database binding
# Create with: npx wrangler d1 create bookingtest3-db
[[d1_databases]]
binding = "DB"
database_name = "bookingtest3-db"
database_id = "TODO_REPLACE_WITH_REAL_ID"
migrations_dir = "server/db/migrations/sqlite"

# KV Namespace binding
# Create with: npx wrangler kv namespace create bookingtest3-kv
[[kv_namespaces]]
binding = "KV"
id = "TODO_REPLACE_WITH_REAL_ID"

# R2 Bucket binding for blob storage (file uploads)
# Create with: npx wrangler r2 bucket create bookingtest3-blob
[[r2_buckets]]
binding = "BLOB"
bucket_name = "bookingtest3-blob"

# Environment variables (set in Cloudflare dashboard or via wrangler secret)
# [vars]
# NUXT_PUBLIC_SITE_URL = "https://bookingtest3.pages.dev"
