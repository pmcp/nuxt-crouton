# Cloudflare Pages configuration for velo
# Deploy with: npx wrangler pages deploy dist/
#
# NOTE: Environment-specific bindings (preview/staging) must be configured
# in the Cloudflare Pages dashboard under Settings > Bindings > Preview.
# Wrangler v4 does not support environments in redirected configurations.
#
# Staging resources (configure in dashboard for Preview environment):
#   DB  → velo-staging-db (dcd9dfeb-756e-4fce-967c-a7eb4d1627bd)
#   KV  → a161b49669c246fbbabdec88598456db
#   BLOB → velo-staging-blob

name = "velo"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "velo-db"
database_id = "6e1fe44c-516d-4f17-bf4f-0ab791fcc0d9"
migrations_dir = "server/db/migrations/sqlite"

[[kv_namespaces]]
binding = "KV"
id = "b052df4f80c24266b0adcc4b8e9d8a74"

[[r2_buckets]]
binding = "BLOB"
bucket_name = "velo-blob"
